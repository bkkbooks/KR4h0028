body:
  text: 㑹稽掇英摠集巻十九宋孔延之撰餘姚海塘記史館王相自雲柯而南至于某有隄若干尺截然令海水之潮汐不得冒其旁田者知縣事謝君為之也始隄之成謝君以書屬予記其成之始曰使來者有考焉得卒任完之以不隳謝君者陽夏人也字師厚景初其名也其先以文學稱天下而連世為貴人至君遂以文學世其家其為縣不以材地自負而忽其民之急方作堤時嵗丁亥十一月也能親以身當風霜氛霧之毒以勉民作而除其菑能令其民翕然皆歡趨之而忘其役之勞遂不踰時以有成功其仁民之心效見於事如此亦可以己而猶自以為未也又思有以告後之人令嗣續而完之以永其存善夫仁人長慮却顧圖民之災如此其至甚不可以無傳而後之君子考其傳得其所以為其亦不可以無思而異時予嘗以事至餘姚而君過予與予從容言天下事君曰道之閎大隠宻聖人之所獨鼓萬物以然而皆莫知其所以然者盖有所難知也其治教政令施為之詳凡與人共而尤丁寕以急者其易知較然者也通塗川治田桑為之隄防溝澮渠川以御水旱之災而興學校屬其民人相與習禮樂其中以化服之此其尤丁寕以急而較然易知者也今世吏者其愚也固不知所為而其所謂能者務出竒為聲威以驚世震俗至或盡其力以事刀筆簿書之間而己而反以謂古所為丁寕以急者吾不暇以為吾曽為之而曽不足以為之萬有一人為之且不足以名於世而見謂材嘻其可歎也夫為天下國家且百年而勝殘去殺之效則猶未也其不出於當時予良以其言為然既而聞君之為其縣至則為橋於江治學校以教養縣人之子弟既又有隄之役於是又信其言之行而不予欺也己為之書其隄事因并書其言終始而存之以告後之人慶厯八年七月日記會稽清白堂記范仲淹會稽府署據卧龍山之南足北上有蓬萊閣閣之西有凉堂堂之西有巖焉巖之下有地方數丈宻蔓深叢莽然就荒一日命役徒芟而闢之中獲廢井即呼工出其泥滓觀其好惡曰嘉泉也擇高年吏問廢之由曰不知也乃扄而澄之三日而後汲視其泉清而白色味之甚甘淵然丈餘引不可竭當大暑時飲之若餌白雪咀輕氷凛如也當嚴冬時若遇愛日得陽春温如也其或雨作雲蒸醇醇而渾盖山澤通氣應於名源矣又召嘉賔以建谿日鑄卧龍雲門之茗試之則甘液華滋説人襟靈觀夫大易之象初則井道未通泥而不食弗治也終則井道大成収而勿幕有功也其斯之謂乎又曰井徳之地盖言所守不遷矣井以辨義盖言所施不私矣聖人畫井之象以明君子之道焉予愛其清白而有徳義可為官師之規因署其堂曰清白堂又構亭于其側曰清白亭庶㡬居斯堂登斯亭而無忝其名哉時康定元年三月二十日蕭山縣昭慶寺夢筆橋記葉清臣昔者昭明綴集里巷開于東府子雲著書亭構掲乎西蜀席前修之能事崇近古之殊稱此賢者所以飛令聲布嘉躅也若夫經星著象牽牛列于闗梁周官分職司險逹于川澤觀天根而庀事聴輿謀而順圖此作者所以啟上功廣成務也其或流風可挹遂冺滅而無聞陳迹有基忽廢墜而不舉斯亦平津之館永歎於屈氂宛丘之道深譏於單子者巳淛河之東偏㑹稽為右郡伯禹啓書而興夏勾踐保楯而覇越青巖交映佳山水之秀竒茂林森蔚美竹箭之滋植地方百里者八而蕭山居其一焉縣目伽藍者五而昭慶第為甲焉夢筆橋者乃直寺門絶河流而建之也初齊建元中左衛江公歸依法乘脱畧塵境捨所居宅為大福田則斯橋之興與寺偕始其賦名索義亦繇此物也自㑹昌流禍池臺起傾平之愴大中再造土木極文繡之華唯造舟之制曠日不復物豈終否有時而傾天聖紀號之二年冬十有二月隴西李君以廷尉評實宰是邑君明習吏事詳練理體牽絲㳂牒至必連最批郤導􅑆居多餘地其始至也去害吏撫瘵民激揚頽弊􅋏振紘領越明年政以凝民用寕訟無留牘漁不改夜於是以成法視文奏以暇刻起隳圯位署必葺邑居惟新一日周爰井疆鋪觀圖籍感釋子之能誌惜江氏之寖㣲且懼乎褰裳厲深為斯民病漸帷渉難貽來者羞乃諭居僧俾募信施其㘴堂上之客必得邑中之豪寺僧智明利眞有邦徳成有章自南同與是謀式幹斯蠱三四佛之攸種咸植善根百千金之所直悉歸寳塔府帑不費里旅不煩山虞致木而叢倚郢人運斤而風集經始不日而功用有成晴虹倚空而半環浮鼉跨波而欲渡雕楹矗而端聳鉤楯繚而横絶肩摩轂擊控夷路而下馳飛艎鳴艣貫清流而直逝以材之豐羡稽工之簡隙又作駐楫亭于橋之北涘艇子兩槳足以憩行者之勤傳車一封可以勞使臣之集是知創橋以表寺先賢之遺懿益光由亭而視橋仁人之用心兼至建一物而二美具故君子謂李君為能若乃度羣迷超彼岸演竺乾之筏喻從善政均大患易國僑之輿濟又豈止題柱伸馬卿之志堕履紀黄石之書臨清水以締材徒言呂母架渭河而建利止號崔公而己哉李君謂予春秋之流可謹嵗月之實折簡馳問託辭傳信愧無馬遷之善叙聊傳丘明之新作云爾時巨宋天聖四年春三月甲申日記井儀堂記錢公輔天下登覧之勝有以天成者有以人為者天成必待人為而後發人為必得天成而後㑹二者合并迺可謂嘉余於㑹稽山水千情萬状昔嘗探而究之矣今而再至登井儀堂環相周視恍然瓌絶殆非昔之所見視其堂之後枕去聲則卧龍一山之股也視其堂之前直則亭山與王氏之小隠山也視其堂之東則東之秀林羙嶠莫不咸在而城坊萬屋滿於眉宇故命之曰阜軒阜軒云者以夥書也視其堂之西則西之逺峯近壑皆可指尋而原田億計瑩乎目睫故命之曰曠廡曠廡云者以廣書也視其堂之名則射禮之所自講也視其堂之實則宴喜之所最宜也視其堂之兩軒則客主之所以休而望也視其堂之高下則蓬莱閣之上望海亭之下而其平與四徹亭等也傍而俯乎東南則西楼隠然其左也傍而俯乎西南則西園蔚然其右也問其成之嵗月則嘉祐六年二月七日也問其作之主人則太守刁公景純也問其常所偕㳺而共樂者通判沈君興宗也誰其文之晋陵錢公輔也志省堂記沈起城之中有山以勝槩名天下者唯餘杭㑹稽丹陽括蒼閩五郡焉環山以為城城廣袤四出直其南有湖湖光平而緑山勢聳而秀則㑹稽又為五郡之最故㣲之之詩擬之蓬萊良有以也今年夏四月予以言斥官自監察裏使除通判會稽郡事㑹稽大府也所居之署皆隆棟大梁宻礎瓌材堂皇峻嚴齋居靚深則觀㳺之盛又為㑹稽之最署之北鑿方以為池池有清泉菱芰生其中池之左累高以為山山有怪石松杉植其上山之北又有大亭巋然即呉越錢氏所建也訖今綿百餘祀而木之漏者朽而蠧墻之徹者剥而壞予因取廢寺之餘材役卒之隙工治而完之不踰月而告成自公之暇則以琴樽几席起居於其間因名之曰志省堂盖思遷謫之人有憔悴怨懟憤世嫉䜛癯然其色可憐者兹悖於性而不知於天也有酣飲浩歌仰天而呼不事事以自放者兹瘝其職而不䖍於君命也若予之志志乎省吾身也易之震君子以恐懼修省釋者以君子畏天之威則兢兢自修以省察其過所以致福也噫省之義於君子行己之方其至矣乎哉子故志其省之說書於石以自勉焉爾嘉祐五年十二月二十三日望海亭記刁約越冠浙江東號都督府府據卧龍山為形勝處山之南亘東西鑑湖也山之北連屬江與海也周遭数里盤屈於江湖之上状卧龍也龍之腹府宅也龍之口府東門也龍之尾西園也龍之脊望海亭也大中祥符末予侍宦來越熟遊於此觀乎山之竒孤峯崛起亭之勝諸景叢集惜其隘陋有負於眺覧時州将高公紳植五桂於亭之前易其名曰五桂亭後四十五年予假守至郡爰訪舊迹亭與桂俱廢矣止餘荒墟人迹罕及因而裒遺材鳩羡工裁峻填坎以廣故基縱横凡増四丈餘而亭宇始葺周覆軒廡以容左右也三開磴道以便上下也四隅翼以石欄固其險也前墀傅以花檻飾其趣也東西列屋四楹置宴具也亭既成邀朋僚以落之客有執爵起而言曰東南之邦佳山水侈䑓榭麗於城邑者多矣如其嵐巘千屏煙波数帶漕帆商檝往還於前赬糊百雉雲屋萬家鴛刹蚪簷照映於下者未見其比若其晝之隂也繁雲舒巻起於望中楼塔高下㦯出㦯沒晩之霽也殘照澄明瑩乎天末峯巒逺近若趨若揖盖一日之異也如此始春也鮮葩艶卉爛熳城隅濃香襲人迥當几席既夏也嘉樹茂林蔽虧簷外清隂覆座宛在巖谷逮秋也木葉摇落天形盡露巨浸千里浩乎無涯及冬也谷風號怒雪意欲霏寒空四垂混焉一色盖四時之變也如此昔元㣲之罷相領浙東觀察嘗有詶鄭從事宴望海亭詩請復亭名曰望海乃然之仍以詩附于左方嘉祐辛丑嵗仲冬既望新修城記毛維瞻天下不患乎有不可禦之冦大患乎無不可攻之備閭井聚落間一區之舍斗升之儲猶畜尨狣設垣籬以固守之而郡國之大不城可乎越為浙東大府户口之衆寡無慮十百萬金榖布幣嵗入于縣官帑庾数又倍之提封左右襟帶江湖逺扼閩嶺之衝故屯宿禁旅以備非常州之子城頽垝邸裏亡有限隔非所以為國家式遏海外之意也嘉祐六年春州将刁公奏乞治之詔下得請主築者纔慮事而公被召繼以紫微沈公役方大施又移帥杭八年夏清河張公領鎮至止恭念天子新即位外諸侯大冝謹守備以為先務遂量功戒事儀圖亟成役兵夫日僅萬指舂牘空逺相荅不擾市不妨農僦而飤之無不勉者以其年冬十月新城成高二十丈面平廣可聮數轡其趾疊巨石為䑓以捍水四周累瓴甋承埤堄以障守者挑撻覧寫而亷勢峻抜堅異他壁北因卧龍山環而傅之連延屬於南西抵于堙尾凡長九千八百丈其費工與材之数踰二百六十萬城之門有五而常喜西偏西園三門既隘且弊又新之以壮其啓閉仍鳩羡材樓於西園門之上資游觀也平湖蒼山前後涵映朝嵐夕霏紫翠浮活樵釣謳歌魚鳥上下迤邐來與人會襟韻灑豁迴視邑郭其身飄然若在丹霄遊氛之上此又功外所得之餘勝也公之於是役也指蹤纎悉偕若素慮始議者以三嵗為期至是二十五旬而畢盖役不可以翫曰法曰兵曰政亦然凡翫役則民作勞而重困翫法則吏因縁而市獄翫冦則師逗留而速敗翫政則民露布而亡告翫之為説眞可畏哉故余因書修城事始末及之時治平初命元嵗在甲辰云越帥沈公生祠堂記沈紳上在御之四十年揆古監觀熈神無為委成庻工克愼付畀眷是㑹稽大屏東部整齊師紀坐以撫安宜得嚴諸侯嘉祐六年十二月己未始命右正言知制誥呉興沈公遘以府事公嘗以文學相先天下名重一時陟降外内發舒輝光衆實偉之既至府思将大起其政以當上意甫留神明洞見底裏所迎立剖疾甚破竹乃占屬僚分董曺事乃簡燕遊輯完疲羸有無頼三人鄉邑魁蠧公拉而黥之逺邇肅觀自爾户弛禁横猾惴栗一方風動屹然嶽立公方材育羣士遂大治學校新其宫居而尊勸焉朝廷初以起居舍人進公公懇譲者再以紓父譴及是七年七月壬子優詔褒加遷于江都凡邦之耆耋薦紳秀民緇黄列校惜公之行以謂撤大厦而暴之途奪慈母而絶其乳讙言呶呶逮無攸依相與畫公儀形揭于永福佛寺以􅐚慕詹從而鋪其治行屬紳叙次光明世聞紳迹公為政本乎愛民纔六七月而人皆愛之不忘人知愛公而不知朝廷遷公于邇且将施之大政矣雖深其思與古異矣若漢之中興郡國良政増賜金爵使民尚久其惠公卿缺則選所表以進用今夫民得良政而朝夕去之失其所安宜乎越民思公無復己時夫以僖公善于魯人彼能請命于周史克為之頌其聲章章不冺于兹今公之行二者既不克獲使紳不得以鄙陋固避奉紀盛烈以慰邦人于萬斯年是嵗八月壬午尚書都官員外郎沈紳謹記山隂縣朱儲石斗門記沈紳朝廷方修天下水職乃命知山隂㑹稽二縣事者提舉鑑湖嘉祐三年五月賛善大夫李侯茂先既至山隂盡得湖之所宜與其尉試校書郎翁君仲通始以石治朱儲斗門八間覆以行閣中為之亭以即二縣塘北之水東西距江百有十五里揔一十五鄉溉田三千一百十九頃有竒昔之為者木乆磨齧啓閉甚艱衆既不能力當政者復失其原每嵗調民築遏以茍利騷然煩費無紀而水旱未嘗不為之戚大夫之治如平一身之疹必先寕其心而鍼砭以輔之誠良民醫也故邑老助教虞元昱率門長季文用周文寵願發貲以聴命効力唯恐在後遂擇天章寺元聳相與募財屬之成功明年秋衆以其成請書於紳而為之辭曰越比北東兩山東湖傑石中蹲澌流於江噤木植門自古邦侯淫霏虐陽時其畜施衣食其腴豐公逮私嵗卒無虞酣酣笑歌木腐不支築壃以勞孰究孰惟民夷有來大夫至止手摩百疾始而眺眎徐迹本末校書嘉聞胥抃奏勤汗肌骭塗莫我告煩唯虞季周倡勇莫遏唯聳羣悦貲來雲委乃礱于山壁削林立隃時門完芘有寕宇沸川闐郊萬夫聚觀勿憂勿恫繇吾二君材羙工堅曷日之單智經其𥘉仁以紹承司命爾民敢告後賢紳将為之記考其言扵勾踐曰宗廟社稷在湖之中乃知後漢太守馬臻初築塘而大興民利也自爾㳂湖水門衆矣今廣陵曺娥是皆故道而朱儲特為宏大及觀地志與鄉先生趙萬宗石記則謂貞元中觀察使皇甫政所造此特紀一時之功爾後景徳二年大理丞段棐為縣修之其記存焉繇漢以來且千嵗惟政棐二人名表於世而人不忘至大夫始建不朽之績冝悉其論次章示來代以慰吾民之思是冬十二月丙戌謹記新昌縣石城山大佛身量記僧辯端剡谿之東三十里而逺屬新昌縣有石城曰隠岳實天台之西門去縣五六里而近雙巒駢聳状猶琢削實其表無瑕隙而草樹不得植虗其中無翳隘而虎豹不得入豁然若堂奥窅然若龕室誠造物者獨有意于是焉其左右前後皆圓岑峙峰胥以環衛案劉勰舊記當永明四年有浮屠氏厥號僧䕶嘗兹矢誓期三生恭造彌勒之像梁天監十二年二月始經營開鑿之洎畢龕高一十一丈廣七丈深五丈佛身通高一十丈座廣五丈有六尺其面自髪際至頥長一丈八尺廣亦如之目長六尺三寸眉長七尺五寸耳長一丈二尺鼻長五尺三寸口廣六尺二寸從髪際至頂高一丈三尺指掌通長一丈二尺五寸廣六尺五寸足亦如之兩膝跏趺相去四丈五尺咸壮麗特殊其四八之相㒺弗畢具咸平五年端東遊天台路經是岳故得雄觀其敞博崇偉且歎仰之不暇諒嘉陵并郡石像外至於斯天下鮮可比擬者乃詢其數量之延袤刋之于石以垂堅久庶傳于四方之耳目俾洽于聞見也若其神異之感召事物之竒勝悉存諸劉公之文此不當復有說矣時皇宋咸平壬寅記㑹稽掇英揔集巻十九
