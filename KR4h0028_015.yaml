body:
  text: 會稽掇英總集卷十五宋孔延之撰憶越州陳堯佐稽峰倚雲千仞髙澄湖倒影分秋毫當年逸賞有餘意徘徊不忍移輕舠又抽毫欲賦東南竒雲山好景慙有遺平波蕩漾照湖渌扁舟憶得遊春時和張士遜稽山巖壑深復髙思之誰妙丹青毫霜縑若得一千幅伻圖何必乘蘭舠又平湖八百里多竒君曽縱賞無餘遺不知風月誰為主夷猶未必如當時和晏殊鑑湖清徹秦望髙涵虛逗碧供吟毫當時醉眼倚空濶三江七澤才容舠又湖山杳渺不可狀登覽幽求無所遺髙僧伴吟足清覽見盡白蓮開落時和吕夷簡賀監湖邉山斗髙水軒水塢頻抽毫吟餘清興杳無際揭篷聽雨登漁舠又雲門雪竇阻清賞恍然目想心如遺前溪後溪月上處千山萬山花發時和薛奎照湖方干吟格髙搜清研竒含爛毫天中無雲水中月虛明晶曜忘回舠又千巖萬壑爭清竒天地靈秀應無遺吟舟恐在碧霄上湖心澄波涵月時和王隨賀監賜湖名價髙雲山吟賞抽江毫澄波杳渺醉欲去煙光水月留歸舠又越山湖山何絶竒昔聞尋勝寧遐遺烟波無憶舊吟醉方是致君堯舜時題袁秀才林亭方干清邃林亭指畫開幽巖别派象天台坐牽蕉葉題詩句醉觸藤花落酒杯白鳥不歸山裏去紅鱗多自鏡中來終年此地為吟侣早起尋君薄暮回觀會稽圗禇朝陽良使求圖籍工人巧思饒全移會稽郡不散浙江潮夏禹猶卑室秦皇尚斷橋宛然山水趣誰道故鄉遙宴榮二山人池亭孟浩然甲第開金穴榮期樂自多櫪嘶支遁馬池養右軍鵝竹引攜琴入花邀載酒過山公來取醉時唱接籬歌水寺李紳煙波野寺經過處水國蒼茫夢想中雲散浦開江月逈日曛舟暗海潮通坐看魚鳥沈浮逺靜見樓臺上下同聞道化城方便諭只應從此到龍宫新泉當附雲門寺僧靈一泉源新湧出洞徹映纎雲稍落芙蓉沼初淹苔蘚紋了將空色淨素與衆流分若對清宵月泠然夢裏聞望越亭史館王相亂山千頃翠相圍衮衮滄江去復歸安得病身生羽翼長隨沙鳥自由飛越上聞子規范仲淹夜入翠烟啼晝尋芳樹飛春山無限好猶道不如歸諸暨道中作范仲淹林下提壺招客醉溪邉杜宇勸人歸可憐白酒青山在不醉不歸多少非越中五詠林槩越絶烟光隱翠微蘭亭春色送行衣風清漢相鳴樵徑臺古任公落釣磯繡被歌殘人竟逺桃花源靜客忘歸憑君莫上秦山望千古驪宫對夕暉野亭宴集林槩碧樹隂穠曲沼濱賞心何處樂遊頻東吳景物蘭亭晚西洛煙光梓澤春香散落梅忘怨笛緑鋪幽草妬芳茵風雲流散苦無定且學陽池倒載身離席林槩何處驪駒雜楚歌楚人歸思託雲蘿河陽望竟妾心逺金谷别來郎恨多往事一春空物態閒情千里舊風波歸時莫聽隴頭水腸斷不禁年少何西村林槩緑郊凝望久徘徊落日川原映古臺江上晚風三弄笛隴頭春信一枝梅東西陌外煙光度紫翠峰前霽色開不是羅敷莫回首城南五馬使君來野塘林槩漠漠橫塘一水通霏霏輕靄夕陽中吳娘晚唱穿菱葉楚客春心託蕙叢煙外蒹葭閒倚路波間舴艋半凌風江南景好遊人去二月大堤花豔紅得越張伯玉尺一除書與會稽陋儒何以報天輝豈惟大幕張紅斾更得全家住翠微千騎晚隨龍節去一帆春送鷁舟飛支離莫道攘空臂乞得越州金印歸清明日張伯玉每年每遇清明節把酒尋花特地忙今日江城衰病起佛前新火一爐香正旦呈諸僚友張伯玉拂霧酴酥酒滿巡越山如鬛水如鱗日邉雖望龍庭逺海上初傳鳳厯新好景融融來破雪和風細細欲黏人莫言老守無心計排比賓僚醉過春臘日喜雪張伯玉臘雪常聞百厲銷今年臘日雪飄飄山公預喜明年熟擘畫開春買酒瓢過越趙咨地有千巖與萬津霸圖無計老青春抱冰謾刷棲山恥爭奈傾吳是婦人判官㕔新建夀樂堂沈立會稽四面是湖山亭在湖山勝絶間欄檻旋移芳草種襟懷長伴白雲閒乍登頓覺詩毫健縱賞惟憂酒量慳更是人生最榮處綵雲朝暮奉慈顔登會稽山孫逖稽山碧湖上勢入東溟盡煙景晝清明九峯爭隱嶙望中厭朱紱俗內探𤣥牝野老聽鳴騶山童擁行軫仙花寒未落古蔓柔堪引竹澗入霜多松崖向天近雲從海人去日就江村隕能賦丘嘗聞和歌參不敏冥搜信沖漠多士期標準願奉濯纓心長謠反招隱採蓮曲李白若耶溪傍採蓮女笑隔荷花共人語日照新粧水底明風飄香袂空中舉岸上誰家遊冶郎三三五五映垂楊紫騮嘶入落花去見此踟蹰空斷腸採蓮賀知章稽山罷霧鬱嵯峨鏡水無風也自波莫言春度芳菲盡别有中流採芰荷春集皇甫秀才山亭孟郊嘉賓在何處置亭春山巔顧余寂寞者謬厠芳菲筵視聽日澄徹聲光坐連綿晴湖㵼峯嶂翠浪多萍蘚何以逞髙志為君吟秋天題越臺張洎我愛真人居髙臺倚寥泬洞天開兩扉邈爾與世絶縹眇乘鸞女華顔映緑髮舉手拂煙虹吹笙弄松月森羅窺萬象境異趣亦别何必服金丹飛身向蓬闕粵俗謝景初粵俗嗜海物鱗介無一遺蝦螺味已厚况乃蟹與蜞潮來浦嶼漲遮捕張籓籬潮去沙滿灘拾掇盈籬箕殺烹數莫記瑣碎臭且竒苟務貪咀嚼寧識暴殄悲蛟蜃吐雲氣腹以人為飴呀口日肥大洪波誰敢窺判官㕔新建夀樂堂蘇軾青山偃蹇如髙人常時不肯入官府髙人自與山有素不待招邀滿庭户卧龍蟠屈半東州萬室鱗鱗枕其股背之不見與無同狐裘反衣無乃魯張君眼力覷天奧能使荆棘化堂宇持頤宴坐不出門收覽竒秀得十五才多事少厭閒寂卧看雲烟變風雨筍如玉筯椹如簪强飲且為山作主不憂兒輩知此樂但恐造物怪多取春濃睡足午窗明想見新茶如潑乳雲門寺濟公上方偈鮑防已酉歲僕忝尚書郎司浙南之武時府中無事墨客自臺省而下者凡十有一人會雲門濟公之上方以偈者贊之流也始取於佛事云護戒刀偈剖妄妄絶決機機壞彼堅剛刀護聲聞戒茗侣偈李聿采采春渚芳香天與滌慮破煩靈芝之侣芭蕉偈杜奕幽山淨土生此芭蕉無心起喻覺路非遙山啄木爾禽啄木惡蠹傷木愈木無病巢枝自足澡瓶偈靈圎取相塵垢是澡定水清淨救彼熱惱山石榴偈鄭槩何方而有天上人間色空我性對爾空山漉水囊偈杜倚裂素成器給我救彼密淨圓靈護生潔水藤偈李雍得彼柔性契兹佛乘豈無衆木我喻垂藤薔薇偈崔泌護草木性植彼薔薇眼根不染見爾色非班穀杖偈護性維戒扶身在杖動必由道心無來往題天章寺偈任逵降伏心住自在心住有心且住無心即住會稽掇英總集卷十五
