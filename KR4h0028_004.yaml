body:
  text: 會稽掇英總集卷四宋孔延之撰山水中剡中道經云兩火一刀可以逃言多名山可以避災也故漢晉以來多隱逸之士沃洲天姥皆其處也律詩宿沃洲山寺魏徵崆洞山叟到江東荷杖來尋支遁蹤馬迹幾經青草沒仙壇依舊白雲封一聲清磬海邉月十里香風澗底松何代沃洲今夜興倚欄來聽赤城鐘知袁郎中破賊後經剡中山水皇甫冉武庫分帷幄儒衣事鼓􅤯兵連越徼外寇盡海門西節比全疏勒功當雪會稽旌旗回剡嶺士馬濯耶溪受律梅初發班師草未齊行看佩侯印豈得訪丹梯舟行入剡崔皓鳴棹下東陽回舟入剡鄉青山行不盡緑水去何長地氣秋仍濕江風晚暫涼山梅猶作雨溪橘未知霜謝客文逾盛林公未可忘多慙越中好流恨閲時芳别儲雍之剡中李白借問剡中道東南指越鄉舟從廣陵去水入會稽長竹色溪下緑荷花鏡裏香辭君向天姥拂石卧秋霜剡中有獻并序秦系系家於剡山向盈一紀大厯五年人以文聞於鄴守薛公無何奏系右衛率府曹參軍意所不欲以疾辭免因將命者輒獻斯文由來那敢議輕肥散髮行歌自採薇逋客未能忘野興辟書今遣脫荷衣家中匹婦空相笑池上羣鷗盡欲飛更乞大賢容小隱益看愚谷有光輝路入剡中作方干戴灣衝瀨片帆通髙枕微吟到剡中掠草並花憐燕子停橈獨飲學漁翁波濤漫撼長潭月楊栁斜牽一岸風便擬乘槎應去得仙源直恐接星東和剡縣陳明府登縣樓方干郭裏人家如掌上簷前樹木映窗櫺煙霞若接天台地分野應侵婺女星驛路古今通北闕仙溪日夜入東溟綵衣才子多吟笑公退時時見畫屛雨霽剡溪錢昭度剡溪風雨霽航葦重行行到處楊栁色幾家荷葉聲噪蟬金鼎沸遊水玊壺清最喜魚梁伴歸帆的的輕剡溪唐郎中所居趙湘古栁垂溪水當門繫雪舟開池延白鳥掃樹帶清秋閣上看華頂忩中見沃洲尋常投刺少來即是詩流剡郊野思林槩密樹芳穠碧草齊春華微度緑隂低溪連嵊水興何盡路接仙源人自迷落絮有情風上下好花無語日東西故園桃李經年别一望歸心繞翠蹊丁中允宰剡陸經塵土官曹幾處間今君得邑好開顔落帆直向剡溪口入境先登天姥山魚鳥半和風俗處雲霞多雜簿書間雪晴須去尋安道不作經宵興盡還自諸暨抵剡四首吳處厚莫嘆塵泥汨且圖山水遊維峯天姥翠一舸剡溪秋不見戴安道有懷王子猷西風無限意盡屬釣魚舟其二夷猶雙槳去莫不辨東西夕照偏依樹秋光半落溪風髙一鴈小雲薄四天低莽蕩孤帆卸水村楊栁堤其三秋渚橫空碧秋山刷眼青排頭煙樹老撲靣水風腥上瀨復下瀨長亭仍短亭夜船明月好客夢滿流螢其四出得雲門路風悽日夕曛船撑鑑湖月路指沃洲雲山色周遭見溪流屈曲分一觴還一詠誰似右將軍古詩剡溪行却寄新别者朱放潺湲寒溪上自此成離别回首望歸人移舟逢暮雪頻行識草樹漸老傷年髮唯有白雲心為向東山月剡溪舟行六言朱放月在沃洲山上人歸剡縣溪邊漠漠黃花覆水時時白鷺驚船晚泊嶀浦寄剡縣劉貺貟外潘閬曉泛剡溪水晚見剡溪山徘徊駐行棹待月思再還漁唱深潭上鳥棲髙樹間應當金石交念我無暫間贈剡溪桃源宫王道士沈遘我昔剡溪逰道人一相遇重來十歲餘顔色宛如故顧我病衰早鬢毛已蒼然乃知世上榮詎若山中間道人家東都問胡不歸北北方多風塵素衣化為黑斯言吾所信吾志亦江湖瀟灑會稽守平生欣莫如君恩容苟安願奉三年計幸爾數到城間談北方事遊沃洲山真封院并序吳處厚越山惟沃洲最著樂天之記詳矣晉人喜曠達而尚清虛故山水之遊一時特盛在九江廬阜則浮屠慧逺為之主而宗雷輩十有八人從之在剡之沃洲則浮屠支遁為之主而王謝輩亦十有八人從之要皆遁世避地相與為方外之適耳余嘗厯九江浮潯陽過於柴桑之間訪其所為東西二林者而慧逺宗雷之迹往往猶可辨識倣徨不能去者久之念沃洲窟於一隅無因而至上下其心者數矣近偶祗役於新昌初甚不慊徐而聞沃洲乃在其境遂挈而東不憚奔走頓撼之勞欲促償其願又且幸為沃洲一時主人也一日風甚寒天姥盛雪適會邑有移文乘興便往值暝不及遂宿於梅林僧舍平明過真封院先至養馬坡陟鵝鼻峯入門謁道猷影堂訪攴遁庵基觀錫杖泉前眺放鶴峯徘徊而還大扺山川氣象皆荒替雕落非鄉時所聞之沃洲也雖然環抱之意趣奔驟之態度尚皆一一可愛乃知古人選勝皆有所謂唯嗜山之深者知之不可為俗人言也因為古格長韻以紀之云幼年曽讀樂天碑及壯亦覽髙僧傳聞有沃洲風景佳腳未能到心空羡近至新昌披縣圖此山乃在吾廏圈想像時時挂夢魂欲一逰之念無便夜來人報天姥雪今日趂晴初出縣酸風瞥瞥吹我鬚寒氣稜稜刮人靣半膝短衫翩以輕獨腳小􅀢快而健不知路入幽澗長但覺山隨白雲轉靠昏投宿梅林村侵卯便過真封院新霜滑澾行李難一步一住一回眩養馬坡前秋草黃駿骨已埋無復見放鶴峯頭樹影孤鶴不來歸雲漫漫入門觸物皆荒涼塵几蠧經三五卷鴟鴉呌噪繞生臺野色毰毸集寒殿老杉千尺惟空腔猶有枮藤半縈纒憶昔江左全盛時十有八人皆俊彥或吟或嘯或遨嬉不覺回頭唾纓辨林泉耽味久成癖魚鳥留連老忘倦前有道猷後法潛錫杖卓泉堅志願晚則道林經構之左右前後遂完繕煙霞一窟直幾錢買醭商量價何賤聚徒數百日髙談供有香花齋有麵嵗時浸久山浸荒種粟燒畬耕堀遍茂林髠􅀢無幾存奔蕩周回空一片惟餘溪水清汪灣百匹秋光㵼寒綀古今興廢盡如斯欲去便人還戀戀天姥律詩登天姥李敬芳天姥三重嶺危途繞峻溪水喧無晝夜雲暗失東西問路音難辨通樵迹易迷依稀日將午何處一聲雞古詩夢遊天姥峯李白海客談瀛洲煙濤微茫信難求越人道天姥雲霓明滅或可覩天姥連天向天橫勢拔五嶽掩赤城天台四萬八千丈對此欲倒東南傾我欲因之夢吳越一夜飛度鏡湖月湖月照我影送我至剡溪謝公宿處今尚在淥水蕩漾青猿啼腳著謝公屐身登青雲梯半壁見海日空中聞天雞千巖萬壑路不定迷花失石忽已暝熊咆龍吟殷上聲巖泉栗深林兮驚層巔雲青青兮欲雨水淡淡兮生煙列缺霹靂丘巒崩摧洞天石扉訇然中開青溟浩蕩不見底日月照耀金銀臺霓為裳兮風為馬雲之君兮飄紛紛而來下虎鼓瑟兮鸞回車仙之人兮列如麻忽魂悸以魄動恍驚起而長嗟惟覺時之枕席失向來之煙霞世間行樂亦如此古來萬事東流水别君去何時還放白鹿青崖間須行即騎訪名山安能摧眉折腰事權貴使我不得開心顔題天姥僧靈徹天台衆峯外嵗晚當寒空有時半不見崔嵬在雲中五泄山律詩五泄瀑布也在諸暨西四十里有兩山夾溪造雲壁立高二百丈廣數十丈水㵼五節故曰五泄下有龍湫嵗旱請雨輒應寺曰應乾山多竒峯或比之雁蕩云遊五泄山劉述翠屏千疊水潺潺一簇青鴛杳靄間惜是晚年逢此境到任二年後方遂此遊悔將前眼看他山瀑飛蘿磴終難畫龍蟄巖雲秪暫間薄宦勞人無計住可嗟歸去又塵寰同前唐詢尋徹靈潭第五源旋攀蘿蔦至山巔寒聲昔謂來天外巨壑今知在目前峭壁無時長蔽日重巖不雨亦生煙臨觀已覺塵心盡更欲凌雲訪列仙其二遊遍西潭返步遲亂雲隨履雨沾衣山形相向還相背獨有溪流共我歸同前刁約西源窮盡到東源直注層崖五磴泉真境無繇追汗漫勝遊聊得弄潺湲風生虎嘯層巖底月上猿啼古木顛秖待歸休林下去來同靈默此安禪同前吳處厚煙霞一塢兩山源石壁寒垂瀑布泉人事是非空繚繞水聲今古自潺湲月留吟客眠寒榻風送樵翁下翠巔檀篆未消爐火燠夜長人靜好談禪招通判沈興宗遊五泄丁寶臣路緣蘿蔦蔭杉松翠壁丹崖不計重天作錦屏環十里僧開朱屋面千峯花間越鳥鈎輈語溪外秦人髣佛逢早晚車騶到山下籃輿多日待追從遊五泄書呈完夫節推丁寶臣莫厭幽尋路險辛細思容易是山神能收地巧藏深處不惜天竒示俗人古有少陵吟未到今無摩詰畫難真海邊見説天童好秖待君詩判等倫四明惟天童景號竒絶完夫言回日當遍遊諸山和胡宗愈喜陪詩伯尋幽去從此風騷覺有神明代應無高遁士竒峯盡屬苦吟人欲名地巧題難得却恨圗經説未真回想天童山迤邐更多形勝亦非倫留題洞巖宋禧翠巖仙洞白雲深躡石捫蘿一訪尋真馭不逢山色暝澗風吹袂冷森森古詩同前劉述英英洞口雲觸石才一縷須臾遍空山霈然作靈雨萬物一以澤孤蹤無處所我心良所珍作詩以自矩五泄山三學院十題并序僧咸潤豫從佛業智者教動息欣山水之樂嘗聞永嘉雁蕩名甲宇內咸平中卷衣而遊果見松石之怪峯嶺之秀綽然天造而彌年歌詠不足且謂越中山水名而不實洎寶元二祀中秋月因報恩智仁法師率遊郡之句無五泄山其山去縣不逺一舍平川孤起怪峯顛巒轉入轉幽駭悅心目不覺喟然曰豫之居越而不知越有兹勝槩者何異魯人不知仲尼之聖耶方之雁蕩諒無慚焉遂抽軋思偶成十題雖辭理無趣姑俾坐談越絶山水為不誣矣噫謝公白氏樂稱天下林泉而兹山吟詠無聞者蓋僻而且深匪遘昔賢之留盻爾亦猶君子守道丘園為時之所棄者良可惜哉題成於應乾蘭若序五泄飛泉成五級一級一龍湫削出萬仭秀詎讓蓬萊丘西源造化鑿坤維千巖鬬空碧有時雲雨開殘陽落幽石夾巖一徑數里間巉巖鎮幽谷中夾清溪流白雲長斷續龍井寒井深無極人謂藏虬龍嘗聞救炎旱絲雨灑長空石鼓巨石平如掌天然狀鼙鼓擊之還有聲分明含太古石門雙峯起雲際髣佛五侯門煙霞鎖不開曾無車馬奔石屛峭石狀危屏截斷諸峯清白雲觸不飛仙掌空遺名俱胝巖有僧持誦俱胝呪於此因得名焉昔人持此呪巖坐嵗寒深梵言不復聞雅名流至今禱雨潭嘗聞越邑民禱雨碧巖畔神龍如有期為霖通旱暵摘星巖捫蘿梯峭石直上青雲端咫尺星斗光冷射人心寒石傘峯律詩銘附玊笥山書堂石傘峯放夫銘顧況亭亭石傘有物有名如蓋若傾如芝一莖又如搖袂拂著上清俯踏不平仰捫雲行石傘山東山銜日宮石傘山西山銜月宮南巒北阜首出屹雄千里在掌五更見日我來豫疾毛豎汗出齊侯賁趾以隱為榮往往洞穴聞金奏聲橡栗裊險猿猴相爭喬木千尋凡人幾生芳樹冽泉懵夫惶愡螺旋錦沓鶴鳴山空杳兮神乎不宰其功石傘峯書堂齊唐傘峯一片﨑危石枕在青冥絶壁間人作鹽梅資世濟迹留巖岫與雲間露盤高出長年殿羽蓋斜臨宛委山藐矣諸孫愧前躅但開三徑掩柴關同前祖無擇伊人高步接夔龍舊隱荒涼石傘峯莘野躬耕聞往事傅巖代築見遺蹤草茅豈合淹崇業竹帛終能紀茂庸朝暮油雲膚寸合何妨霖雨遍三農同前元綘竒峯如繖見遙青玊笥山頭地有靈三徑荒涼丞相隱一篇清絶放夫銘孤標竦處天門近直影圓時日御停誰躡巖梯訪遺迹逺孫高謝在鴻冥古詩登石傘峯并序陳諫中書侍郎平章事髙陽齊公昔遊越鄉閲玩山水者垂三十載初棲於剡嶺後遷於玊笥自解薜此山未二紀而登台鉉乃施舊居之西偏為昌元精舍其東偏石傘巖付令弟秀才推俄而中書即世推髙尚之致文行之美與伯氏相侔至元和九年秋九月七日浙東亷使越州牧兼御史中丞楊公洎中護軍王公率僚佐賔旅同遊賦詩紀登覽之趣小子承命序其梗槩以冠篇竊謂斯地也斯文也必傳於後世與蘭亭東山俱為越邦之不朽者矣詩齊推能以郡中暇不遺塵外蹤嘯儔得鴛鷺揮策入雲松緣徑歷空際望崖來劍峯況當會天人復此陳歌鐘賤子固多癖偶兹安一峯步林欣有適築室幸可容寧期樵牧處忽與軒蓋逢仰荷髙興屬俯慙危磴重攀幽破巖靄踐滑觸苔封秋景山光動寒叢菊豔濃賞心愜觴酌逸韻陶襟胸仍叨勒名氏永紀今所從答楊於陵夙志慕遐嶠偶時叨撫封幸兹秋成候得與心期從宛在洲渚外稍躋林嶺重紫垣感嘉惠丹壑暢幽蹤之子綽有裕結廬枕前峯亭臺互虧蔽物象分輕濃玊傘踐危石苔枝棲古松登攀逐羣彥息偃慙衰容閶闔如可接靈仙疑暫逢海帆去的的霜雁來噰噰赫奕護軍重導迎禆將恭回舟遲新月鼙吹引疏鐘同前王承鄴作鎮得良牧撫戎慙匪仁每觀龔黃化煦物如陽春政簡自多暇遊從邀衆賓鳴騶鏡水畔捨棹耶溪津偶兹逢勝境頓覺離囂塵丞相築室在季方結廬新登臨經絶頂矚眺怡心神金章照玊傘龍節陵松鱗笙歌入中流鼙角聞城闉更吟瓊瑤篇願言書諸紳同前陳諫賢相昔未遇耶溪藏卧龍宛然東山居已韻西林鐘仲氏亦遐曠爾來習髙蹤楊公偶間暇中貴同遊從曲渚擁騶馭回潭轉艨艟既登寅緣岸遂踐岧嶤峯徑側縈巨石磴危攀茂松傘開自羅列笥閉誰緘封迥立霄漢表俯看巖嶂重逺村暮杳杳秋海晴溶溶染翰紀勝絶飛觴暢心胸仍聞待新月歸棹何從容同前衛中行威鳯昔未起兹山嘉氣深逶迤抱川阜蘿蔦方沈沈龍節梢巖徑星軒伴幽尋嘗聞謝公事今嘉昭曠心絶頂上巍峩秋晨好登臨蘆洲辨微色天籟聞虛吟支策睇歸潮舒情凝逺岑徘徊繞靈傘登坐延芳襟溪路鎖重扃松門交翠隂貞􅐾在空谷瑞色仍棲林晚靄覆回汀輕橈環碧潯探竒幸陪唱願繼咸池音同前路黃中總戎詣幽勝天使相追隨躋山玊笥號到峯石傘竒接武白雲表放情玄月時恬曠薄沆瀣峻極超崦嵫平視羲和轡俯觀朝夕池巖中復何揖坐位多所宜郁烈桂香眇寅緣霞彩披孤光逗綺翼獨秀分瓊枝靈氣達心久華容招目移遂忘日云暮登降不知疲眷言丘壑士養節松竹滋感激旌蓋顧于以獻貞詞會稽掇英總集卷四
