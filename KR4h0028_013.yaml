body:
  text: 會稽掇英總集卷十三宋孔延之撰傷越陸龜蒙越溪自古好風煙盜束兵纒已半年訪戴客愁隨水逺浣紗人泣共埃捐臨焦賴灑王師雨欲墮重登刺史天早晚山川盡如故清吟間上鄂君船自洛之越孟浩然遑遑三十載書劍兩無成山水尋吳越風塵散洛京扁舟泛湖海長揖謝公卿且樂杯中酒誰論世上名會二同年白居易一樽聊接故人歡百嵗堪嗟鬢漸殘莫見白雲容易愛照湖澄碧四明寒春日思歸王翰楊栁青青杏發花年光誤客轉思家不知湖上菱歌女幾箇春舟在若耶越中攬古李白越王勾踐破吳歸義士還家盡錦衣宫女如花滿春殿只今唯有鷓鴣飛越溪怨後朝光越王宫裏如花人越水溪頭採白蘋白蘋未盡人先盡誰見江南春復春越中言事咸通八年琅琊公到任後作方干異術間和合聖明湖光浩氣共澄清郭中雲吐啼猿上山上花藏調角城香起荷灣停棹飲絲垂栁陌約鞭行遊人今日又明日不覺鏡中新髮生其二雲霞水木共蒼蒼元化分功秀一方百里湖波輕撼月五更軍角慢吹霜沙邉賈客喧魚市島上潛夫醉筍莊終歲逍遙仁術內無名甘老買臣鄉南遊感興竇鞏傷心欲問前朝事唯見江流去不回日暮東風春草緑鷓鴣飛上越王臺懷會稽錢昭度斗牛星外翻成夢巢鳥枝南略寄身越國荷花八百里别來誰是採蓮人憶越州陳堯佐越絶溪山第一州畫圖城郭幾淹留間思禹廟斜回首髣佛雲端見郡樓悼賢詩并序劉彛越州剡縣超化院皇祐辛卯春豫寄居是邑民方阻飢流莩千里集於城下縣令祕丞過公彥專勸誘豪族得米二萬斛以救民明年又飢遂出常平錢萬緡請糴於明歸以剡價中官取其贏米幾萬斛繼續民今尚憚其不給也乃刻俸麥七十斛為種而假超化院左僧民之田十餘頃役飢民耕種之明年得大麥五百餘斛嗣給流民各俾歸業熙寧己酉春余倅永嘉就移湖北道出剡溪民有懷過公者尚皆感泣而院僧聞其云亡尤增痛悼因書屋壁繼以詩良疇十頃接晴煙曽假過侯救旱年俸麥一車開德濟流民千里荷生全人嗟逝水今亡已俗感遺風尚泫然獨對老僧談舊事斜陽春色漫盈川越溪懷儼老蘇舜欽擊槳轉山曲雲間溪更深鳬鷗帶波起藻荇共魚沈上國久離意故人相念心天涯逢絶景不得對清吟越中懷古魏庭堅句無亭下駐驂騑鑑水寒光照客衣張翠鄂君舟上去浣紗西子網中歸禹祠草樹空春色秦望風煙半夕暉王謝勝遊何處問茂林修竹尚依依墨池懷古楊蟠書畫嘗聞晉右軍當時深遁樂天真空山寂寞人何在一水泓澄墨尚新靈運也思輕印綬季鷹還解憶鱸蓴髙風敻古應相照共是知幾此避身憶越楊蟠蓬萊閣面對青山地上遊人半是仙漁浦夕陽橫挂雨鑑湖春浪倒垂天髙城尚鎖當時月故殿空留幾處煙長愛剡溪堪乘興雪中曽棹子猷船過始寧故墟謝靈運束髮懷耿介逐物遂推遷違志似如昨二紀及兹年緇磷謝清曠疲薾慙貞堅拙疾相倚薄還得靜者便剖竹守滄海枉帆過舊山山行窮登頓水涉盡洄沿巖峭嶺稠疊洲縈渚連綿白雲抱幽石緑篠媚清漣葺宇臨回江築觀基曽巔揮手告鄉曲三載期還旋且為樹枌檟無令孤願言往臨川憶始寧山中謝靈運采菱調易急江南歌不緩楚人心昔絶越客腸今斷斷絶雖殊念俱為歸慮款存鄉爾思積憶山我憤悶追尋栖息時偃卧任縱誕得性非外求自己為誰纂不怨秋夕長恆苦夏日短濯流激浮湍息隂倚密竿懷故叵新歡含悲忘春暖悽悽明月吹惻惻廣陵散殷勤訴危柱慷慨命促管蘇州李中丞以元日郡齋感懷詩寄微之及豫輒依來篇七言八韻走筆奉答兼呈微之白居易白首餘杭白太守落拓拋名來已久一辭渭北故園春再把江南新嵗酒杯前笑歌徒勉強鏡裏形容漸衰朽領郡慙當潦倒年鄰州喜得平生友長洲草接松江岸曲水花連鏡湖口老去還能痛飲無春來曽作間遊否憑鶯傳語報李六倩鴈將書與元九莫嗟一日日催人且貴一年年入手除官赴闕留贈微之白居易去年十月半君來過浙東今年五月盡我發向關中兩鄉默默心相别一水盈盈路不通從此津人應省事寂寥無復遞詩筒遣興杜甫賀公雅吳語在位常清狂上疏乞骸骨黃冠歸故鄉爽氣不可致斯人今則亡山隂一茅宇江海日凄涼壯遊杜甫往昔十四五出遊翰墨場斯文崔魏徒崔鄭州尚魏豫州啓心以我似班揚七齡思即壯開口詠鳳凰九齡書大字有作成一囊性豪業嗜酒嫉惡懷剛腸脫略小時輩結交皆老蒼飲酣視八極俗物都茫茫東下姑蘇臺已具浮海航到今有遺恨不得窮扶桑王謝風流逺闔廬丘墓荒劍池石壁仄長洲荷芰香嵯峨閶門北清廟映回塘每趨吳太伯撫事淚浪浪枕戈憶勾踐渡浙想秦皇蒸魚聞匕首除道哂要章越女天下白鏡湖五月涼剡溪藴秀異欲罷不能忘歸帆拂天姥中歲貢舊鄉氣劘屈賈壘目一作日短曺劉牆忤下考功第獨辭京尹堂放蕩齊趙間裘馬頗清狂春歌叢臺上冬獵青丘旁呼鷹皂一作紫櫪林逐獸雲雪岡射飛曽縱鞚引一作跋臂落􅒗鶬蘇侯據鞍喜監門胄曺蘇預忽如攜葛強快意八九年西歸到咸陽許與必辭伯賞一作貴遊實賢王曳裾置醴地奏賦入明光天子廢食召羣公會軒裳脫身無所愛痛飲信行藏黑貂不免敝斑鬢兀稱觴杜曲晚一云換耆舊四郊多白楊坐深鄉黨敬日覺死生忙朱門任一云務傾奪赤族迭罹殃國馬竭粟豆漢有太常三輔粟豆官雞輸稻粱舉隅見煩費引古惜興亡河朔風塵起岷山行幸長兩宫各警蹕萬里遙相望崆洞殺氣黑少海旌旗黃禹功亦命子涿鹿親戎行翠華擁英一云吳嶽螭虎噉豺狼爪牙一不中胡兵更陸梁大軍載草草凋瘵滿膏肓備貟竊補衮憂憤心飛揚上感九廟焚下憫萬民瘡斯時伏青蒲廷爭守御床君辱敢愛死赫怒幸無傷聖哲體仁恕宇縣復小康哭廟灰燼中鼻酸朝未央小臣議論絶老病客殊方鬱鬱苦不展羽翮困低昻秋風動哀壑碧蕙捐一云損微芳之推避賞從漁父濯滄浪榮華敵勳業嵗暮有嚴霜吾觀鴟夷子才格出尋常羣凶逆未定側佇英俊翔還自會稽歌并序李賀庾肩吾於梁時嘗作宫體謠引以應和皇子及國世淪敗肩吾先潛難會稽後始還家僕意其必有遺文無得焉故作還自會稽歌以補其悲野粉椒壁黃濕螢滿梁殿臺城應教人秋衾夢銅輦吳霜點歸鬢身與塘蒲晚脈脈辭金魚羇臣守迍賤唐施肩吾仙居有感陳堯佐幽居正想餐霞客夜久月寒珠露滴千年獨鶴兩三聲飛下巖前一枝柏觀上林垍器謝景初作竈長如丘取土深於塹踏輪飛為模覆灰色乃紺力疲手足病欲憩不敢暫發窰火以堅百裁一二占里中售髙賈鬭合漸收斂持歸示北人難得曽罔念賤用或棄撲爭乞寧有厭鄙事聖猶能今豫乃親覘寓懷會稽吳道子遇因師鮑當隱淪與釋子時豫久往還覽照不自認况復思君顔昨日山書至乃夢雲蘿間何必風韻息始覺萬境間覆驗餘姚道中王存一夫死非命滌驗更兩吏一囚坐法誅三覆與衆棄去年交址敗殺戮無賤貴江淮屢歲眚積殍溝壑穢聖人於赤子愛重若彼至謹小以遺大誰其原帝意范蠡陸龜蒙平吳専越禍胎深豈是功成有去心勾踐不知嫌鳥喙歸來猶自鑄良金泊舟苧蘿山際題西施石王軒嶺上千峰秀江邉細草春今逢浣紗石不見浣紗人浣紗石上女李白玉面耶溪女青蛾紅粉粧一雙金齒屐兩足白如霜文種墳石延年至忠惜甘死越塞一墳孤勾踐非王者陶朱亦大夫碑經山燒斷樹帶海潮枯泉下伍貟輩相逢相弔無王右軍李白右軍本清真瀟灑在風塵山隂遇羽客要此好鵝賓掃素寫道經筆精妙入神書罷籠鵝去何曽别主人越女辭李白長手吳兒女睂目豔星月屐上足如霜不著鴉頭襪其二吳兒多白晢好為蕩舟劇賣眼擲春心折花調行客其三耶溪採蓮女見客棹歌回笑入荷花去佯羞不出來其四東陽素足女會稽素舸郎相看月未墮白地斷肝腸其五鏡湖水如月耶溪女如雪新粧蕩新波光景兩竒絶西施李白西施越溪女出自苧蘿山秀色掩今古荷花羞玉顔浣紗弄碧水自與清波間皓齒信難開沈吟碧雲間勾踐徵絶豔揚蛾入吳關提攜館娃宫杳渺詎可攀一破夫差國千秋竟不還經西施浣紗石胡幽貞徘徊浣紗石想像浣紗人碧水澄不流紅顔照之頻自惜絶世姿豈與衆女鄰一朝入紫宫萬古留芳塵至今溪邉花不敢嬌青春越女辭鮑溶越女芙蓉衣浣紗清淺水心驚春色晚不敢思君子君子縱我思寧來逺溪裏越溪女于濆會稽山上雲化作越溪人未破吳王國徒為西子身江邉浣紗伴還金扼雙腕倏忽不相期恩傾趙飛燕妾家基業薄空有如花面嫁盡緑忩人猶自盤金線西施詠王維豔色天下重西施寧久微朝為越溪女暮作吳宫妃賤日豈殊衆貴來方悟稀邀人傅脂粉不自著羅衣君寵益嬌恣君憐無是非當時浣紗伴莫得同車歸持謝鄰家子斆顰安可希弔王右軍宅文并序錢公輔晉王右軍宅于越之蕺山今為浮圖而繪像存焉好事者猶能指墨池鵝池之遺迹而表識其上豫嘗恨東南山之佳水之勝多奪於浮圗氏而衣冠隱淪無一人得之者既過右軍宅擲文以弔之曰晉去今兮千齡未餘彼山峩兮晉賢人之故居故居泯其幾時兮今變化於浮圗嗚呼傷哉絶雲巍岡蔥蔥蒼蒼竹茂草美煙髙氣長古松蓊兮虬盤怪石呀兮虎驤前稽嶺之橫峙兮下鑑水之輝光逺市井之喧卑兮據城壘之低昻春可遊而縱望兮夏可息而淒涼秋可登而感槩兮冬可處而樂康無一時之不得宜兮環一目而周四方真孤髙之所廬兮非醜族之能當生冝形體之放浪兮死冝魂魄之棲藏嗚呼傷哉彼靈何之兮默不聞一怪與一祥果無知兮徒結塞豫之中腸果有知兮奚坐視緇徒之賊戕將後葉之湮淪兮無能振其祖芳抑亂離之荐遭兮百易主而百亡吾固弗得而知兮兹涕泗而倘佯嗟道之衰兮異類蠧侵而日昌嗟越之雄兮豈微一丈夫之勇剛如可贖兮雖萬金可捐萬室可償胡恬夷而莫醜兮往往助資棟梁聊指文於山之側兮將鑱石乎州之堂嗟嗟越人窮千萬春兮吾文之弗忘讀漢書梅子真傳梅堯臣子真實吾祖耿介事炎漢權臣始擅朝忠良被塗炭羣下莫敢言上書陳治亂是時卿大夫曽不負愧汗其文信雄深爛然今可玩危言識禍機滅迹思汗漫一朝棄妻子龍性寧羈絆九江傳神仙會稽隱廛閈舊市越溪隂家山鏡湖畔唯餘千載名撫卷一長歎會稽掇英總集卷十三
