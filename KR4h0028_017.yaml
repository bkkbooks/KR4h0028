body:
  text: 㑹稽掇英摠集巻十七宋孔延之撰王右軍祠堂碑王師乾公諱羲之字逸少琅邪臨沂人也原夫在天呈象箕昴垂其宿在地成物嶽瀆曜其英藴粹含精孕靈誕秘降為人傑君酌其休自黃龍紀德帝軒握大寶之符丹烏啟瑞周儲開氏姓之兆爾其吉駿誠感標秀質於文昌離翦止殺協英圖於武帳既而吕刀慶逺郭筮靈長或瀏瀏風松或爛爛巖電盛哉茂族其昭昭乎繋德象賢為海内之冠冕國史家牒可略言焉曽祖覽清河太守宗正卿光禄大夫即丘子劉德智畧始參宗正蔡義經術初登大夫故得象海括河昇高能賦祖正散騎常侍父曠建威将軍淮南内史建始侯應德璉之規獻入掌禁中韓安國之嚴明才兼閫外公之生也踐得二之機應五百之慶骨鯁清貴鑑裁端疑夷簡澹雅魁梧頺放性敖如也深為從伯大將軍敦丞相導之所器重學摠墳素藝苞流畧書窮八體才贍五能至若垂露崩雲芝英薤葉鸞迴鵲顧之巧虎踞龍騰之勢信可挺拔終古輝映來今者乎我大唐太宗文武聖皇帝甄陶堯舜漂滌羲軒物色賢良夢寐前載萬㡬之暇宏覽典墳得之右軍欣然師範親紆聖㫖製讚論焉其畧曰詳察古今研精篆素盡善盡美其唯王右軍乎心慕手追此人而已斯乃萬代之榮觀也與夫周表商閭漢修樂墓故不同年而語矣時太尉郗鑒負佐命之勲居台鉉之貴使求佳壻于文獻公公令東廂自觀之子侄聞者莫不聳身矜持公獨坦腹而不屑意竟當選矣起家秘書郎石渠奥府天禄仙臺遂非揚雄劉向之才華班固左思之覃思筆削之舉不亦難乎征西庾亮請為參軍累遷長史參豫謀謨摠統綱紀魏陽元之領䄂早歴清階温太真之鮮明遽登英位兼此二美在我公焉遷寧逺將軍江州刺史滙澤西浮潯陽重鎮伊昔南夏埓擬扶風江湖涾湤丞廬嵬崫所以山藪藏疾川澤納汚非無草竊之人實有萑苻之盜下車無何梟音遽革公譽望幼挺才器夙彰聲名洋溢公卿藉甚識與不識莫不引領而思交知與不知咸願舉手而同薦頻召為侍中吏部尚書皆不應命常伯補衮冢宰提衡唐虞則龍作納言漢魏則貂蟬近侍卒不降志保真恬怡荀卿所謂德行髙則驕富貴禮義重則輕王公於右軍見之矣復授護軍将軍亦推遷不拜除右軍将軍㑹稽内史甌越奥區地惟闗輔浙河襟帶秦嶺股肱士女殷繁商旅聯槅一都之㑹氓俗難循公示以威恩孚以誠惠敦學校勸農桑梟雄猾賞㢘孝未踰朞月風化大行然後致書朝端以誡執事詞理鯁亮言㫖切直豈徒賈生流涕孟軻浩然而已哉既而金行不競小人道長興言慷慨峻誓墳塋隨時巻舒闗國隆替即不屑之願徇長往之誠窮逰名山徧歴滄海捐龜組禠龍章練金膏屑瓊蘂濬曲水茂蘭亭開禮賢之館引貞肥之客於是謝安孫綽李統許詢支遁許邁之儔若非闕首謝時即是文章冠代何甞不攀勝慕德夕處朝逰公自為之序以申其志也竟以樂死遂其初情春秋五十有九卒于㑹稽之里第朝野軫慟郡縣傷嗟路泣行號風悲日慘豈徒舂者不相工女輟機而已哉追贈金紫光禄大夫諸子仰遵先㫖固讓不受公有濟天下之心藴公輔之量智度淹曠規模宏逺抱劉琨之氣嗟地狹而不容懐樂毅之才歎主昬而弗用有以知晉室之不延也夫盛德之祀綿于百代公侯之𦙍必復其先自晉迄陳統㑹稽時殆逾數十可謂英英門户矣既而黃旗霸盡紫葢英衰衣冠咸返帝鄉禮樂並歸宸甸子孫流落今為居人十二代孫庭之祐之愔愔善人髙尚其事貞不絶俗隱不違親偃仰琴書逍遥魚鳥雖心懐追逺之道而家迫屢空之恨遂使烝甞久曠享德無依樂毅之後未封若敖之魂遂餒師乾幸因承乏叨佐越藩仰休烈而延聳俯遺塵而景慕敬聚宗族隆構清祠靈宇森邃脩廊轇轕時思之禋再茂如在之敬踰明筌壁葯房曄晨風而轉翠蕙餚蘭藉順四序而流馨北望蕺巖題扇之風更逺東連竹徑養鵞之沼彌清西接邑居朱城麗日南通阡陌翠栁含烟加以萬壑爭流千巖競秀澄湖湛鏡漬星象於波瀾洞穴封金孕靈符於宛委信允常之勝境勾踐之名都焉從十一代孫正議大夫守越州都督上柱國公士希俊師乾八從兄也操行端舉風神朗邁汪汪焉人不能測澟澟然吏不敢犯愛人如父母摘伏若神明春露流滋厮庶銘其巨惠秋霜泛簡豪猾肅其嚴威逰刃有餘雍容多暇乃昌言曰陸機文字猶陳祖德潘岳詞賦先述家風况我族盛門昌首出天下爰自著姓以迄于今莫不儀表三台抑揚二鉉英賢濬發才産光揚苟無述焉寧昭勲績恭承嘉命敢不云乎師乾學非覘古文慙秀異聊申舉一詎述芳猷敬疏無愧之詞庶披文以見質公有七子並有重名晉史詳矣或早終絶嗣或無子國除其有子孫蟬聫以暨今日者其唯黃門乎可以配享祖宗列為昭穆矣又諸與公交遊者英貴特達勲績昭著獨謝太傅乎今配食賓筵矣從十四代孫石城寺僧道敬金庭觀道士道崇研空兩諦覈妙重𤣥入龍藏而㝠搜逰鳯京而賾秘從十四代孫朝議郎行歙州黟縣令爽銅章撫俗墨綬親人惠訓浹於重東謳謡光乎單父從十六代孫𤣥慶令嗣賢文毒師𤣥保家等並晦迹林泉脱屣纓冕追仲長之逸軌慕郭舉之髙蹤共扇家風同宣祖德殫素産頌洪猷勒琬琰於東甌俾庶㡬于南峴其辭曰沂波括地緱嶺干天代載雄傑奕葉英賢三槐繼軌九棘蟬聮盛哉茂族人無間然秦則離翦漢惟吉駿武帳揚暉文昌挺韻象賢踵德誕生英俊汪汪萬頃森森千仞常伯獻替納言喉舌僉曰具瞻是屬明哲竟不降志朝其不屑霜氣稜稜風威切切匯澤西楚稽岫東甌人稱險􅏥俗號輊浮威而不猛善而能柔獄囚靡滯庭事無留有道則仕無道則亡闗國隆替與時行藏屑瓊膏銑晦景韜光山川益秀草樹増芳我唐太宗兮皇王冠文經天地兮武戡亂欽墨妙兮右軍發睿詞兮制幽讚敏兮叨紀綱佐郡未理兮泛沂康欽族祖之休烈峻祠宇兮蕺巖陽明德惟馨兮茂烝嘗子孫不知其所以遂刋石而傳芳漢髙士嚴君釣臺碑梁肅先生諱光字子陵㑹稽餘姚人也名闡于漢光武之世東觀書實載其事當哀平之後天地既閉先生韜其光隠而不見建武反正雲雷既定先生全其道而不屈消息治亂之際巻舒夷曠之域如雲出于山㳺於天復歸于無間不可得而累也則激清風聳髙節以遺後世先生之道可見于是矣或曰人倫大統莫大乎君臣崇德致用莫盛乎富貴而子陵以賤為貴以臣傲君二者其失於教與君子曰不然夫賢哲之道一動一靜動而用者功濟乎當世靜而不用者化光于無窮故許由于堯先生于漢皆不易乎世游方之外俾後之人聞清風而嚮慕焉葢運有㑹事有行伊吕遇湯武而立大功子陵遇世祖而立大名去就不同同歸乎道焉嵗在大梁予涉江自富春而南訪先生遺塵則釣臺尚存仰聆德風刻頌于石其文曰季葉浩浩澆風蕩淳先生栝囊鳥獸同羣四海既平故人為君富貴於我有如浮雲召至禁中告歸江濆下視天子上動星文接輿肆狂孤竹求仁介推山死龔勝蘭焚猗歟先生異乎斯人俯仰世道從容屈伸清谿悠悠白石磷磷遺風是仰終古不冺開元寺律和尚塔碑銘并序釋氏先律師諱曇一字曇𦙍報年八十僧夏六十一以大厯六年十二月七日滅度于越州開元寺遷坐起塔于秦望山之陽制縗㑹葬者以千百數大師本南陽張氏曽祖隋太常恒始家㑹稽之山隂大師誕鍾粹氣聰悟夙發幼學五經因探禹穴至雲門寺遂依沙門諒公出家景龍中剃度尋受具戒天縱辯慧益之以軌儀翕然已為人望矣開元初西遊長安觀音亮律師見而竒之授以毗尼之學又依崇聖寺檀子法師學俱舎唯識從即度沙門善無畏受菩薩戒深道覩奥出類拔萃朞月之間名動京師大師崖岸峻峙機神坦邁體識詳雅應用虚明得三藏之隱賾究諸宗之源底加以素解𤣥儒旁摠厯緯長老聞風而悦服公卿下榻以賓禮由是與少保兖國陸公象先賀賓客知章李北海邕徐中書安貞褚諫議庭誨及涇縣令萬齊融為儒釋之逰莫逆之友其導世皆先之以文行𢎞之以戒定入蘭室而馨香自發臨水鏡而豪髮必鑒不知其所由然矣開元二十六年復歸㑹稽謂人曰三世佛法戒為根本本之不修道逺乎哉故設教以尸羅為主取鄴郡律疏合終南事抄括其異同詳發正義學徒賴焉大凡北際河朔南越荆閩四分之宗自我而盛烈炬之破昏黒羣流之赴淵澤適來之時化行也如彼有為而生乘化而息草木潛潤慈雲無心適去之時處順也如此人世遷轉道存運在瞻望不見寂寥空山哀哉銘曰越水漫漫崇山迴合大師化滅式建靈塔緬慕上士誕修淨法有威有儀不穿不雜德溥化洽雲從海納勒碑垂後千萬億刼大夫種銘并序李觀嗚呼種知呉之可以取知越之可以强而不知身之進退存亡沈吟躊躇以至于非辜哀哉斯由淳德離披衰世難維故獨正者不得以鎮邪獨信者不足以塞疑夫周公孔子聖人也尚有彼婦之歌鴟鴞之詩矧乎其下之人乎然齊桓公終任夷吾晉文公不疑五臣數子者竟能挈五霸之器加二君之身臣無所反側君無所短長下冠列國上尊時王惟齊晉之區區行何道而臻斯之偉歟殆非二君能推心于數子俾數子得不失夫進退存亡者乎使夫句踐既舉全呉乃授霸圖建國之權付種之能必將合諸侯而朝中原提封呉越之邦接跡桓文之勲則句踐為霸君種為霸臣必矣何尚乎浮洞庭去故國為天下之旅人哉甞用種之謀若有之思越人之力尚剋之苟天不永越年越亦不愛種賢越不能䘏其𦙍種是以誅其身噫范生之書未釋于手越王之劒已承其咽哀哉且㑹稽之羞非越能復惟大夫之復大夫之死非長頸背義亦大夫之非智哀哉詢種之名不登于三仁求種之墳不在于九原勒銘以備脱簡終古以慰枉魂銘曰越山嶈嶈呉江滮滮㑹稽之圍姑蘇之讎敵國既亡大夫何哉不知其去空知其來子胥至忠不信於呉鴟夷知機浩然乘桴君胡役役謀國遺軀或曰不然吉凶相賓不有覆車孰懲為臣不有泛舟孰為濟人道無全功用有屈伸冥然陳力得於開巻神能感我彷彿如面往者之悔來者之憲志于𤣥石將懋將唁唐通和先生祖君墓誌銘許鼎先生諱貫字子元范陽人曽祖濟蜀州司馬祖計掌膳郎父斌守真不仕先生性寛平家人州里莫得見其喜怒長短頗覽書傳尤工詩句天才器識少有倫侣益修黃老之術初賀監知章得攝生之妙近數百年不死負笈賣藥如韓康伯近于台州上升徧于人聽元和己亥年先生遇之謂先生曰子寛中而柔外可語以至道也僊家品級如青紫基級不可驟致必以退節為首退節則寡欲寡欲則神逸神逸則無為無不為也反此而求道猶却走以追奔也子其志之後遇今嵗遇爾于小有也乃授斷穀丹經先生盟而受之吞一粟則十年不飢門人得之皆符經訣于是先生道譽喧動公卿耳目求見就謁凡累十人丁酉年鄂侯楊公為華牧張公乞丹於先生先生曰學道先乎飬神然後吞藥藥吏也神君也君逸于上吏勞于下以勞助逸是謂萬畢貫將吞丹也坐忘所思行忘所之却視其身蕭寥希夷所以絶穀十年不飢今張公萬乘柱石百姓父母一物失所必軫於懐欲無勞神其可得乎雖九轉還丹亦無補也公曰其言至矣己亥年秋九月先生召門人聓姪曰二儀者萬有之逆旅兩曜者百靈之燈燭欲燈燭之不曉安逆旅之不去怪矣况賀公之期至矣乃就沐浴如有所候粤八日奄然委化壽九十有五先生夫人胡氏蚤死無嗣一女適張審言無男一女適黃虞卿雖别族姓皆得鳯毛伏覽經法養志丘園聲華藉甚則曰先生無愧矣始刻石子聓與表姪孫謝隲門弟子閔仲孚等議曰昔婁妻諡其夫曰康至今韙之二三子得不以黔妻為式乎我先生聽於無聲視于無形不曰通乎言不訟物之短心不繋時之非不曰和乎謹號通和先生以彰先生之德也何如僉曰俞遂刻號于石其年冬十一月十一日葬于宅東北隅附胡夫人墳右世禮也鼎亦先生所教者奉門人聓姪命為墳表銘曰北西山南東湖水為陵山為洿先生名字終不誣祖先生墓誌序徐鉉門生彭汭江夏人既登第還鄉明年補本郡司倉掾甞豫社祭宿齋于郡之延慶院獨處一室既寢而精爽不寧展轉至四更乃得寐夢一白衣書生入户謂汭曰某甞述少文詞在此室中司倉當見之邪汭辭以未見書生曰試為讀之言訖而去及寤猶四更也因呼僕秉燭周視牆壁間意有留題者而都無所見唯户扇下有石方尺有咫泥土覆之就視彷彿有賀監字乃知此是也祀事既罷命移置階前以水滌之文字依然即進士許鼎所纂祖先生墓銘也問其人云十年前院側數十步官置瓦窰掘地得之掌役者軍吏也不能周知但見其有文因惜不毁而置于是案賀監以天寶二年始得還鄉既而天下多事遂與世絶至于呉越故老亦不能知其所終微彭子之夢則賀監輕舉之跡與祖君髙尚之節皆堙没矣夫史臣不書神仙之事先聖亦不以此為教然其清心鍊氣全神保精冥然與天地合德聖人出於自然賢人可以積習老氏之𤣥㫖不可誣也真靈之意欲使殆庶之士自强不息故必存不朽之迹以示於世此許生所以見夢也彭子性恬淡寡辭安貧好學故能自奮于白屋之下而神交于古人亦可尚也愚甚竒其事因為之序仲淹自丹陽移領㑹稽郡行之日過邵疏逸人溪齋因話照湖事逸人曰客有自江夏寄唐人許鼎所撰祖先生墓誌頗言賀監之異出而示之辭精理逺徐常侍鉉為之别序既抵郡訪天長觀即賀公之舊居也款其真堂卑陋已甚乃命工度材而新之又刻徐公所序之文以廣遊人之觀採焉尚書吏部員外郎知越州軍州事范仲淹述康定元年三月二十日立法華寺戒壇院碑萬齊融或曰佛法東度律教南流而云尸羅波羅蜜者何華言持戒清淨般若波羅蜜者何華言智慧明了故戒為德本萬善以之為生地慧為勝業百福由之以出天聖人以之而修身防非止惡上士以之而度物勸善行慈持之而迷倒是生虚空不可以十指執捉學之而住著為逺日月不可以兩手捫摸信矣二法之難見也如是其有不教而自得天然而自知持象扇而掌數明珠據龜牀而心照清鏡則我𤣥儼律師其人也律師俗姓徐氏晉室南遷因官諸暨遂為縣族年始十二辭親從師事富春暉澄紹聖元年恩制度人始墮僧數隸懸溜寺律師幼而明敏長而韶令標格峻整風儀凜然迨于弱冠乃從光州諮受具戒後乃遊詣上京探賾律範遇崇福意律師及融濟律師皆名匠十方南山上足咸能昇堂睹隩共所印可由是道尊戒品名動京師安國受記並充太德後還江左偏𢎞四分因著輔篇記十巻羯磨述章三篇至今僧徒逺近傳寫初光州岸公甞因假寐忽夢神僧謂曰𤣥儼當為法器云何教以小乘後乃命𢎞般若由是研精覃思採摭舊學撰金剛義疏七巻古德所不解先達所未詳咸皆發揮光明若指諸掌誓以一生宜講百徧越邑精舎時稱法華晉沙門曇翼曽結菴曽巔入是法三昧感徧吉菩薩徒觀其塔類多寶涌出以證經宫如轉輪飛行而聽法雙烏所以示兆今尚翔鳴六象所以呈竒時猶隠現不可得而思議者葢斯之謂歟信如來之福庭是菩薩之隠岳大師乃考槃是卜束鉢深棲建置戒壇招集律行若夫秦衡上士燕代髙僧數若稻麻算同竹葦伏膺請益躡屩擔簦宴坐不出㡬三十載開元二十四年我開元天地大寶聖文神武證道孝德皇帝持法鏡握神珠親注金剛般若經詔頒天下普令宣誦都督河南元彦沖躬請律師重光聖日律師闡揚幽讚允合天心令盲者見日月之光聾者聞雷霆之響師之演暢葢有力焉夫樂小法者迷自我而為病通大方者懵開空之法道若㑹夫三歸一觸理㝠事自優波羅已下猶或病諸而律師綱紀小乘演暢大法晤佛境之非有識魔界之為空故能使涅槃將生死一如煩惱與菩薩齊致發心而登佛地非我而誰白黑歸依當仁不讓昔僧䕶法師常居石城宴坐青壁仰其中峯如有佛像願造十丈以圗兜率良願未諧護公長逝梁武皇帝詔僧祐律師馳傳經理規模刻劃意匠纔施俄而山冢崒崩全身坐現合一百五十尺雖金石絲竹四天之供施常聞而功德莊嚴十地之鏤鐫尚闕律師乃内傾衣鉢亦外率檀那布以黃金之色鎔以白銀之相銅錫鈆鍇球琳琅玕七寶由是渾成八珍于焉具足雖寶積獻葢界現三千迦葉貢衣金踰十萬如須彌之現於大海若法日之出於髙山此又律師之功德不可思議者也故洺州刺史徐嶠之工部尚書徐安貞咸以宗族設道友之敬國子司業康希銑太子賓客賀知章朝散大夫杭州臨安縣令朱元眘亦以鄉曲具法朋之禮開元二十六載恩制度人採訪使潤州刺史齊澣越府都督敬誠採訪使盧見義泗州刺史王弼無不停旟淨境稟承法訓齊公乃方舟結乘奉迎律師于丹陽餘杭呉興諸郡令新度諸僧躬受具戒自廣陵迄于信安地方千里緇黃道俗受法者殆出萬人凡禮佛名經一百徧設無遮大㑹十筵而人境住持舉無與比夫秉法傳授從佛口生有門人法華曇俊崇黙龍興崇一開元智符稱心崇義香嚴懐節寶林洪霈覺𦙍灌頂皆不傾油鉢無漏浮囊經不云乎如旃檀林旃檀圍繞如師子王師子圍繞信律師之威神有在而法主之功德不刋嗚乎三界無訛百齡共盡此生已遺于後息他世應見于前心天寶三載嵗次壬午化縁已畢十一月三日現疾於繩牀七日午時坐終于戒壇院春秋六十有八粤其月二十五日窆子寺南秦山之下高樹雙塔光明踰于白雲列植千松秀色羅于明月經始則神邕崇曉住持則惟湛道昭並躬䕶聖場親傳智印其餘二千門人五百弟子承般若之深法受毗尼之密行盡號顓門無待彌勒今並列載碑隂用標律序初律師凶問時余忝外役永懐德音謂如昨日及瞻斯拱木已十有餘秋私念生涯自憐何極庶依神理敢作銘云律師堂堂宗高偃王才華骨貴戒美名香佛國柱石僧門棟梁毗尼玉色般若金光我聞二法難信難解等有開遮平無髙下生生草繋節節支解念電不停身塵自假觀生若幻視息猶風慧明日月戒性虚空不逺無相修行在中善矣真匠賢哉法雄我生已盡梵行已立示化衆生隨縁悟入去來三界無苦無集常行一乘日用斯給哀哀釋子資父惟師痛失瞻仰悲深住持方墳永翳圎塔長辭何時誦現更紹迦維南鎮永興公祠堂碑羊士諤越部凡七郡三十有八邑提封所加旁合溟海由是崇元侯之命建東征之府其鎮曰㑹稽山其神為永興公國朝接周漢之統𤣥化大備禮兹百神受職祀典錫以嘉號視為諸侯貞元九年夏四月連率安定皇甫公以前月丁酉詔㫖奉𤣥玊制幣禱于靈壇動報公之享循每嵗之法致齋野次䖍捧祝冊夜漏未盡禮成三獻君子謂公能宣命以展敬故祀神而降祉克靖甌越大康東南我修德刑以牧黔首神作雷雨用登有年明訓式敷幽贊斯効觀夫髙麓迴抱以蔽景大澤下浸而蒸雲沈潛龍虎之姿泱漭風霆之氣靈衞交㦸閟宫洞門神其在焉寵被侯服是宜札瘥不生水旱罔沴允荅宸慮長于衆山乃銘石壖垣以代彞器其辭曰天秩喬岳奠兹南方精合晦明化滿柔剛帝念下土延神致祥清廟既闢華衮有光乃卜元辰爰詔方伯爾克精享神其昭格蘋薦惟誠金奏匪樂時臻大和人受景福𤣥德孔鑒䖍㳟肅祇陳信不匱形乎正辭呉越國武肅王廟碑銘并序皮光業粤以唐長興七載壬辰春季蓂凋十三莢天下兵馬都元帥尚父守尚書令呉越國王棄捐宫館以是嵗明宗皇帝降太常博士段顒定諡議曰武肅詔尚書工部侍郎楊凝式撰神道碑文宣翰林待詔張季恭至呉越書于刋石後二年嵗在敦䍧天下兵馬元帥嗣呉越王建廟貌于始封之越國禮與境内樂之罔極孝思也葢聞神道設教莫大於郊社嚴禋明德惟馨無逾于祖考孝享是以百代相襲六籍盛稱報劬勞則天保是徴展欽若則王假是訢静况建除難靖亂之業揚武烈之威名振剛德尅勍之風成肅恭之懿號陳力四紀光奉八朝生為有土之君薨立象朝之廟足可睢盱召畢齷齪桓文聲華永而日月齊簡冊徧而今古在矧夫堂成王構家繼國肥壓璧寶以知來出玊林而嗣位髙陽號里無媿前賢夏屋登山常遵治命爰自鄭緇始襲晉墨未除不忍一日之離遂立千年之祀金鎔陽邁己成像于呉城香刻旃檀復祔神于越國恭惟先天下兵馬都元帥呉越國武肅王殷朝籛祖山蕚分枝唐代鄛公靈源直派簪裾軒冕禮樂詩書疊慶連華交光奕葉應邵七世累爵重官羅企一門惟忠及孝其降神也虹飛蜀國始見殊祥魚躍汾河是生竒表赤光耀室黃氣浮空石龜隕下于官山胡人來歸于寶器此二事安國縣父老言也其英姿也鳯文龍藻奐出精神白琥蒼珪琢為標格加之薛璘整峻謝安風流俯仰可觀進退有度慕容德偃月日角光影鑠人李子堅匿犀龜文威儀鎮俗其辭韻也音容洒落智辯鏗輷元善抑揚張暢詳雅至若討論國計談劃兵籌接對使乎撫御將下所謂五河奔注百谷崩騰玊虹起而雲霧銷金虎嘯而風飈動揣摩勝負赫連勃口授懐慙捭闔興亡蘇季子舌端有愧其氣度也志髙建木量等大瀛含垢匿瑕周知邊際求賢接士無怠寅昬重仁義如丘山視玊帛如咳唾翹翹車乘唯在得人憧憧往來皆種和氣所以臯皮豹舄鶴列犀渠咸願殺身用酬大惠變家為國誠由萬化生身以德聚民所謂八風從律其英雄也能知否泰善俟雲雷動必有成舉無遺䇿蛟龍得雨莫測變通鵰鶚出林可知意度其間文武迭用仁義不常平阿亡㦸得矛並能取舎元勰搦蛇騎虎不覺艱難奄有具區廓開霸業設使庾翼復出必不忘譽於桓温阮籍重生安敢輕言于廣武其文學也家承儒範世尚素風侍絳紗帳于先生授白綸巾于神女才通夢寐鳯是吐來志在典經龍鬬不顧所以博覽七緯精究三𤣥盡得津涯皆升堂奥其于篇詠尤著工夫思風起而繡段飄言泉淘而金沙見其札翰也花隨腕下星逐毫飛靄若游雲細疑垂露鉤刀向背未饒索肉芝筋㸃畫方圓髙掩崔肥趙瘦就中濡染牌額益見呈露鋒鋩四方仰之神蹤一代稱之墨寶王逸少若見甘避雁行蕭子雲如逢大慙蟬翼其建大功也唐季乾符之末中和之初海鳬乍揚天鼈初伏塵飛野馬四郊之壘漸多霧暗騰虵五賊之機共構其始者王仙芝結釁中土首構禍階雖已誅夷猶殘支黨自此藂林烏合草澤蜂飛輕薄者固是披攘謹厚者亦為慓悍江南則朱直叛亂于唐山孫端冦孽于安吉西侵宛水東患苕谿郡縣則終日登陴生民則長時伏莽王時郊居葛圃嘉遯茅山即葛仙公種𤓰之地故曰葛圃與茅山相接在臨安縣城東二里方當枕石嗽泉尚是褒衣博帶覩兹多事慨然究懐顧謂朋友曰丈夫當須撥亂平姦豈可懐安端坐是日乃奮戎服挂彼儒冠大散家財廣招勇士申令纔舉行伍肅然手仗義旗身當勍敵一月之内二冦殄平靜千里之山川救兩郡之冰炭是王之初立功也其次黃巢來從五嶺直下三衢展梟翅則電布星羅張鯨牙則山連岳峙所遭蹂踐並作塵灰王迺獨領偏師據于險地既逢大憝遂設竒兵敵望草木叢林皆是戈矛旌幟獲敵人之言也我則左右翼陣㸃化如神當下追奔尚賈餘勇長蛇封豕便出他疆新市下江保安數邑是王之功也其次彭城劉漢宏據南鎮之重地守東越之名區黃巢既犯兩京僖皇乃巡二蜀漢宏不思奔問便廢貢輸恃險阻于淛河欲覬覦于淛岸先于漁浦黿石翼張下營蕭山西陵鱗次列砦烽燧交應鼙鼓相聞時我諸軍實有難色王乃潛趨間道夜濟長江仰告昊天乞昬朗月當下寒雲匝野殺氣凝空楚廟隂兵旁隨霧合晉臣黑幔闇與山連我師忽震于雷霆彼砦俄崩于魂夢風號貔虎爭傳破竹之聲陣巻龍蛇競集建瓴之勢賊將殷輪不暇漂杵有餘僅身免以奔歸乃塞門而自守邇後大小百戰首尾四年方清鏡水之波始有蘭亭之地弔其生聚大布仁慈誅彼渠魁不煩天討是王之功也次則有薛朗逐出周寶自據朱方南襲毗陵西侵建鄴恣其剽勍務在殺傷將乗中國之危擬扼長江之險王乃命二麾上將期一月報功指其山川授以韜略蹄轂並舉水陸兼行曽不旬時計平窟穴裏南宫萬于犀革視以囚人梟崔慧景于鰌籃彰其叛主是王之功也次則有徐約比是六合鎮使既忝三呉郡符玊帛是求徴歛無度長時習戰齊民固被雕黥比屋為軍魯儒亦遭翦削惟王聞其暴虐奮激神威發上谷之精兵命下江之賢將授以九天九地之訣傳以訓辭訓典之規扼斷咽喉清其郊野任約之龍果睡王彌之豹徒飛食窘朝飢無由撫士計窮宵遁遂至潰圍松陵之烟水重清香徑之黎元再活是王之功也次則有孫儒恃有數萬兵甲不守淮南直欲别遷土疆遂有江左刲人民為糧食隳舎宇為薪蘇餓鶻飢鷹飛揚京口貪狼乳虎踐踏吳門漸逼由拳將窺霅水王乃張天網于阻險闢地穽于要衝發水犀之驍雄設燧象之機計青雀摩壘赤兔致師將持久以勝之俟勢窮而必取守陴皆哭無食何為鳴鼓而攻脱身遂去向使不施神畧不振王威則翼翼最靈皆成膏血茫茫勝槩盡作煙煤所謂劬勞為時廣大及物是王之功也次則有董庶人始鎮石鏡便牧杭州因破漢宏遂居越土自形成象從纖至洪並是王之擐甲執兵左提右挈以至手持旄節身爵王侯既滅頂于彛倫乃垂涎于神器銅符金匱祥瑞亂興玊璽珠袍妖訛競起王以早同楚歃夙共晉盟書尚緘騰血猶濡鍉牋函旁午誘勸交馳諫既閉於屬垣禍遂成于覆族是時兩河倔强三輔紛紜萬象雖拱于北辰一人不遑于南顧王請奉行天罰所統便是國兵不費上供資財不役諸道將帥果見桓𤣥計窘抽玊導以求生王莽勢窮轉銅威而厭勝喉既舂于富父骨復專于㑹稽瀦其故宮焚其法物復我正朔清我寰瀛五石補而天鏡明六合完而地維正是王之功也王以平妖立霸時之業戡難建葢世之功律吕宫商鏘洋史籍丹青金玊奐爛國華所以僖宗天子仰我文昭睠我武烈龍光壓叠急使星馳綸綍便蕃大王風起尋以耿純試理盧植兼才披錦衣以耀家鄉握珪符而光松梓洎于昭皇飛昇大寶禮遇元勲龍悦召雲鳬忻得藻嘉功賞德金鳯之詔連飛表異旌優玊麟之符遂刻移南徐之藩翰就錢塘之江山節竦靈犀帳開神虎三千珠甲光爛星辰十二牙旗文生組繡碧幢纔建黃閤又開乃兼鎮于越藩遂對持于漢節中天辰象雖分牛斗之疆夾岸烟嵐映出東西之宅四縣既食萬户累加棨㦸立門赤油羅列山河誓券丹字熒煌生祠之籩豆鏘鏘衣錦之城隍黯黯而又特逾漢制封我呉王茅分夏社之心桐翦周王之手昔也龍蛇起陸蹈湯火以戰争此際山川出雲見君臣之際㑹逮夫濟隂王既傳天寶梁太祖遂應𤣥苞于王不易范張之故情請結秦晉之嘉好恨無殊禮得展異恩于是追吕望之髙風擬山甫之美躅師尚父統攝三老作帝股肱尚書令摠務萬機為天喉舌仍頌瑞節復陟齋壇建牙兼鎮於揚州分閫遥臨于楚甸尋命兵部姚尚書洎作相躬持鳯冊逺泛鯨波備周官之典儀封越國之土宇八鸞四馬耀鏤錫以振鉤膺三節一王秉桓珪而垂𤣥玊及龍德嗣君即位禮稱伯舅尊曰父師寅敬烈光虔奉顧命是遣吏部李尚書燕捧持綸告繚遶湖湘受天下兵馬都元帥洞庭彭蠡漸無不順之臣北狄西戎將有後予之嘆昔韓信對漢髙祖曰陛下能將將臣能將兵是知元帥非人臣之職曹葢帝王之兵柄推於前代隋煬帝自晉王淮南行臺尚書令祇為行軍元帥天下之號國朝肅宗皇帝駐蹕靈武日命代宗皇帝自廣平王而為之德宗皇帝自魯王而為之梁太祖授九錫後而為之斯天下元帥之故實也其後龍德帝復命兵部崔侍郎恊作相齎持簡冊浮泛風帆揚往典于明庭促及時而建國奉召康公之命得以專征授唐叔虞之封良由吉夢未久金行運息土德中興莊宗皇帝鵲起并汾龍飛宋汴當宁不逾于旬朔臨軒宣諭于公卿曰吳越國王五十年来常作榰天之柱三千里外每為捧日之雲今若將致小康實在敬尊元老于是鸞臺進擬麟趾摛詞典瑞獻功琢白珪而冊文粲爛職金供命鎔紫磨而印篆盤珊重封吳越國王再授天下元帥馬遷十代史内固是絶倫栁𧦬萬巻書中必無往例其建國也大君有命明試以功自癸未而至壬辰備戰器而修王道先是中朝名士在野遺人或負笈擔簦來投霸府或坼𥜗為袴而詣軍門奮䄂于嘉納堂中曳履于靈鈞臺上至此水鏡裁鑒金秤等量並列庭臣皆居省署簪裾列侍文物齊光張伯仁陳宗廟之儀鄭子産獻公侯之禮豈謂難窮者大數莫究者彼蒼俄脱屣于具區遽徹縣于正寢金山霧掩誰知帝召王喬玊海波空實痛神辭李廣况十三州疆場百萬户黔黎咸長養于恩膏悉生成于化澤淚洒而晴空散雨愁凝而杲日沈雲鳥獸悲哀草木慘沮明宗皇帝宣太常而定諡法召二卿而撰誄文鸞輅龍旂贈禮優于鄧禹梓宫黃屋異數等於霍光得謂盡始盡終極榮極貴享九九之仙壽近帝位于一爻感萬萬之人心歆神道于千祀有後如此又何缺焉我天下兵馬元帥呉越王當燕族之多竒承趙宗之後世嵩衡泰華秀氣俱騰淮濟江河榮光共結是時𦙍主誕我國祥紹經文緯武之基襲積德累仁之業開襟奮臆伏雄傑于周瑜誓衆臨戎統人豪于張衮風儀則懸星溢眥紫電揚矑霜雪凝肌魚龍入髮仙應有分貴不可知宋弁聲姿尤閑進對竇融詞氣唯是卑恭加以青雲常在于言談畏日不離于顧盻徐行緩步禇彦囬却是趨蹌散幘斜簪王文憲殊非藴藉智畧則鮑叔錐矢應手而來顧和珪璋遇機方露逺者大者一剛一柔靜則心照鏡而貌懐冰含和六氣動則火炎山而湯湧海慴懼萬人機變則管葛才髙孫吳術妙身文虎豹隠見不常義府戈矛短長迭用三雋才既為已任六竒策固是無遺卻縠詩書經綸國計項羽雷電振動兵籌涂睇而莫測金泉旁窺而罔知珠岸詞藻則青霜皓月絡繹綵牋芳草落花飄颺鏤管織成夢錦散出神霞英變屢竒張融之言信矣凌顔鑠謝元葉之論宜然札翰則早受義方曽傳掣筆鸞迴雀反氣勢驚人金錯銀鉤縱橫入木桉牘無非墨陣宫寺爭耀寶牌崔宏之本草無光張育之折蒲失色立功則我王初離太學始統親兵鄭世子方欲平齊汝隂王正思安漢屬隣國侵軼命將曰李濤僅二萬兵下百里砦圍逼安國涎喙餘杭我王䖍奉訓辭遂昇上將清風授式黃石傳書親䝉韓奕之黃羆躬仗封文之白虎攻東南而備西北事在機先掩五壘而出三門别馳神筭于是崩摧大陣擒獲萬人道路隘于俘囚山川積于戈甲餘敵作氣既竭方遁于潛我則乘勝追奔又平廣德未出一百里之境復降五千來人唱凱歌而喜氣連郊整班師而雄風掠地尋即大統龍艦逺泛鼇溟巡江隂而収東州入海門而觀北固彼境遂陳舟楫逺出枝梧我則陳二廣于浪港沙前設三覆于石牌彎内零陵石灰風便爭投于蛟蜃窟中泌水火㭖油燃葬于鯨鯢腹裏一戰定霸二紀無虞寰海具瞻將相迭耀聲光丕顯裴松為廊廟之人功業昇聞段襄居骨鯁之任爰自嗣承國構纘奉王基况當跪箭之初又在寢苫之内芝蘭龍鳯三千餘口之家風鉄石虎貔二十萬人之軍府誠難撫御豈易緝綏我王以孝為模用仁作範無所不可惟言是從嘉惠寵靈供承花蕚油雲膏雨潤澤閨門此外習武益兵輕刑慎罰德無脛而逺届名無翼而遐飛果動大朝繼鍾異寵三年之内兩册連封雙龍之金節齊行四馬之寶車並輾玊具冠劍見王者之尊崇織文旂裳覩國容之貴盛我王因兹顯赫益動孝思無以答先后之恩無以報昊天之德且曰武肅王有大功及天下大名振寰中庇生民而百萬有餘築城壘僅五十來處豈可不建廟貌不像真容為星紀之福宮作地户之神主爰命興武中直都虞候姚敬思于馬榛湖畔勾踐城中選闉闍形勢之中區得顯敞髙平之勝址于是鍬杵俱下畚鍤齊興隠隠雷聲轟轟岳振不十旬而展役帀千丈之隆基大梓文􅀈匪自秦山伐得宏梁巨棟非因漳水飄來雕鐫者王母𤣥圖甃砌者赫連繡石斤揮斧運削出銀葩水鏨沙磨方成玊磶符𤣥武之嘉兆應神蓍之吉辰始乃架險梯虚雲構山屹隂虬迴抱陽馬奔趨虎牙銜而枅栱連龍脊褭而欒櫨轉瓊瑶耀壁丹漆明簷鴛鴦之瓦縫界成芙蓉之塼文印出即以丙申嵗秋八月十有七日我王備鹵簿鼓吹車輅旂常北司侍臣南班舊列奉迎真像而入祠宮白檀雕出聖容黃金鏤成寶座儀形酷類神彩如生鳯月龍章顔猶不破垂旈被衮人見興悲禮器則俎豆犧娑軒懸則柷敔鐘磬後殿翬衣雉服文母賢妃露幔珠屏蝦簾象榻不異昔時秘寢皆同曩日深宮前則廣厦交隂芳亭對構紫石伏狻猊之影朱欄交菡蓞之光正啟重門並立神將侍衞兵仗矛㦸森然文武官班簪裾肅列直出甬道千歩有餘河枕投醪波通射的蓮芰遶于水閣桐桂夾于星橋左則迴抱粉廊連延綺棟並圖曹署各列司存乃至早世勲臣無禄公子皆塑儀像並配薦羞右則脩廡飛甍緑窗丹牖隂兵神馬見雷電而沒風雲明牢淨厨備粢盛而烹肥腯景物則髙杉矮檜粉竹金松夾砌名花連階瑞草烟嵐蓊蔚便是隂宮雲霧濛籠居然神府我王昔以致君之業累殄冦戎今立顯考之祠而修孝敬所以天朝繼封王爵以耀國章黃金印印宇内徴呼元帥帥天下侯伯卓絶殊勲洪業所謂炙地熏天設使書剡谿九萬之牋不能盡紀勒華山五千之仞亦恐難窮光業也詞不夢于王椽才匪量于曹斗擬奚斯之頌或恣麤心對豫章之碑豈合措手但以二紀幕客千載庭臣不求孫綽擅名豈望楊脩絶妙所希編述用答恩知追感先王恭為銘曰崧髙嶙峋是生哲人上天師子出澤麒麟籛尊殷祖鄛𦙍唐臣衣冠表裏文武經綸廣運將新大盜斯起雁象歘驚鳬毛亂委紫葢䝉塵黃巾多壘既斁憲章又裂文軌武肅英王提劍東方龍行雲雨虎變文章孛氣沃酒妖雪歸湯洗滌星紀整頓天常告功狼居圖形麟閣桐珪聯編茅土續索三道犀幢八朝鳯諾丹券家門錦衣城郭元帥天下國王具區六瑞琢册三品鑄符尚父四履尚書萬樞峗峨髙壽曦赫霸圖我王奉天為時而出傳寶應金繼明趙日國士無雙風華第一削樹平戎夢禾受秩功既挺世德又動天襲封二冊嗣位三年金印國寶元帥兵權忠無瑕纇孝絶雕鐫未禠墨衰乃建清廟臥龍之城㑹稽之嶠嵐界逥廊粉明周㙩廣殿霞開重門岳峭瑞玊禮器香檀聖容民之祀主我之神宗秉翟執籥特磬編鐘燃蕭燔膟寘幣輸琮於穆祠宮煥焉隂府五齊恒馨六佾常舞餚薦房烝歌隨路鼓令子懿孫光今顯古陶朱公廟碑吳處厚窮之與達繋乎命用之與舎繋乎時得之與喪在乎天去之與就在乎我四者古君子出處之大節而公皆得而兼之不亦智矣乎公之事業最詳于國語史記與吳越春秋當是之時越與呉相持㡬三十年呉常勝越常敗呉譬則虎越譬則鼠吳譬則狼越譬則羊句踐之命在于夫差掌握中數矣公力與臯如計倪諸暨郢大夫種四人皆越大夫諸臣間闗險阻未甞少變其節乃説句踐卑辭重幣頓顙屈膝籍其管庫質其妻子為呉奴虜及囚石室又説飲溲甞惡以媚夫差而夫差不寤乃伐齊而赦越復貪與諸侯㑹于黃池及越焚姑蘇入其郛猶與晉公午爭長不以為恤既而民疲嵗飢禍稔數極公卒與越之君臣因其困乘其弊一舉而滅之故曰持盈者與天定傾者與人節事者與地此之謂乎君王之恥既雪霸國之業已成在于他人則邑萬户禄萬鍾為師尚父寵之終身固其宜也公獨不然以為功名不可以多得富貴不可以長保瞥然輕舟飄然五湖投紳笏如柴柵棄妻孥如敝屣冥冥而飛汨汨而遊網不能絓繳不能弋烏喙雖長而不能啄屬鏤雖利而不能割存耶亡耶死風波耶葬魚鼈耶泛溟渤登蓬萊而遂羽而仙耶俱不可得而知也徒使越人愛之不忘念之不足鑄金而禮其像環地而封其域與天貪權冒寵市禍賈患而遂脂鼎鑊血刀鋸為魚為肉為葅為醢者豈同年而語哉余甞按越之圖經得公廟于諸暨陶朱山下俗説公本諸稽人今淨觀院即其故宅也鄉曰陶朱之鄉巖曰范蠡之巖井曰鴟夷之井皆以公而得名也年祀夐闊不可得詳廟宇庳窄蕪壊不治屬嵗荐飢民又乏饗余甞至其下徘徊觀覽惻然于懐者數四葢碑者悲也君子所以述往事悲來今者也因書以為弔焉其辭曰越山疊疊兮越水環環公有廟貌兮山水之間屋三其架兮門鐍戸闗庭墁不治兮鞠草褎菅豚蹄乏饗兮歳歉民慳香火閴冷兮巫休祀門頺廊哽雨兮古木號寒餓鼠晝嘯兮飢鵶暝還功磨日月兮名揭丘山遺像可揖兮髙風莫攀我來愴古兮憤涕一澘秋色著樹兮霜葉初殷青史傳信兮灼不可刪千古萬古兮雲癡石頑蕭山縣正覺院新修浴室銘并序謝絳蕭山正覺精舎有浴室不理邑人王氏扆方理之功未究且卒曰張承祜者喟然歎曰王君長者既倡事吾冝卒其善乃出貲五百緡于主僧繼符募工購材取于精良考室除器既而畢就燂湯五日若合禮經撃鼓十方以集來者納履常滿振衣後出盡祓垢漬以舎吉祥夫人内欲安舒而外必亹㓗二者得之于道未有體幹躁窘而心術平和余不習釋氏言聞其談湢室之利甚著且博或者無加此焉王氏有子殿中丞絲與余同升傷先人之勤且欲有表故余為之叙而系以銘浴乎其不可以廢室壊器亡乃如是誰能興之曰王氏奮然倡先後有繼室完器修無慮備來者疏瀹而滿志幹和心舒道可至浴乎其得以言利㑹稽掇英摠集巻十七
