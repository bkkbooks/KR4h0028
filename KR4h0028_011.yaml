body:
  text: 會稽掇英總集卷十一宋孔延之撰送别律詩送妙明規長老王隨振衣辭帝里歸路指禪林勝絶江山寺澄明水月心卸帆煙浦近鳴磬夜船深到喜清涼境門開松桂隂送髙學士知越薛映晉朝名理漢循良胡粉官闈紫界牆得請仍辭史官筆憶歸重換會稽章間尋嶽寺茶香細盛會江樓鱠縷長官是秋曹俱老大異時同約棹滄浪同前錢惟演粉署為郎鬢雪侵酒酣風駛惜分襟雲迷水館春旗潤樹繞山城暝角深下擔桂鈎傳密意渡江桃葉聽遺音孤鶯啼罷芳心歇倦翼因君憶故林同前楊億萬壑千巖古剡中錦旌朱轂此臨戎酒厨嵗取公田秫樵舸朝分射的風閣吏蒸青藏史牘席賔簪玳奉談叢海邦訟息多幽賞禹穴奇書為一空同前張士遜著撰煩鴻筆均勞利建侯僧隨天際棹郡冠浙東州山影四明接溪聲萬壑流顧長康云萬壑爭流謝家風月在公外稱冥搜同前劉筠浩蕩辭波潤鼠鬚風流談柄藹栟櫚漢臺厭卧郎官錦禹穴思探上世書鶴蓋成隂爭出餞鵾絃促調歎離居由來方任推名輩藻思江山助起豫同前陳知微會稽新命剖魚符又向蓬山鎖直廬林壑縈回多洞府人煙髙下半樓居知音好採柯亭竹博物應探禹穴書公暇仙舟宜按部鑑湖晴色照鄉閭送餘姚知縣陳最寺丞龎籍需頭章薦重方底詔除榮人比鳴琴令官參夢馬卿菰煙吳地景濤鷺浙江程美政應先報姚虞舊俗清同前鄭戩美渥卿為佐清談縣得才人從日邊别舟渡鑑中來食案資鮭稟公田剩酒材秋餘一憑檻江海遍樓臺同前歐陽修銅墨佩腰間中流望若仙鳴蟬汴河栁畫鷁越鄉舷下瀨逢江鴈瞻氛落海鳶山川仍客思盡入隱侯篇同前葉清臣白見恩初渥新遊刃久虛官曹鵲樹下民版象耕餘山迥人逢麂江清客厭魚送君多悵望雲外是親居同前謝絳稍過山隂接甬東正當兩國畫屏中巖巔僧井通江水門外商帆落海風盡日揮絃無一事平時推轂有諸公此行絶勝人人羡莫恨猶懷五兩銅其二愧君來欵關話别憩林間不待風銷暑聊因酒發顔滄洲即欲往清躅暫容攀居者羡行者寄聲思越山同前梅堯臣試邑來勾越風煙復上遊江潮自迎客山月亦隨舟海貨通閭市漁歌入縣樓絃琴無外事坐見浦帆收送大理徐寺丞知諸暨楊億子山辭賦動南朝近佐名卿掌玉條治邑還持麈尾柄攜家便泛木蘭橈謝塘春晝偏多思潘鬢秋風苦未凋種秫公田供酩酊彈琴官舍助逍遙去程千里隨賔鴈宿館三更聽落潮聞道臨安有仙穴莫拋印綬採芝苗送李中舍罷蕭山赴闕吏隱江東五六年歸時猶戀好山川野僧送别攜詩句瘦馬臨岐當酒錢吳苑醉逢梅弄雪隋堤吟見栁垂煙自言更共秋濤約未捨西興一釣船送僧歸越舊房稽嶺鎖春苔猿鳥歡迎振錫回花雨六時飄講席樵風千里送浮杯一乘了義刳心學三藏真文盥手開迹似孤雲本無滯飄飄新到帝鄉來送張待制知越胡宿長安廏吏馭花驄竹使遙分浙水東逺勢蚤推賢相子太傳三當國柄公常逺嫌避事任誠真有古人風稽山一鎮君封內四鎮之山會稽其一阿閣三休聳禁中長樂鐘聲偏怨别何時同謁建章宫同前李昭述嚴近厭承明東南抗使旌箕裘漢相子屏翰越王城勝槩須留賞仙舟莫計程湖光八百里風月有餘清同前梅堯臣滄海東邊會稽郡朱輪逺下相臣家已同雲漢星辰轉不與鑑湖風月賒越箭抽萌供美茹秦山堆翠照髙牙買臣嚴助前時貴破盜論功未足誇送張行之越蘇舜欽五雲寺下石橋邊六月溪風灑面寒今正炎天君獨往松間尋我舊題看送則師歸越石延年歸里圓心復苦形生涯棕笠伴銅瓶魚隨洗鉢衝遺粒龍倚移舟識諷經佛廟春遊湖樹暗神濤晴渡越峯青髙才不獨江山助王謝風流舊有靈送鄭十學士通理越州宸命陪分竹仙資貴珥彤入辭中殿閟出二左廉雄過楚前封近前在池州簽判還吳舊業空江山復清思蓴鱠起髙風海濶悲秦望陵荒歎禹功樓澄鑑湖北城險雪濤東稽壑飛泉石台基下桂叢風流好吟醉王謝有餘宫送刁景純知越梅堯臣前有朱公子後經王右軍至今風俗美自昔誦歌聞秦望臨丹戟耶溪漱白雲只應絲管去驚動野鷗羣别耶溪諸叔趙湘又散耶溪會斜陽在古原出門逢落葉去路有啼猿短髮不堪照新詩欲忘論如何為逺别風雪宿孤村送會稽何從事王拱辰行行歧路出塵間從事猶勝執戟間景象遍經江左地封疆全得浙中山侯藩暫列談賔位綸閣香隨墨客班到郡莫為經嵗計詔書非久急徵還送裴司門倅越宋敏求剡中新佐郡去路觸炎威民富杼機利地含山水暉樵風送舟綄梅雨潤朝衣政在宜謡俗當期奏課歸古詩送孔巢父謝病歸遊江東兼呈李白杜甫巢父掉頭不肯往東將入海隨煙霧詩卷長留天地間釣竿欲拂珊瑚樹一云三株樹深山大澤龍蛇逺春寒野隂風景暮蓬萊織女回雲車指點虛無是征路自是君身有仙骨世人那得知其故惜君只欲苦死留富貴何如草頭露一云我欲苦留君富貴何如草頭易晞露蔡侯靜者意有餘清夜置酒臨前除罷琴惆悵月照席幾嵗寄我空中書南尋禹穴見李白道甫問訊今何如一云深山大澤龍蛇逺華繁草青風景暮仙人玉女回雲車指點虛元引歸路若逢李白騎鯨魚道甫問訊今何如送從弟雍落第後東遊會稽孟浩然疾風吹輕帆倏爾向空沒千里去俄頃三江坐超忽向來共歡娛日夕成楚越落羽更紛飛誰能不驚骨適越留别譙縣張主簿申屠少府朝乘汴河流夕次譙縣界幸因西風吹得與故人會君學梅福隱豫隨伯陽邁别後能相思浮雲去吳會别青陽上人遊越孟郊秋風吹白髮微宦日蕭索江僧何用歎溪縣饒寂寞楚思物皆清越山勝非薄時看鏡中月獨向衣上落多謝入冥鴻笑豫在籠鶴送陸侍御還越韋應物居藩久不樂遇子聊一欣英聲頗籍甚交辟乃時珍繡衣過舊里驄馬輝四鄰敬恭尊郡守箋簡具州民謬忝誠所愧思懷方見申置榻宿清夜加籩宴良辰遵塗還盛府行舫繞長津越有賢方伯得此文翰賔送紀秀才遊越李白海水不滿眼觀濤難稀心即知蓬萊石却是巨鼇簪送爾遊華頂令余發會吟仙人居射的道士住山隂禹穴尋溪入雲門隔嶺深緑蘿秋月夜相憶在鳴琴送友人遊越楚臣傷江楓謝客拾海月懷沙去瀟湘挂席泛溟渤蹇子訪前迹獨往造窮髮古人即可攀去若浮雲沒願言㺯倒景從此鍊真骨華頂窺絶冥蓬壺望超忽不知青春度但怪緑芳歇空持釣鼇心從此謝魏闕送祝八之江東賦得浣紗石西施越溪女明豔光雲海未入吳王宫殿時浣紗古石今猶在桃李新開映古查菖蒲猶短未平沙昔時紅粉照流水今日青苔覆落花君去西秦適東越碧山青江幾超忽若到天涯思故人浣紗石上窺明月送謝景初宰餘姚范仲淹世德踐甲科先賔客先紫微俱登甲科廷評今又繼之青紫信可拾故鄉特榮耀髙門復樹立餘姚二山下東南最名邑煙水萬人家熙熙自翔集又得賢大夫坐堂恩信敷春風為君來緑波滿平湖乘興訪隱淪今逢賀老無文藻凌雲處定喜江山助未能同仙舟離樽少留駐行行道不孤明月相隨去送陳和叔越州從事梅堯臣母夫人老母兄黜夫人從爾之會稽恐傷爾心不敢泣春岡細雨聞竹雞時亦藏淚未出臉奈何相與頭項低誠知就祿非獲已應欲退耕無舊畦臧子文剡縣主簿剡溪無淺深厯厯能見底潛鱗莫苦窺塵紱聊堪洗古木潭上隂遺祠巖下啓應識道傍碑因風奠醪醴余令之會稽新昌越舸將渡西陵時臘雪欲作隂雲垂古岸潮回夜氷閣氷上鯉魚紅尾鬐知君奉親聊自得窮冬涉險仍熙熙縣民但可觀此意休羡江邊孝女碑送張尊師監龍瑞官齊唐陽明洞天三月春桃花豔豔迎笑人仙官瑶裾翠羽裙直上非煙驂紫麟手把赤書祕玉文朝謁太素三元君琳房窈窕出青雲衆真嘯語林際聞山精木魅知有主斂戢鬼火摧飈輪崇巖絶壑足清放抗迹萬里無埃塵物不疵癘年穀熟綽約曾潛姑射神祈師努力學此道下濟澤國窮鰥民會稽掇英總集卷十一
