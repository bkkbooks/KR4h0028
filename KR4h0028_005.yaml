body:
  text: 會稽掇英總集卷五宋孔延之撰山水下四明山在餘姚縣南百餘里髙二百一十丈周回二百一十里孫綽天台賦云涉海則有方丈蓬萊登陸則有四明天台云律詩石窗陸龜蒙石窗何處見萬仞倚晴虛積靄迷青瑣殘霞動綺疏山應列圓嶠宫便接方諸祇有三峯客時來教隱書過雲相訪一程雲雲深路僅分嘯臺隨日辨樵斧帶風聞曉著衣全濕寒衝酒不醺幾回歸思靜倣佛見蘇君雲南雲南更有溪丹礫盡無泥藥有巴賨賣枝多越鳥啼夜清先月午秋近少嵐迷若得山顔住芝蒫手自攜雲北雲北是陽川人家洞壑連壇當星斗下樓拶翠微邊一半遙峯雨三條古井煙金庭如有路應到左神天鹿亭鹿亭巖下置時領白麛過草細眠應久泉香飲自多認聲來月塢尋迹到煙蘿早晚吞金液騎將上絳河樊榭樊榭何年築人應白日飛至今山客説時駕玉鱗歸乳蒂懸松嫩芝臺出石微憑欄虛目斷不見羽華衣潺湲洞石淺洞門深潺潺萬古音似吹雙羽管如奏落霞琴倒穴漂龍沫穿松濺鶴襟何人乘月弄應作上清吟青櫺子山實號青櫺環岡次第生外形堅緑殼中味敵瓊英墮石樵兒拾敲林宿鳥驚亦應仙吏守時取薦層城鞠侯何事鞠侯名先封在四明但為連臂飲不作斷腸聲野蔓垂纓細寒泉佩玉清滿林遊宦子誰為作君卿和石窗皮日休穴開自真宰四達見蒼崕苔深渾成綺雲漫便當紗櫺中空吐月扉際不扃霞未會通何處應連玉女家過雲粉洞二十里當中幽客行片時迷鹿迹寸步隔人聲以杖探虛翠將襟惹薄明經時未過得恐是入層城雲南雲南背一川無雁到峯前墟野生紅藥人家發白泉兒童皆似古婚嫁盡如仙共作真官户無由稅石田雲北雲北盡冥冥空疑背壽星犬能諳藥氣人解寫芝形野歇遇松蓋醉書逢石屏焚香住此地應得入金庭鹿亭鹿羣多此住因構白雲楣待侣傍花久引麛穿竹遲經時棓玉澗盡日嗅金芝為在石窗下成仙自不知樊榭主人成列仙故榭獨依然石洞閧人笑松聲驚鹿眠井香為大藥鶴語是靈篇欲買重棲隱雲峯不售錢潺湲洞隂宫何處源到此洞潺湲敲碎一輪月鎔銷半段天響髙吹谷動勢急噴雲旋料得深秋夜臨流盡古仙青櫺子山風熟異果應是供真仙味似雲腴美形如玉腦圓銜來多野鶴落處半靈泉必共玄都奈花開不記年鞠侯堪羡鞠侯國碧巖千萬重煙蘿為印綬雲壑是提封泉遣狙公護果教􅏈子供爾徒如不死應得躡玄蹤浙江越之通道有四江西接錢塘曰浙江去城西四十五里曰錢清江州之東七十里曰曹娥江餘姚縣曰姚江律詩越江秋晚蕭頴士扁舟東路逺曉月下江濆瀲灔信潮上蔥蒙孤嶼分林聲寒動葉水氣曉連雲暾日浪中見榜歌天際聞伯鸞常去國安道昔離羣延首剡溪近詠言懷數君濟江問舟人孟浩然潮落江平未有風扁舟共濟與君同時時引領望天末何處青山是越中西陵夜居吳融寒潮落逺汀暝色入柴扃漏永沉沈靜燈孤的的青林風移宿鳥池雨定流螢盡已成愁絶啼蛩莫近庭泊姚江王相軋軋櫓聲急蒼蒼江日低吾行有定止潮汐自東西其二山如碧浪翻江去水似青天照眼明喚取仙人來此住莫教辛苦上層城江潮阻風陳堯佐按部溪山接海濤連天風雨泊輕舠滄溟未必全勝我潮落潮生亦自勞過漁浦作刁約一水相望越與杭渡頭人物見微茫翩翩商楫來溪口隱隱耕犂入富陽市肆凋踈隨浦盡山峯重疊傍江長民瞻熊軾咸相謂太守經行此未嘗古詩乘潮至漁浦陶翰艤棹乘早潮潮來如風雨樟亭忽已隱界峯莫及覩崩騰心為失浩蕩目無主豗㦎浪始開漾漾入漁浦雲景共澄霽江山相吞吐倬哉造化靈此事以終古流沫成足誡商歌調昜苦頗因忠信全客心猶栩栩西陵口觀潮薛據浙江漫湯湯近海勢彌廣在昔胚渾凝融為百川長地形失端倪天色潛滉漾東南際萬里極目遠無象山影乍浮沈潮波忽來往孤帆或不見棹歌猶響像日暮長風起客心空震蕩浦口霞未收潭心月初上林嶼幾邅回亭臯時偃仰嵗晏訪蓬瀛真逰非外奬旦發漁浦潭丘希範漁潭霧未開赤亭風已揚棹歌發中流鳴鞞響沓嶂村童忽相聚野老時一望詭怪石異象嶄絶峯殊狀森森荒樹齊析析寒沙漲藤垂島易陟崖傾嶼難傍信是永幽棲豈徒暫清曠坐嘯昔有委卧治今可尚夢越州小江在城西之三十里錢易越布縫單衾燈青月黃淺精魂渡江水適去無近遠濕沙平朔天宿鳥踏古篆巨潮淹積石瘦白澀無蘚櫓嚮期西陵蒼岑屏曲展夙齡賤登臨今日生健羡汀洲逢故妾振袂指吳苑向人呼舊官血泣慙孤蹇受代還自越中早彂赴浙江潮王素三載勤吏職去思乏氓謡還隨半夜月又趂五更潮騖棹辭枉渚揚帆信歸飇山隂多勝託小隱欲相招山水雜詠律詩龍井王相山腰石有千年潤石眼泉無一日乾天下蒼生待霖雨不知龍向此中蟠其二人傳湫水未嘗枯滿底蒼苔亂髮粗四海旱多霖雨少此中端有卧龍無登越山李覯臘後梅花破碎香望中情地轉凄涼逰山秪道尋高處高處何曽見故鄉題清化山許安世霜鐘清徹隔村聞南渡橫塘曉色分淺淺溪流涵白石微微山路入青雲勞生已負林泉約薄宦空增世俗紛見説定香無受想為祛塵惑借餘薰青蓮山楊塤撥開瑟瑟青蘿帳尋淂磷磷白石梯更入雲霞最深處忘機數日遂幽棲郎官巖碧玉莫嘉千嶂石黃金難買一溪雲歌鐘沸地徒誇盛爭似松風竟夕聞碧澗亭妙筆王維圖莫就多才康樂詠難窮樓臺一簇出雲杪激雪浪生寒澗風古詩題上虞蘭芎山陳堯佐巖巖一峯千萬尋微茫樓閣寒雲深巡州佐吏倚欄久泠泠天籟清塵心尋餘姚上林湖山謝景初山水有竒秀何必耳目親兹地世未知偶遊良可珍平湖瞰其中翠巘圍四垠青松千萬植落瀑如懸巾佛廟聳殿塔裝點繪畫新清溪與斷崖水石聲磷磷峯巔見滄海日出常先晨花草時節異寧問秋夏春陵谷千萬古豈無稱道人得微言不信又恐逺故堙樽酒且樂我醉來事事均觀餘姚海氛海上風與雨未眹先氣升澤鹵雜山雲蓊鬱相薰蒸交語面已障安辨丘與陵衣濡帶革緩臭腥殊可憎自非昌其陽疾癘得以乘君子却隂邪何必醫師能餘姚董役海堤有作五行交相陵海水不潤下處處壞堤防白浪大於馬顧豫為其長恐懼敢暫捨董衆完築塞跋履率曠野使人安於生兹不羞民社調和隂與陽自有任責者觀仙居山瀑布落泉下峭壁斗絶千萬丈濺急雪片飛望若匹練廣曲嶺隔青林三里已聞響其旁有巨石平潤可俯仰愚俗所不道我輩偶來賞須期秋色清攀蘿將爾上會稽山張伯玉稽山何崔嵬奠此東南區羣山狀趨附萬壑流縈紆疇昔大禹來簡計天下書諸侯率麏至萬玉爭鳬趨防風獨強梁後至行趦趄天威不可捨敗骨盈髙車至今憔悴煙慘淡藏封隅封隅山防風邑遂令百世後尊王無異圗乃知聖人心賞罰盡貽謨會稽掇英總集卷五
