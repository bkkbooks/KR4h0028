body:
  text: 㑹稽掇英揔集巻二十宋孔延之撰修禊于雲門王獻之山亭序王勃觀夫天下四海以宇宙為城池人生百年用林泉為窟宅雖朝野殊致出處異途莫不擁冠盖於煙霞披薜蘿於山水况乎山隂舊地王逸少之池亭永興新郊許𤣥度之風月琴臺涼落猶停隠遁之賔醸渚荒凉尚有過逢之客僊舟蕩漾若海上之查來羽盖參差似遼東之鶴起㦯昻昻騁驥或泛泛飛鳬俱安名利之場各得逍遙之地而上屬無為之道下棲𤣥邈之風永淳二年暮春三月修祓禊于獻之山亭也遅遲風景出没媚於郊原片片雲飛逺近生于林薄雜花爭發非止桃蹊遅鳥亂飛有餘鸎谷王孫春草處處皆青仲統芳園家家並翠於是携㫖酒列芳園先祓禊於長洲却申文於促席良談吐玊長江與斜漢爭流清歌遶梁白雲将紅塵並落他鄉易感自棲恨於兹晨覊客何情更驩娯於此日加以今之視昔己非昔日之驩後之視今豈復今時之㑹人之情也能不悲乎冝題姓字以傾懐抱使夫㑹稽竹箭則雄我於東南昆阜琳瑯亦歸予於西北大原王勃序送靈澈上人廬山迴歸沃洲序權徳輿昔廬山逺公鍾山約公皆以文章廣心地用賛後學俾學者乘理以詣因言而悟得非𤣥津之一𣲖乎呉興長老晝公掇六義之清英首冠方外入其室者有沃洲澈上人上人心𠖇空無而跡寄文字故語甚夷易如不出常境而諸生思慮終不可至其變也如風送迭韻氷玊相和層峰千仭下有金碧𢥠鄙夫之目初不敢視三復則淡然天和晦于其中故覩其容覧其詞知其心不待境静而静况會稽山水自古勝絶東晋逸民多遁世於此夏五月上人自鑪峯言旋復于是邦予知夫拂方𫀆坐輕舟泝㳂鏡中静得佳句然後深入空寂萬慮洗然則嚮之境物又其稊稗也鄙人方景行企尚之不暇惡敢以離羣為歎哉唐釋靈澈上人文集序劉禹錫釋子工為詩尚矣休上人賦别怨約法師哭范尚書咸為當時才士之所傾歎厥後比比有之上人生於㑹稽本湯氏子聦察嗜學不肯為凡夫因辭父兄出家號靈澈字源澄雖受經論一心好篇章從越客維學為詩遂籍籍有聞維卒乃抵呉興與長老詩僧皎然㳺講藝益至皎然以書薦于辭人包侍郎佶包得之大喜又以書致于李侍郎紓是時以文章風韻主盟于世者包李以是上人之名由二公而颺如雲得風柯少葉張以文章接才子以禪理悦高人風儀甚雅談笑多味貞元中西游京師名振輦下緇流嫉之造飛語激動中貴人侵誣得罪徙汀州入㑹稽歸東越時呉楚間諸侯多賔禮招迓之元和十一年終於宣州開元寺七十有一門人遷之建塔于越之山隂天柱峯之陲從本教也初上人在呉興居柯山與晝公為侶皎然字晝時以字行時予方以兩髦執筆硯陪其吟詠皆曰孺子可教後相遇于京洛有支許之契焉上人没後十七年予為呉郡其門人秀峯捧先師之文來乞辭以志且曰師嘗在呉賦詩近二千首今刪取三百篇勒為十巻自大歴至元和凡五十年間接詞客文人詶唱别為十巻今也思行乎昭世求一言羽翼之因為許曰世之言詩僧多出江右靈一導其源䕶國襲之清江揚其波法振㳂之如么絃孤韻瞥入人耳非大樂之音獨吴興晝公服備衆體晝公後澈公承之至如芙蓉園新寺詩云經來白馬寺僧到赤烏年謫汀州云青蠅為弔客黄犬寄家書可謂入作者閫域豈獨雄於詩僧間耶送無作上人遊雲門法華序孫郃越中山水名於天下山寺雲門法華又名焉嘗憶北海遊越越帥日率從事樂妓酒饌訪北海北海不樂因曰某乆住此盖為雲門法華二寺今日攜酒樂大似方便發遣越帥乃己此出孫相公譜書譜書是顔魯公作又見朱倣詩曰長憶雲門寺門前千萬峯郃嘗居越中毎吟此詩未遊二寺常以為過上人名僧也又逰名寺前欲遊天台今遊雲門法華二寺冝哉乃知靈鶴不之蓬島則在青田有異凡禽逰不擇地别上人怏怏因為序送之游小隠山叙錢公輔越城之西南有所謂王氏山園者衆以為一境勝絶太守楊公曰彼可逰焉一日攜賔佐浮輕舟走平湖四五里而至望其門如楼閣之在煙雲中入其堂登其亭廓然如形骸之出塵世外山蒼谿碧繚繞四注皆可襟迎而袖揖竒葩珍樹映雪滿前公奮曰吾來越舊矣未有如今日勝且快者使呼其主而詰之曰山名謂何對曰有而非羙名也亭有名乎則曰朴愚敢以名為公使圖以來因名其山曰小隠山堂亦因山之名堂之東榮俯檻而窺者曰瑟瑟池出堂而登数級乃止曰勝奕亭自亭而北登降乎竹間五六十歩而後至者曰忘歸亭過而至于最上者曰湖光亭順山而西逹於山足曰翠麓亭由㤀歸至翠麓曰探幽徑曰擷芳徑曰捫蘿磴曰百花頂皆因其所遇而得之心焉己而至于山外有池池心有宇曰鑑中亭轉而通於始至之門門隅亦有池有宇曰倒影亭凡一景一趣無不為之稱者且曰今而後吾當数至此也因命通判軍州事錢公輔書以鑱諸石噫人生百嵗塵鞅榮利滛惑病憂紛紛而汨之㡬日而如此樂㡬何而如此勝耶予弗書不祥預是逰者都官員外郎江鉞節度推官袁嗣隆觀察推官王仲衍前進士王霽朱方凡六人皇祐三年春二月二十八日叙越州圖序沈立按圖記越州本禹貢揚州之域初禹東巡狩㑹羣臣於㑹稽之山執玊帛者萬國至帝少康封少子無餘於越以奉禹祀是為越侯至勾踐遂破呉并有其地地里志曰呉地斗分埜於辰在丑周秦而下興廢靡常隋大業中改為越州至唐僖宗幸蜀以董昌討劉漢宏遂為節度使未㡬昌叛錢鏐擒昌因為鎮東軍命鏐兼兩藩節度使陞為大都督府皇朝興國三年忠獻王奉土歸朝廷今𨽻兩浙東路州境東西二百三十二里南北四百四十七里領㑹稽山隂剡諸暨蕭山餘姚上虞新昌八縣凡主客二十一萬六千六百六十三戸夏秋二税和買共八十萬一千三十六屯石貫疋府縣官屬五十二員廂禁軍一十二指揮軍府職吏共二百三十人羅城周圍舊管四十五里今實計二十四里二百五十步城門九唐楊素築子城十里倉場庫務三十五州縣坊郭計七十一鄉村鎮市六百八十三橋梁一百二十九祠廟九十五寺院宫觀三百三十七㑹稽與錢塘分浙東西若論其事權地望則錢塘冝當東南第一而越實次之昔白樂天元微之嘗為杭越守互以詩筆相誇人到于今稱之如較其輿賦繁重獄訟清簡則越為之勝觀其土俗雅尚風物温秀儒學之士居常数十百人以詞筆取甲科陞邇列者比比有之其刺史之居據高慿峻茂林脩竹環厠其左右前後楼閣交映亭榭相望晨昏起居雲山在目若蓬萊閣望海亭東齋西園皆燕遊之最著者其人物則鄭洪謝敷王右軍賀知章徐浩數公皆以名載圖史又其勝槩如稽山鑑湖蘭亭苧蘿若耶禹穴之比者甚衆又按道書㑹稽山即陽明洞天也其伽藍禪叢則天章雲門天衣戒珠最為佳勝至于蔬鱻珎雋花竹竒怪固不可得而遽數也然習俗務農桑事機織紗綾繒帛嵗出不啻百萬縑由租調歸于縣官者十嘗六七復又封域大半瀕海居人以魚鹽為生而好聚飲督課太急則詆冒者益衆守令患其重困於民而亦不敢少為寛假立曽高本越人也間領漕居杭嘗為錢塘圖今遂請守越因作㑹稽圖少冀好事者知其梗槩耳時熈寕庚戌中元日記鑑湖序曽鞏鑑湖一曰南湖南並山北屬州城漕渠東西距江漢順帝永和五年㑹稽太守馬臻之所為也至今九百七十有五年矣其周三百五十有八里凡水之出于東南者皆委州之東自城至於東江其北隄石䃮二隂溝十有九通民田田之南屬漕渠北東西屬江者皆溉之州之東六十里自東城至於東江其南隄隂溝十有四通民田田之北抵漕渠南並山西並隄東屬江者皆溉之州之西三十里曰柯山斗門通民田田之東並城南並堤北濵漕渠西屬江者皆溉之揔之漑山隂㑹稽兩縣十四鄉之田九千頃非湖能溉田九千頃而巳盖田之至江者盡於九千頃也其東曰曹娥斗門曰蒿口斗門水之循南堤而東者由之以入于東江其西曰廣陵斗門曰新逕斗門水之循北堤而西者由之以入于西江其北曰朱儲斗門去湖最逺盖由三江之上兩山之間䟽為二門而以時視田中之水小溢則縱其一大溢則盡縱使入于三江之口所謂湖高于田丈餘田又高海丈餘水少則泄湖漑田水多則泄田中水入海故無荒廢之田水旱之嵗者也繇漢以來㡬千載其利未嘗廢也宋興民始有盗湖為田者祥符之間二十七戸慶歴之間二户為田四頃當是時三司轉運司猶下書切責州縣使復田為湖然自此吏益慢法而姦民浸起至于治平之間盗湖為田者凡八千餘戸為田七百餘頃而湖廢㡬盡矣其僅存者東為漕渠自州至於東城六十里南通若耶谿自樵風逕至于桐塢十里皆水廣不能十餘丈毎嵗少雨田未病而湖盖己先涸矣自此以來人争為計説蔣堂則謂宜有罰以禁侵耕有賞以開告者杜杞則謂盗湖為田者利在縱湖水一雨則放聲以動州縣而斗門輙發故為之立石則水一在五雲橋水深八尺有五寸㑹稽主之一在跨湖橋水深四尺有五寸山隂主之而斗門之鑰使皆納于州水溢則遣官視則而謹其縱閉又以為冝益理隄防斗門其敢田者拔其苗而責其力以復湖而重其罸猶以為未也又以為宜加兩縣之長以提舉之名課其督察而為之殿賞呉奎則謂每嵗農隙當僦人濬湖積其泥塗以為丘阜使縣主役而州與轉運使提㸃刑獄督攝賞罰之張次山則謂湖廢僅有存者難卒復冝益廣漕路及他利便處使了漕及注民田里置石柱以識之柱之内禁敢田者刁約則謂宜斥湖三之一與民為田而益隄使一丈高則湖可不開而其利自復范師道施元長則謂重侵耕之禁猶不能使民無犯而斥湖與民則侵者孰禦又以湖水較之高于城中之水或三尺有六寸或二尺有六寸而益隄壅水使高則水之敗城郭廬舍可必也張伯玊則謂日役五千人濬湖使至五尺當十五載畢至三尺當九載畢然恐工起之日浮議外摇役夫内潰則雖有智者猶不能必其成若日役五千人益隄使高八尺當一嵗畢其竹木之費凡九十二萬有三千計越之户二十萬有六千賦之而復其租其勢易足如此則利可坐収而人不煩弊陳宗言趙諴復以水勢高下難之又以為冝修呉奎之議以嵗月復湖當是時都水善其言又以為冝増賞罰之令其為說如此可謂博矣朝廷未嘗不聴用而著之於法故罰有自錢三百至千千又至于五萬刑有自杖百至于徒二年其文可謂宻矣然而田者不止而日愈多湖不加濬而日愈廢其故何哉法令不行而茍且之俗勝也昔謝靈運從宋文帝求㑹稽囬踵湖為田太守孟顗不聼又求休崲湖為田顗又不聴靈運至以語詆之則利於請湖為田越之風俗舊矣然南湖繇漢歴呉晋以來接于唐又接于錢鏐父子之有此州其利未嘗廢者彼或以區區之地當天下㦯以數州為鎮或以一國自王内有供養禄廩之須外有貢輸問遺之奉非得晏然而己也故強水土之政以力本利農亦皆有數而錢鏐之遺法最詳至今尚多傳於人者則其利之不可廢有以也近世則不然天下為一而安于承平之故在位者重舉事而樂因循而請湖為田者其語言氣力往往足以動人至于修水土之利則又費財動衆從古所難故鄭國之役以為足以疲秦而西門豹之治鄴渠人亦以為煩苦其故如此則吾之吏孰肯任難當之怨來易至之責以待未然之功乎故説雖博而未嘗行法雖宻而未嘗舉田者之所以日多湖之所以日廢繇是而己故以謂法令不行而茍且之俗勝者豈非然哉夫千嵗之湖廢興利害較然易見然自慶厯以來三十餘年遭吏治之因循至于既廢而世猶莫寤其所以然况于事之隐微難得而考者繇茍簡之故而弛壊于㝠㝠之中又可知其所以然乎今謂湖必不復者曰湖田之入固饒矣此遊談之士為利於侵耕者言之也夫湖未盡廢則湖下之田旱此方今之害而衆人之所覩也使湖盡廢則湖之為田者亦旱矣此将來之害而衆人之所未覩也故曰此遊談之士為利於侵耕者言之而非實知利害者也謂湖不必濬者曰益隄壅水而巳此好辯之士為樂聞茍簡者言之也夫以地勢較之壅水使高必敗城郭此議者之所己言也以地勢較之濬湖使下然後不失其舊不失其舊然後不失其冝此議者之所未言也又山隂之石則為四尺有五寸㑹稽之石㡬倍之壅水使高則會稽得尺山隂得半地之窪隆不並則益隄未為有補也故曰此好辯之士為樂聞茍簡者言之而又非實知利害者也二者既不可用而欲禁侵耕開告者則有賞罰之法矣欲謹水之蓄泄則有閉縱之法矣欲痛絶敢田者則拔其苗責其力以復其湖而重其罰又有法矣或欲任其責於州縣與轉運使提㸃刑獄或欲以毎嵗農隙濬湖或欲禁田石柱之内者又皆有法矣欲知濬湖之淺深用功若干為日㡬何欲知増隄竹木之費㡬何使之安出欲知濬湖之泥塗積之何所又己計之矣欲知工起之日或浮議外搖役夫内潰則不可以必其成又己論之矣誠能収衆説而考其可否用其可者而以在我者潤澤之令言必行法必舉則何功之不可成何利之不可復哉鞏𥘉䝉恩通判此州問湖之廢興於人未有能言利害之實者也及到官然後問圖於兩縣問書於州與河渠司至於參覈之而圖成熟䆒之而書具然後利害之實明故為之論次庻夫計議者有考焉雜文朱育對㑹稽典録曰孫亮時有山隂朱育少好竒字凡所特逹依體像類造作異字千名以上仕郡門下書佐太守濮陽興正旦宴見掾吏言次問太守昔聞朱潁川問士於鄭召公韓呉郡問士於劉聖博王景興問士於虞仲翔嘗見鄭劉二荅而未覩仲翔對也欽聞國賢思覩盛美有日矣書佐寧識之乎育對曰往過習之昔初平末年王府君以淵妙之才超遷臨郡思賢嘉善樂采名俊問功曺虞翻曰聞玉出崐山珠生南海逺方異域各生珍寳且曽聞士人歎美貴邦舊多英俊徒以逺于京畿含香未越耳功曺雅好博古寕識其人邪翻對曰夫㑹稽上應牽牛之宿下當少陽之位東漸巨海西通五湖南暢無垠北渚浙江南山攸居實為州鎮昔禹㑹羣臣因以命之山有金木鳥獸之殷水有魚鹽珠蚌之饒海嶽精液善生俊異是以忠臣係踵孝子連閭下及賢女靡不育焉王府君笑曰地勢然矣士女之名可悉聞乎翻對曰不敢及逺畧言其近者耳往者孝子句章董黯盡心色飬䘮致其哀單身林野鳥獸歸懐怨親之辱白日報讐海内聞名昭然光著太中大夫山隂陳囂漁則化盗居則譲隣感侵退藩遂成義里攝養車嫗行足厲俗自揚子雲等上書薦之粲然傳世太尉山隂鄭公清亮質直不畏彊禦魯相山隂鍾離意稟殊特之姿孝家忠朝宰縣相國所在遺惠故取養有君子之譽魯國有丹書之信及陳宫費齊皆上契天心功徳治状記在漢籍有道山隂趙曄徴士上虞王充各洪才淵懿學究道源著書垂藻絡驛百篇釋經傳之宿疑解當世之磐結或上窮隂陽之奥秘下攄人情之歸極交趾刺史上虞縣綦毋俊㧞濟一郡譲爵土之封決曹掾上虞孟英三世死義主簿句章梁宏功曹史餘姚駟勲主簿句章鄭雲皆敦終始之義引罪免居門下督盗賊餘姚伍隆􅀈莫侯反主簿任光章安小吏黄他身當白刄濟君於難揚州從事句章王修委身授命垂聲來世河内太守上虞魏少英遭世屯蹇忘家憂國列在八俊為世英彦尚書烏傷楊喬桓帝妻以公主辭疾不納近故太尉上虞朱公天資聦亮欽明神武䇿無失謨征無遺慮是以天下義兵思以為首上虞女子曹娥父溺江流投水而死立石碑記炳然著顯王府君曰是既然矣潁川有巢許之逸軌吴有太伯之三譲貴郡雖士人紛紜於此足矣翻對曰故先言其近者耳若乃引上世之事及抗節之士亦有其人昔越王翳譲位逃於巫山之穴越人薫而出之斯非太伯之儔耶且太伯外來之君非其地人也若以外來言之則大禹亦巡於此而𦵏之矣鄞大里黄公潔已暴秦之世高祖即阼不能一致惠帝恭譲出則濟難徴士虞姚嚴遵王莽數聘抗節不行光武中興然後俯就矯手不拜志陵雲日皆著于傳籍較然彰明豈如巢許流俗遺譚不見經傳者哉王府君笑曰善哉話言也賢矣非君不著太守未之前聞也濮陽府君曰御史所云既聞其人亞斯以下者書佐寕識之乎育曰瞻仰景行敢不識之近者太守上虞陳業潔身清行志懐霜雪貞亮之信同操栁下遭漢中微委官棄禄遁迹黟歙以求其志高邈竗蹤天下所聞故相文遺之尺牘之書比竟三高其聦明大畧忠直謇諤則侍御史餘姚虞翻偏将軍烏傷駱統其淵懿純徳則太子少傅山隂闞澤學通行茂作帝師儒其雄姿武毅立功當世則後将軍賀齊勲成績著其探極秘術言合神明則太史令上虞呉範其文章之士立言粲盛則御史中丞句章任弈鄱陽太守章安虞翔各馳文檄曄若春榮處士鄧盧叙弟犯公憲自殺乞代呉寕斯敦山隂祈庚上虞樊正咸代父死罪其女則松陽栁朱永寕瞿素或一醮守節䘮身不顧或遭冦刼賊死不虧行皆近世之事尚在耳目府君曰皆海内之英也吾聞秦始皇二十五年以吴越地為㑹稽郡治呉漢封諸侯王以何年復為郡而分治於此育對曰劉賈為荆王賈為英布所殺又以劉濞為呉王景帝四年濞反誅乃復為郡治于呉元鼎五年除東越因以其地為治并屬於此而江東部都尉後徙章安陽朔元年又徙治鄞或有冦害復徙句章到永建四年劉府君上書浙江之北以為呉郡㑹稽還治山隂自永建四年嵗在己巳以至今年積百二十九嵗府君稱善是嵗呉之太平三年嵗在丁丑育後仕朝常在䑓閣為東觀令遥拜清河太守加位侍中推刺占射文藝多通山隂述竇公衡天寳甲午嵗夏四月宇文顥莅山隂令是日鄉黄髪與胥徒洎衆趨事於琴堂之下顒以待命公乃從容言曰自大朴既散大道既隠我先王始議於理盖失人而後有理失理而後及亂理之義其難乎不易方不變俗因弊施冝而己夫身違而心違心違而性違以至于夭官擾而吏擾吏擾而人擾以至於亂故繕性必先繕身心理人必先理官吏教之不明令長之過化之不率吏人之罪於是邑人聞之豪暴貪者肅焉而悛貧窶寡弱者熈焉而安故一年而成其佳政二年而號為樂土人吏樂安郊坰蓊欝澄湖之上清風穆然兹所以承其聲懐其惠者相與如歸然後以順固以信齊一是以趣務舉滯猶驂之勒若氷之釋君子曰山隂之理得其由矣天下之政煩我政其静天下之理外我理其中身和則心和心和即性和性和則氣和氣和則隂陽和然後感其氤氲志不離徳不分官簡則吏簡吏簡則人簡人簡則物簡物簡則天地簡然後知其止足上不干下不黷和與簡政之本歟噫古之化吏人俱及其次更及其下俱不及自太公灌壇仲尼中都言偃武城至宓不齊巫馬期單父六百年間吏人猶及自西門豹史起鄴至魯恭中牟三百餘年吏人更及自魏晋宋齊梁周隋四百餘年吏人俱不及聖唐分職公復及之若磅礴而言普暢皆是則堯之屋不足封舜之刑不足用遷善逺罪何慮何思是理也其體宏哉石而刻之永鑑來者竇公衡記歴山賦有序史館王相餘姚縣人有與季父爭田于縣于州于轉運使不直提㸃刑獄疑令余來直之将歸閔然望厯山而賦之厯山在縣西上虞縣界中或曰舜所耕云歴山之峩峩兮予汝耕之孰汝彊兮此匪予私云然兮誰汝使子人之子兮余師歴山之峩峩兮則維其常人之子兮云曷而亡云曷而亡兮我之思今孰繼兮我之悲嗚呼己矣兮來者為誰題禹廟壁劉彛皇祐二年秋予自閩由太末登天台川陸間行至郡凡數千里觀山澤之可樹植者或荒潴焉田畆之可澮畎者或漫滅焉自剡而西遇雨數日農田甚豐垂穫而遭霖潦之害春夏斯民飢莩瘝瘠未起者重困是水予心哀焉嗚呼冝樹殖而荒潴凍餒之源也冝畎澮而漫滅水旱之道也天地非不生且育然而吾民重罹飢困賛乎化育之道未至焉耳夜過鑑湖人指南山而告予曰禹廟也予具冠帶瞻望内起恭肅不覺感者泣下既而欲誌其事厥明次于㑹稽之門遂冩屋壁其歌曰地生財兮天生時聖賢之賛育兮或失其冝畎澮距川兮川距海水旱㒺至兮民無凍飢畝田是起兮帝載以熈萬世永頼兮胡不踐履而行之嗚呼禹乎誰知禹心之増悲永福院大像賛沈遯浮屠之説傳中州使人知真如寂滅之法然後中州承事佛為聖人事佛非佛心也佛名如來佛之生也以諸相為佛耶是相為妄以大身為佛耶是身無體然而非佛則不名為法是有生者所以登正覺成上道也佛示滅世以為滅也不滅不生一佛滅諸佛生諸佛滅故支提偷婆生人以土木為佛儼然佛也人以風火為身完然身也吾謂還之土木還之風火則是佛與我皆妄也故知我則知佛是以明慧之士以佛為一而愚者事分别也猶假以攝心所為有盡為有為法無盡為無為法者是己昔者錢氏有呉越之地事佛尤為最篤文穆王有子曰儀開府治于㑹稽公宫據卧龍之山儀親以其女為尼者三人又出其私財数千萬即卧龍之隂為佛廟名曰寳積儀自為文内佛蔵中呉越國既除忠懿王以其族歸京師繇是寳積衰而其徒寖以㪚去日朘月壊大殿之外鞠為荆榛龍象號惻禽䑕攸居嘉祐六年長興公來為是州既将大治學宮乃取寳積之舊殿以為孔子殿顧視其中則大像巋然在焉或謂公儒者必毁之公曰夫功難成而易壊前人歴年而成之吾一旦而壊之顧未足以抑浮屠而徒傷前人之功且浮屠之法方行于天下而塔廟之役未有禁也壊於此将成于彼使徙而歸之其徒是可省千萬之貲於後也於是永福智印師聞而謁公願得以歸永福之正殿曰為是殿十有六年矣而大像不能成計其費盖千萬也今願因公而成焉公許之為命工度作凡傭役之費悉取之其徒二月癸己先遷中軀其脩丈有八尺大十有二圍其重莫能勝計乃作樏車于陸方舟於河以遷山動風旋隠隠隆隆人不知其功三佛以次遷逮諸菩薩弟子凡有二軀以及四壁楣帯奥窔之像或突或繪咸因彼寘此小則尋尺大至逾丈皆不失毫釐有若其素金相玊毫大祴重𥜗堂堂乎正位端嚴跋立之侍冠胄攖甲之神森然在列六月壬申迺訖工内外完具煥若新焉觀者䕫䕫稽首瞻仰咸以是為大事勝縁非偶然脗合者不可以知見道也於是時長者之施日以大來重屋崇崇中嚴外隆爰及别殿増庳為穹不亟其力而靡不庸是嵗秋八月公去而治于杭智印始欲賛其事廼來請文於余余方得維摩之説蹈無生法忍杜門逺謝人事何能為文頋不得己強為之賛云金僊頎頎妙相尊稽首十方尸正法於何為生何為滅或聞諸佛號如來大匠升天巧模畫一切有為吾知假或盛或衰繫其逢得福在心不在佛在昔王子今何往成就愛女青蓮中阿育文殊在深谷繇來所贖本虗空善哉檀施非一力所願此地臻極樂種種竗香雜諸珍我咸洪捨無貪著彼時如來在寳積我心永懐苦不足今日如來歸道塲我心懽喜遂瞻依願我諸佛施慈悲咸以是心承是報世世子孫應供養長獲饒益無時衰稽山盤盤翠相疊鑑水泱泱逈無極地勢博平人物古晉代衣冠盛于此遺風勝事􅒺可尋大士遊方量無礙龍光有應我為證億萬斯年示來者㑹稽掇英總集巻二十
