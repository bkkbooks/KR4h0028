body:
  text: 會稽掇英總集總集類提要臣等謹案會稽掇英總集二十卷宋孔延之撰原本自序首題其官為尚書司封郎中知越州軍州事浙東兵馬鈐轄末署熙寧壬子五月一日越州清思堂案施宿嘉泰會稽志延之於熙寧四年以度支郎官知越州五年十一月召赴闕壬子正當熙寧五年其嵗月與會稽志相合惟志稱延之為度支郎官而此作司封郎中集中有沈立等和蓬萊閣詩亦作孔司封集為延之手訂於官位不應有誤未知施宿何所據也延之此書以會稽山水人物著美前世而紀録賦詠多所散佚因博加搜採旁及碑版石刻自漢迄宋凡得銘志歌詩等八百五篇輯為二十卷各有類目前十五卷為詩首曰州宅次西園次賀監次山水分蘭亭等八子目次寺觀分雲門寺等四子目而以祠宇附之次送别次寄贈次感興次唱和後五卷為文首曰史辭次頌次碑銘次記次序次雜文書中於作者皆標姓名而獨稱王安石為史館王相蓋作此書時正安石柄政之際故有所避而不敢直書歟所録詩文大都由搜岩剔藪而得之故多出名人集本之外為世所罕見如大厯浙東唱和五十餘人今録唐詩者或不能舉其姓氏實賴此以獲傳其於唐宋太守題名壁記皆全録原文尤為具有卓識蓋逸記遺篇所來既逺以資考證禆益良多固不徒搜訪之勤為可嘉尚已此書世鮮流傳藏書家多未著録此則明山陰祁氏淡生堂抄存本也乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀㑹稽掇英總集原序豫常恨詩書之闕亡使善惡之戒不詳見於後代者蓋編脫簡落不能即補之故也後之為文章自非藏之名山副在緗帙鏤之板屋室有時而變勒之石岸谷有時而易况火于秦莽卓于漢割裂于六朝五代則木石之能不散蕩者幾矣若元微之白居易之吟咏撰述汪洋富博可謂才亢力敵矣而今完缺不同者白能自為之集舉而置之二林之藏元則悠然不知所以為計也故題之板不如刋之石刋之石不如墨諸紙茍欲誦前人之清芬搜斯文之放逸而傳之久逺者則紙本尚矣㑹稽稱名區自周官國語史記其衣冠文物紀録賦咏之盛則自東晉而下風亭月榭僧藍道館一雲一鳥一草一木覼縷而曲盡者自唐迄今名卿碩才毫起櫛比碑銘頌志長歌短引究其所作冝以萬計而時移代變風磨雨剝見於今者蓋亦僅有考之壁記自唐武德至光啓為之守者幾百人其間髙情逸思發為篇詠者豈無四五而今所傳者元薛李孟數人而已或失於自著或怠於所承此豫之所以深惜也故自到官申命吏卒遍走巖穴且攟之編藴詢之好事自太史所載至熙寧以來其所謂銘志歌詠得八百五篇為二十卷命曰㑹稽掇英總集詩則以古次律自近而之逺文則一始於古稍以歲月為先後無所異也噫隋珠和璞流落乎𡨕昧久矣一旦鉤索寶聚夸示來世神光靈氣炯然在目東南之美盡矣闕亡之恨消矣所以然者庶幾無負作者之用心也時熙寧壬子五月一日孔延之序
