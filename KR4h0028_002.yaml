body:
  text: 會稽掇英總集卷二宋孔延之撰西園律詩題曲水閣詩并序唐詢吏部樂安公治會稽數月政清吏休庭無留事一日出府署西里所厯金山祠顧神而嘻知非所宜為民祀者促吏壞去因其宇乃廣乃闢署曰正俗亭繇亭之南地曠宜美嬰城面湖東負于山顧瞻厥中若與意會間而歎曰昔晉諸賢遊蘭亭修禊事實在兹土世一異絶而弗續今視得所嚮其疇與興乎亟命監兵李君文都伻來以治並山鑿渠上引湖水悍波合注如怒如奔縈流西行數步一折衆石回阻激為湍聲其哀泠泠涓若鳴玉降而北出乃滙于河即渠之南夾植文棟引梁橫度隱若虹起命之曰曲水閣緣山北嚮聚流為池至于正俗亭又從而西奠渠之北考室其上曰流觴亭壓城之隅治茀而基中可以望曰茂林亭既已事我公帥官屬集而落之絃匏相和曲奏未闋舉酒環視四阿無蔽灌木回映鳴禽互變層巖在右流水相續方其樂甚愈愈自得緬然蓋遊於世俗之外而百慮不得姦焉噫川澤之尤土壤之美厝于幽間無營於世待人然後發嚮者淫鬼宇之狂巫諛祝譁囂雜擾相與浼乎其間纍世而然卒焉發而新之祛囂為寧流汙為清蕩我奧泄即于高明微公之來誰其經營按曲水制始永和中為盛集厯數百祀往而幾熄今我公修之州人忭且語曰永和事去吾逺誦舊志其傳亡髣佛吾何與焉已而復于今固吾所睹視永和烏所謂今之侔哉公樂聞其言又嘉其成作詩以美之監郡虞曹降及寮屬從而賦者凡二十一篇編次如左屬吏唐詢辱命以序辭不成飾赧然愧集景祐丁丑歲春三月日序詩蔣堂危構跨大淵淪清滌世紛飛湍逢石轉潄玉隔山聞影亂林花落叢幽澗草薰兹為禊飲地何羡右將軍同前唐詢依山營廢壤結宇跨通溝派引平湖逺聲分幾曲流交隂覆修竹照影下輕鷗此日羣賢集寧疏晉世遊同前林槩勝絶千巖地清涵一水濵石泉寒繞澗山木翠和春秀入壺中望幽疑物外身賢侯足真賞王謝有芳塵同前劉述面勢俯巖隈雕軒映水開雲從棟間出人自鑑中來棹楫歌聲度漸裳禊事回東山如未起好住小蓬萊同前邵必鑿石得春渠波環閣勢孤新痕漲微雨逺碧注平湖士俗山隂舊風光洛曲殊回眸見危嶺慿檻有驚鳬墮蘂浮旋瀨疏篁蔭疊櫨人間多拾翠魚樂半依蒲河朔誰觴友沂津昔詠儒遺芬知未泯追蓋此為娛諸官詩成因書二韻於後蔣堂一𣲖西園曲水聲水邊終日會冠纓幾多詩筆無停綴不似當年有罰觥昔蘭亭賦詩不成者十六人各罰酒三觥西園醉歸張伯玊向晚西園飲乍闌山公酩酊上輕鞍東方千騎隨車出南國佳人夾路看縱目漸迷山色逺回頭猶憶水聲寒歸來未放賔遊散更賦新題刻燭觀渌波亭向傳式我愛東南郡恩容守會稽府當秦望北園枕卧龍西水為流觴引亭因正俗題松篁清有韻桃李密成蹊一沼開方鑑雙橋亘彩霓繞波平漾漾春草碧萋萋城上興崇構林端露半梯園枕郡城豫因建樓於上以望湖山也登疑青漢近坐與白雲齊山色回頭是湖光照眼迷笙歌隨分有樽斝逐歡攜月夜宜飛蓋花時醉似泥蓬萊風景異此地好長棲古詩寄題望湖樓蔣堂城上危樓勢孤峙樓頭盡見湖中水水色澄明遊者多古來雅以鑑為比家家畫舫日斜歸處處菱歌煙際起清漣蒙潤一都會碧底涵空三百里溥哉利及鎮東人而我常嗟馬臻死今兹使君多感慨所以望湖心不已頻登雉堞追古往盛集賔朋為宴喜樓南極目芙蓉花萬疊紅英照千騎寄題西園蔣堂西園昔日多遊從回流屢泛巵酒空前亭後亭草茵軟曉景晚景煙嵐融角巾蕭灑竹林際履綦來往花隂中時方偃蕃適四體不料遊宦如孤蓬數移五馬臨大屏幾悵二毛成老翁昨去鄰封亦甚邇謂守餘杭也秪限一水無由通錦城此舉又逺適流觴雅會何時同錢塘山色望不見稽山況在錢塘東賀監古律詩送賀祕監歸會稽序并詩唐明皇天寶三載太子賔客賀知章鑒於止足抗歸老之疏解組辭榮志期入道朕以其夙存微尚年在遲暮用修挂冠之事俾遂赤松之遊正月五日將歸稽山遂餞東路乃命六卿庶尹三事大夫供帳青門寵行邁也豈惟崇德尚齒亦將勵俗勸人無令二疏獨光漢册乃賦詩贈行凡預兹宴宜皆屬和遺榮期入道辭老竟抽簪豈不惜賢達其如高尚心環中得祕要方外散幽襟獨有青門餞羣公悵别深同前李適之聖代全高尚玄風闡道微筵開百寮餞詔許二疏歸仙記題金籙朝章換羽衣悄然承睿藻行路滿光輝同前李林甫挂冠知止足豈獨漢疏賢入道求真侣辭榮訪列仙睿文含日月宸翰動雲煙鶴駕吳鄉逺遙遙南斗邊同前嗣許王瓘官著朝中貴才傳海上名早年常好道晚歲更遺榮授籙歸三洞還車謁四明東門詔送日揮涕盡羣英同前褒信郡王璆止足人高尚遺榮子獨前詣臺飛舄日辭闕挂冠年象服歸丹扆霓裳降紫天仙舟望不及朝野共推賢同前席豫南山四皓德東海二疏名功遂知身退心微覺道成霓裳明主賜鶴駕列仙迎詔餞出中野朋歡留上京灞橋春水溢稽嶺白雲生此去三千里那堪長别情同前宋鼎紫氣朝明主丹丘送老臣誰知探穴處更有散金人陌上神仙日城東梅栁春遙知歸隱處煙浪隔囂塵同前郭虛巳白首輕軒冕黃冠重隱淪嚴陵垂釣日疏廣散金辰北闕辭明主東門别故人以兹敦雅俗玄化盡歸真同前李巖逺節忘榮趣全真悟道微登朝四皓客辭老二疏歸聖主欽玄德台臣餞羽衣丹丘不可接鳬舄幾時飛同前韋斌抗情遺黻冕高步出氛埃橫海鴻飛逺登仙鶴語催希微餘第宅恍惚視嬰孩桃實三千歲何當獻壽來同前李慎微有客自言狂經書仕聖唐業尊傳帝子道妙寵君王厭俗懷仙觀思遊憶故鄉公卿祖疏廣親戚送劉綱海上波瀾急江干煙路長蓬萊不可見何處訪霓裳同前韋堅解印辭榮祿遊真奉德音贈行天藻下餞席上台臨逺馭仙山鶴常懷帝里心無因同執袂相望但霑襟同前齊浣君家在四明崇道復遺榮霓服辭丹禁天文詔玊京義方延永錫真籙授長生舉手都門外白雲江上行同前崔璘軒冕朝恩盛霓裳祖帳榮倐然謝時客高步尚遺名魏闕鴛行斷稽山鶴駕迎相期下鳬舄謁帝會承明同前梁涉尚道遺朝紱從天降羽衣儲安四皓去榮足二疏歸垂耀珠隨轉馳軒鶴送飛輕舟鏡湖上宸翰作光輝同前王濬業盛王公秩名高絳老年遺榮謝圭組得志學神仙去國風為馭還鄉海作田何當曳鳬舄萬里更朝天同前王瑀父子承恩日遺榮拜職辰挂冠辭聖主佩印奉嚴親舉代稱賢智當朝勸孝仁退歸將適越攀餞乃傾秦同前姚鵠若非堯運及垂衣肯許巢由脫俗機太液始同黃鶴下仙鄉已駕白雲歸還披舊褐辭金殿却捧玄珠向翠微羈束慙無仙藥分隨車空有夢魂飛同前王鐸詔許真人歸舊隱為言海上憶孤峯宸庭暫别期千載野服飄然出九重華表尚迷丁令鶴竹陂猶認葛仙龍自憐弱羽塵埃重於此無由躡去蹤同前何千里錫鼎升天幾萬春裔孫今復出囂塵姓名當繫上清籙齒髮不知何代人暫應客星過世主旋歸吳市作遺民遼東駕鶴忽飛去揮手無言辭紫宸同前嚴都廣成何必挂朝衣已奉玄珠佐萬機還躡舊來鳬舄去不將新賜鶴書歸先生固辭寵祿竟追成命暫慿風馭遊清禁終泛仙槎出紫微今日漢庭因少别人間無限白雲飛將離洛都厯别公卿十數􅒰其處皆有白雲起同前嚴向孤雲去住本無機却指蒼梧下紫微錫鼎為傳仙族在泛槎還入海煙歸客星一夜凌光武華表千年送令威聞道葛洪丹竈畔至今霜果有金衣同前康􅺲解綬申知足歸元道益真離章垂睿作祖帳别羣臣紫禁辭明主青溪訪羽人賞延忠孝著榮耀故鄉春同前韓宗遺老去朝行登真返舊鄉軒車成羽駕纓綬換霓裳明主懷江外羣公祖道傍青門有前事千載共輝光同前郭慎微承明常謁帝函谷坐成仙少别商山下長探禹穴前雲迎出關馭花待過江船欲識恩華重宸章七曜懸同前于休烈飛名紫府內抗手白雲鄉道與松喬匹榮辭園綺行夫君既鶴駕幼子復霓裳少别留宸藻東南歸路光同前齊先乂晚歲朝真隱皇情諒不違辭家五十載今日復東歸祖帳臨青道天章降紫微顧嗟軒冕者誰與比光輝同前韋述二疏方告老四皓盡歸山藹藹都門别仍看衣錦還霓裳標逸氣丹竈理童顏一遇真仙侣羣心難可攀同前韓倩子綦南國隱周氏北山居羽客輕簪綬霓裳下里閭仙帆歸海近雲氣度關虛今日辭明主深恩寵漢疏同前杜昆吾辰象降星精登朝隱吏并求珠謝軒冕放舄指蓬瀛擲地文章逸匡儲羽翼成江邊丹障起雲外緑輿迎落落神仙意悽悽離别情聖恩殊未巳何獨厭承明同前張綽北闕皇恩重東門紫氣飛為看賔客去何似買臣歸迎綬旋江國題輿入侍闈千年舊迹在七日故人非别涕霑霓服離筵著錦衣無因伴仙羽空此羡光輝同前陸善經至貴不忘初辭榮返舊居霓裳因寵錫鶴駕欲凌虛丹禁傾三事青門祖二疏函關遇真隱應演道家書同前胡嘉鄢帝鄉辭寵命羽服表華年地變君臣禮門榮父子仙鳯書開紫觀鶴駕待青田歸舸蓬萊近宸章日月懸迹光三樂美聲重二疏賢即此過函谷應留道德篇同前魏盈東門挂冠處西漢祖筵開乃是黃庭老言辭丹闕來方稱四皓德更仰二疏才今日青溪路何時謁帝回同前李彥和遺榮辭上國解印適稽山聖主留深眷羣公祖别顏綵帆收鑑水紫氣度函關應是遼陽鶴千年始一還同前張博望紫綬朝中貴黃冠物外高孰能知止足君獨避塵勞已曉青霞志方從碧落遨軒車儻來物從此賤吾曹同前辛替否送君青門外逺詣滄海汜鳬舄遊帝鄉羽衣飛故里術妙焚金鼎丹成屑瓊蘂追餞會羣寮屬文降天旨秦吳稱異域少别猶千祀黃鶴寓遼陽應明城郭是歌并序盧象先生紫陽真人闕耳河目神氣有異年八十六而道心益固時人方之赤松子去年寢疾纍日冥然如夢長男曾子求於神鬼長請於天竊司命之籍與鬼物相競而角抵焉而告真人乃泠然而歸於是表請辭官乞以父子入道俱還故鄉仍以山隂舊宅為觀焉皇帝嘉尚其事尋而見許擇日度公與男田時公卿大夫觀者如堵皆曰賢才也正月五日上令周公邵公洎百寮餞别青門之內玄鶴摩於紫霄吹笙擊鼓盡是仙樂聞者莫不增歎輕軒冕焉余與真人相知不以年不以位俱承太公之後見賞王粲之詞悠悠此别不覺流涕輒贈古歌辭一首庶為真人傳用之爾君不見先生耳鼻有仙骨自號狂生中有物金華侍講三十年兒戲公卿與簪笏青門抗行謝客兒健筆連羇王獻之長安素絹書欲遍主人愛惜常保持每歎二疏不足道復言四皓常枯稿去年寢疾彌數旬神鬼盈庭謀一老長男泣血求司命少女嚬眉誦靈寶還如簡子復歸來更與洪崖同壽考上書北闕言授籙稅駕東州願修道初聞行路猶未信果達吾君謂之好山隂舊宅作仙壇湖上間田種芝草鏡湖之水含杳冥會稽仙洞多精靈須乘赤鯉遊滄海當以羣鵝寫道經皇恩贈詩四十字明主賜金三十鎰供帳傾朝一送歸雙童駟馬從兹出回看紫綬若輕塵逺别青門嗟故人鴛鷺差池攀羽蓋虹霓夭矯翊車輪田田列侍浮丘伯曾子榮過朱買臣余高若是有先覺滅迹歸根從大朴千載悠悠等令威十洲漫漫思方朔歸去來青牛頓足少遲回忽然雲霧不相見唯有飄飄香氣來回鄉偶書賀知章離别家鄉歲月多近來人事半消磨唯有門前照湖水春風不改舊時波其二幼小離家老大回鄉音難改面毛腮家童相見不相識却問客從何處來經賀祕監鏡湖道士觀朱放已得歸鄉里逍遙一外臣那隨流水去不待鏡湖春雪裏登山屐林間漉酒巾空餘道士觀誰是學仙人送賀賔客歸越李白鏡湖流水漾清波狂客歸舟逸興多山隂道士如相見應寫黃庭換白鵝對酒憶賀監李白四明有狂客風流賀季真長安一相見呼我謫仙人昔好杯中物今為松下塵金龜換酒處却憶淚沾巾其二狂客歸四明山隂道士迎敕賜鏡湖水為君臺沼榮人亡餘故宅空有荷花生念此杳如夢凄然傷我情重憶李白欲向江東去定將誰舉杯稽山無賀老却棹酒船回會稽掇英總集卷二
