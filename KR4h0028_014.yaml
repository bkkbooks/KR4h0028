  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0028_WYG_014-1a, image: WYG1345/WYG1345-0103a.png}
body:
  text: 會稽掇英總集卷十四宋孔延之撰經蘭亭故池聨句元本不注名姓於聨句下曲水邀歡處遺芳尚宛然名從右軍出山在古人前蕪沒成塵迹規模得大賢湖心舟已並村步騎仍連賞是文辭會歡同癸丑年茂林無舊徑修竹起新煙宛是崇山下仍依古道邉院開新勝地門占舊畬田荒阪披蘭築枯池帶墨穿序成應唱道杯得每推先空見雲生岫時聞鶴唳天滑苔封石磴密篠礙飛泉事感人寰變歸慙府服牽寓時仍覩葉歎逝更臨川野興攀藤坐幽情枕石眠玩奇聊寄策尋異稍移船草露猶霑服松風尚入絃山遊頗同調今古有多篇松花壇茶宴聨句幾歲松花下今來草色平衣冠遊佛剎鼓角望軍城亂竹邉溪暗孤雲向嶺明繞壇煙樹老入殿雨花輕山磬人天界風泉逺近聲夜禪三世晤朝梵一章清上砌莓苔遍緣窗薜荔生焚香忘世慮啜茗長幽情聚土何年置修心此地成道緣雲起滅人世月虧盈蟬噪林當曉虹生澗欲晴水流驚歲序塵網悟簮纓池上蓮無著籬間槿自榮因知性不染更識理常精從此應貪味非唯悔近名山栖多自愜林卧欲無營已接追涼處仍陪問法行賞心殊未遍惆悵暮鐘鳴尋法華寺西溪聨句常願山水遊靈竒賞皆遍賈弇雲端訪潭洞林下徵茂彥闕允初枕石愛間眠尋源樂清宴吕渭探幽漸有趣憑險恣流眄張叔政竹影思挂冠湍聲忘搖扇鮑防旁登樵子徑却望金人殿周頌蘿葉朝架煙松花暮飛霰闕成用蟬聲掩清管雲色緣素練鄭槩從事暮澄清看心得方便嚴維攀崕屢回互絶迹無健羡闕允初野客歸路逢山僧入林見賈弇雲林會獨往世道從交戰鮑防塔廟年代深雲霞朝夕變周頌潛流注隈隩觸石乍踐濺闕成用逸興發山林道情忘貴賤鄭槩臨流日復夕應接空無倦嚴維雲門寺小溪茶宴懷院中諸公喜從林下會還憶府中賢嚴維石路雲門裏花宫玉笥前謝良弼日移侵岸竹溪引出山泉裴晃猿飲無人處琴聽淺溜邉吕渭黃粱誰共飯香茗憶同煎鄭槩暫與真僧對遙知靜者便闕允初清言皆亹亹佳句又翩翩庾騤竟日懷君子沈吟對暮天賈肅徵鏡湖故事將尋鍊藥井更逐賣樵風闕允初刻石秦山上探書禹穴中吕渭溪邉尋五老橋上覔雙童嚴維梅市西陵近蘭亭上道通謝良弼雷門驚鶴去射的驗年豐賈肅古寺思王令孤潭憶謝公鄭槩帆開岩上石劍出浦間銅庾騤興裏還尋戴東山更向東裴晃自雲門還泛若耶入鏡湖寄院中諸公山中秋賞罷溪上晚歸時謝良弼出谷秦人望經湖謝客期吕渭日斜愁路逺風橫畏舟遲鄭槩章句懷文友途程問楫師嚴維淺沙遊蚌蛤危石起鸕鷀裴晃落葉飛孤戍橫塘向古祠闕允初行行多興逸無處不相思蕭幼和秋日宴嚴長史宅北客來江外秋山到越中鄭槩故交多此見清興復能同裴晃落木秦山近衡門鏡水通嚴維簷前苔繞砌籬下菊成叢徐嶷泫泫花承露泠泠葉動風鄭槩卷簾看彩翠對酒命絲桐張著戊日辭巢燕商天向浦鴻范綘騫開通細雨笑語望秋空劉全白懶竹霜天緑殘花醉裏紅闕仲昌客遊驚落葉更使恨風蓬闕名嚴氏園林六字䇿杖山橫緑野乘舟水入衡門嚴維客來多從業縣僧去還指煙村鄭槩春韭青青耐剪香粳日日冝飱王綱自愧薄霑冠冕何如樂在丘園闕仲昌鳥散紛紛花落人行處處苔痕賈全水池偏多白鷺畦隔半是芳蓀段格栁徑共知歸郭暮雲誰使當軒劉題柏梁體狀雲門山物序秦瑀狀比也比與釋氏有藥草諭品詩家則六義之一焉義取覩物臨事君子早辨不當有似是而非採詩之官可得而補缺矣無以小言默無以細言棄相尚佳句題於層閣古者稱會必賦其能闕乎星郎主文賓賦所以中俊也幡竿映水出蒲檣秦瑀榴花向陽臨鏡粧鮑防子規一聲猿斷腸闕聿殘雲入戶起爐香李清晴虹夭矯架危梁杜奕輕蘿縹眇挂霓裳袁雍月臨影殿玉毫光吕渭粉帶新篁白簡霜崔泌玲瓏珠綴魚網張闕允初髙枝反舌巧如篁鄭槩風搖寶鐸佩鏘鏘秦瑀古松擁腫懸如囊杜倚雨垂珠箔映回廊闕聿薔薇緑刺半針長鮑防五粒松英大麥芒李清古藤蚴蟉毒龍驤杜奕深林怪石猛虎藏袁雍古碑勒字棊局方吕渭山僧行道鴻雁行崔泌亭亭孤笋緑沈槍鄭槩蜂窼倒挂枯蓮房闕允初燃燈幽殿星煌煌杜倚花嚴寺松潭山下花嚴會松間水積深張叔政晚荷交亂影疏竹引輕隂嚴維雲散千巖暮風生萬木吟吕渭循涯通妙理步勝獲幽尋賈弇望鳥知無迹看猿欲學心周頌浮榮指西景微尚寄東岑鄭槩待月開山閣聞鐘出石林闕允初波文搖翠壁蟬響續幽琴張叔政永日陪霜簡通宵聽梵音賈弇機間任情性道勝等浮沈闕成用賞異方終古佳遊幾度今嚴維自然輕執簡寧敢忘抽簮闕允初過見心皆妄驅馳力未任吕渭從來謝公意山水愛登臨周頌入五雲溪寄諸公聨句從一字至九字東西鮑防步月尋溪嚴維鳥已宿猿又啼鄭槩狂流礙石迸笋穿蹊闕成用望望人煙逺行行蘿徑迷吕渭探題只應盡墨持贈更欲封泥闕允初松下流時何歲月雲中幽處屢攀躋張叔政乘興不知山路逺近緣情莫問日過髙低賈弇靜聽林下潺潺足湍瀨厭聞城中喧喧多鼓鼙周頌登法華寺最髙頂憶院中諸公從一字至九字身心周頌城郭山林闕成用望處逺到時深張叔政雲崖杳杳煙樹沈沈賈弇嘯侣時停䇿探幽或撫琴闕得法小枝小葉懷人如玉如金嚴維月色前庭清靜觀梵聲初夜海潮音吕渭思君子山深不可見登髙頂望逺欲相尋鄭槩何事歸舟客興棹不駛君不見紅蓮緑荇沙禽闕允初會稽掇英總集卷十四
