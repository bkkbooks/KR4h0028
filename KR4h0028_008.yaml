body:
  text: 會稽掇英總集巻八宋孔延之撰天衣寺法華山在會稽南四十里晉義熙十三年僧曇翼棲此誦法華經頗有靈感晋賢見乃置寺因以為名梁天鑒中昭明太子送金縷袈裟紅銀缾瑠璃鉢各一副至會昌寺廢大中復興改寺額曰天衣山有十峯雙澗崷崪澄澈頗快登覽古今多有紀詠云律詩題法華山天衣寺白居易山為蓮宫作畫屏樓臺迤邐插青冥雲生座底鋪金地風起松梢韻寶鈴龍噴水聲連擊磬猨啼月色閒持經時人不信非凡境試入𤣥關一夜聴同前元稹馬踏紅塵古塞平出門誰不為功名到頭争似棲禪客林下無言過一生遊法華寺李邕山勢轉深看更好嶺霞谿霧沒樓臺異時花向隂崖發逺處泉從青壁來世界自知千古促賢愚悉被四時催須知此地堪終老七竅終成一寸灰題法華寺李紳花界無生地慈宫有相天化娥騰寶象留影閟金仙殿踴全身塔池開半月泉十峯排碧落雙澗合清漣寺前後有十峯迴繞雙澗合流藥草經行徧香燈次第燃戒珠髙臘䕶心印祖僧傳此寺僧律嚴肅持經皆承師教缾識先羅漢衣存舊福田寺有約法師水缾梁朝宫人所刺袈裟幻身觀火宅昬眼照青蓮住學超真境依遊渡法船化城殊百億靈跡冠三千蕭壁将沈影梁薪尚綴煙寺有昭明太子畫真人梁時薪火常在色塵知有數劫盡豈無年龍噴疑通海鯨吞想漏川寺有梁朝銅龍吐泉銅鯨飲流以注諸院磬疎聞啓梵鍾息見安禪指諭三車覺開迷五䕃纒教通方便入心達是非詮貝葉千花藏檀林萬寶篇座嚴師子迅幢飭網珠懸極樂知無礙分身應有縁還将意功徳留偈法王前法華寺吳融寺在五峯隂穿縁一徑尋雲藏古殿暗石䕶小房深宿鳥連僧定寒猨應客吟上方應見海月出試登臨書法華寺上方禪壁方干砌下松巔有鶴棲孤猨亦在鶴邊啼卧聞雷雨歸巖早坐見星辰去地低一逕穿縁應就郭千花掩映似無谿是非生死多憂惱此日䝉師為破迷秦望山僧院羅隠巉巉危岫倚滄洲聞説秦皇亦此遊霸主巻依纔二世老僧傳錫已千秋隂崖水漱松根直蘚壁苔侵畫像愁各是病來俱未了莫将煩惱問湯休宿法華寺僧皎然心與空林共杳冥孤燈寒竹自熒熒不知何處小乗客一夜風前聞誦經宿天衣寺于良史春山多勝事賞翫夜忘歸掬水月在手㺯花香滿衣興來無逺近欲去惜芳菲更望鳴鐘處樓臺深翠微題法華山天衣寺曽會十里湖光十里松松隂路到十髙峯忩看渡口隨湖月樓聴雲門度嶺鍾梁帝鉢含山雨潤普賢臺鏁蘚花重誰人的是忘機子香稻寒蔬養瘦容遊天衣寺趙諴世稱幽景屬金仙若是精藍豈妄傳澗湧雙泉雷出地山圍四面管窺天唐僧手澤神毫健梁帝宸恩寶器妍今日喜償平昔志更逢閩客此安禪古詩遊天衣寺陸亘處世空旦夕探幽放情志長歌向閒雲引客遊古寺秦山倚寥廓髙鳥下蒼翠凝隂向杉松界法齊天地疎鐘逺僧舍深殿有猨戲警梵千谿中真禪寂無二寒泉聳毛髮清露遣心累省慮因悟非勞神豈為貴超然静中見覺了愚勝智願得棲煙霞書之謝名利登秦望山薛據南望秦望山極目大海空朝陽半暘谷晃朗天際紅谿谷争噴薄江湖遞交通而多魚商叟不悟嵗月窮振緡迎早潮弭棹候逺風予本萍泛者乗流任西東茫茫無際帆棲泊何時同将尋會稽迹從此訪任公應天寺即寶林寺也寺因龜山髙四十六丈周五百餘步在山隂之東數十步逺望若龜形故曰龜山又吳越春秋云越王築城已成怪山自生本瑯琊東武縣海中山一夕移來故名曰怪山里曰東武里起遊臺於上其東南為司馬門立三層樓冠山之巔曰靈臺所以灼龜又仰望天地怪也上有石井靈鰻時或見之乾符中改為應天律詩寶林寺李紳最深城郭在人煙疑借壺中到梵天巖樹桂花開月殿石樓風鐸繞金仙地無塵染多靈草室鑒真空有定泉應是法宫傳覺路使消煩惱見青蓮再遊應天寺聖母閣錢倧越地靈蹤多少處伽藍難尚此樓臺有時風掣浪聲到半夜月排山勢來極目煙嵐迷逺近百般花木離塵埃可憐光景吟無盡知我登臨更幾回登應天寺塔潘䦘閒上應天寺裏塔九層突兀入幽雲下窺已覺紅塵别低語猶疑碧落聞秦望山髙如髻簇照湖水濶若甌分野人不管興亡事空凭危欄到日曛留題應天寺昭慶大師房杜衍中懐無絆外縁閒深掩禪扉客到難勝境可曾飛錫去好山多祇巻簾看晝升講座天花落夜步吟軒海月殘今日逢師堪論道歸心愁思一時寛贈應天寺昭浄法華出俗皆言為息機性靈浄僻似師稀前山月落夜吟罷深院菊荒秋講歸谿霧鏁忩燈焰短雪風敲竹磬聲微會期雙闕重相見應換當年舊衲衣題應天寺齊廓寶勢聳如飛簷牙照錦翬路盤危磴出僧觸斷雲歸萬井分塵界千巖在目圍浮生枉多事到此合忘機同前王昌符何事詩家稱翦裁跨虚相繼有樓臺水涵春碧雨初霽山露曉青雲半開寶塔禮終僧室静粉牆題罷使車回此時欲結香蓮社祇為陶潛醉不來是日約會稽太博不至書應天寺壁此山名飛來云自瑯琊至張伯玉城郭鏁山林自無塵土侵一峯來海上髙塔起天心世路有盈縮靈泉無淺深塔西北楹下有石泉一泓嵗時無増減使君今老矣閒處得閒吟古詩題寶林寺徐浩兹山昔飛來逺自瑯琊臺孤岫龜形在深泉鰻井開越王屢登陟何相傳詞才塔廟崇其巔規模稱壯哉禪堂清溽潤髙閣無恢炱照耀珠吐月鏗轟鐘隠雷揆余久纓弁末路遭邅迴一棄滄海曲六年稽嶺隈逝川惜東駛馳景憐西頽腰帶愁疾減容顔衰悴催賴居兹寺中法士多瓌能洗心聴經論禮足蠲凶災永願依勝侣清江乗度杯飛來山蒋堂有山昔飛來神怪安可測萬壑鼓風雷千巖為羽翼胡為忽移徙到此無傾側靈越得奇峯瑯琊失遺跡煙雲隨而至杉篁古所植如何草創時偶作瞿曇宅聞之有苾蒭嵗久苦刓刻鑿聲響深崖火燼淬層壁詰之州人云向有僧旦暮鑿是山鐫鏨不絶又加以火灼醋淬巖崖都盡平為土木基蔑有蒼翠色金粟千億身窣堵百餘尺回廊盡複疊寸地無閒隙一聚紅塵中萬瓦青煙羃成彼有為善斯可長太息我試來尋山山形俱變易方念此嶄絶安得如往昔不謂山之足下落言偃室知是騫翥時於兹墮巖石屹爾畫疆畔其誰敢侵蝕隨宜得形勝觸目見􅍶崒小桂結濃隂清露有疎滴巾屨日可賞琴樽雅成飾多謝對幽岑亦足開煩臆若在祇園閒豈更存餘碧天章寺寺去山隂縣西南二十五里乃晉王右軍蘭亭曲水之遺趾故書堂墨池間有存者至道中因中貴人奏請置寺以藏太宗仁宗御書於其上賜額曰天章云律詩題天章寺孫沔茂林修竹碧谿頭梵宇深沈鏁翠幬從此崇山頻企望朝陽髙處有松楸泛照湖遊天章吳奎秦望奇峯北天章野寺東石橋跨驚瀨雲屋麗層穹片段磨礲密髙低結構雄盤基深鑿岸飛勢聳凌空逈卻熙蒸日虗含自逺風谿山形勝聚川陸往來通竹影摇軒外松聲逼坐中孤煙惹樵叟輕浪濺漁翁氣象清無比登臨杳莫窮直須圖畫看安得入神工遊天章寺道中蘇舜欽畫鷁低飛湖水平回看樓閣滿稽城人遊鑑裏山相映魚戲空中日共明盡是荷風香不斷忽逢谿雨氣尤清藍轝却上蘭亭路猨鳥雲蘿伴此行遊天章寺曾鞏藍轝朝出踏輕塵拂面毶毶栁色新曲水豈能留往事南湖空解照行人最宜靈運登山屐不負淵明漉酒巾老去飄零心未折暫須同醉海邊春同前顧臨京國久昬車馬塵舊遊重到樂如新谿山滿眼換清骨樽俎開懐盡故人浩蕩自然閒日月疎慵便欲褫冠巾吾儕用舍猶蟬蛻贏得湖南深訪春同前陳舜俞峻嶺崇巔千古在好風佳月逐時新簿書偶是山隂長觴詠聊同水曲人林雀不驚笻竹杖谿雲欲傍接䍦巾官麤合有登臨分更待巖花爛漫春同前許安世當時俯仰尚為陳千載重來感益新曲水已傷迷故迹崇山依舊對遊人縈紆雪路聯珠騎蕭爽風亭岸角巾祇恐瑶池歸扈宴不能修禊見深春題天章劉誥逸少蘭亭六百年别營樓閣奉金仙琅函帝賜三朝筆猊座僧談二祖禪山怪有時渾露石地靈無處不通泉塵心未悟真如理空爇晨鑪一篆煙入天章道中葉㕘帝俞荒址創毗耶茂嶺煙篁占一涯僧入定中觀水月客來空際辯天花宸章飛動凌奎彩瀑溜清涼漲井華不省永和年景趣飫聞虚座演三車古詩泛照湖遊天章吳奎愁霖不肯已隂結彌二旬吾遊欲及時秉燭出城門泛泛一畫舫密坐環親賔爽氣忽侵袂重雲稍逡巡俄頃萬里晴鬼魅伏清晨日光涌水態照灼無涯垠輕煙緬以沒微風飈然振菰蒲動幽響撥剌驚潛鱗浮沈戲鷗鷺蕩漾開萍蘋榜人發櫂歌漁翁理罾緡激越自成態蕭灑何其真清輝不可狀野思徒紛紜弭棹山之阿行行問吾民莓苔粘側逕馬足絶纎塵青谿曲折度茅屋經過頻川涂斗開濶夷路夾松筠右轉聳雲構廣除礱翠珉佛殿爍金碧標榜自玉宸修廊盤磴道等級華堂新最後敞髙閣扃藏帝室珍冥心一薰拂璨璨羅星辰大哉三聖筆天縱妙入神名家數幾百較古誰為鄰山頭見塔影樹杪排嶙峋直上遽登造愛奇忘艱辛秋容媚虚曠藹藹揚奇芬羣峰出圭角萬象皆縷陳森爽翠欲滴蒼茫寒襲人逺心窮碧海逸興凌髙旻躊躇下煙麓盼眄行復詢僧言王右軍遺跡永和春蘭亭有曩基墨池含漪淪書室閟靈像五亭餘圓囷次第與探厯畢景頤厥因簡累脱紛滓遺榮終幅巾逍遥自得埸此節固離倫憤恥以寄傲則非吾所遵凉飈拂修竹暮靄起長津纓佩顧為忝城郭宜爾親回首已遥碧怳然塵世分禹廟在會稽東南十餘里稽山之下禹嘗會東南諸侯計功於此後沒因𦵏焉少康立祠於陵所今有禹墳窆石猶存或曰梁時修廟欠一梁木夕有風雨漂至一木乃梅梁也律詩禹廟神座傾服金紫苹自到鎮申牒禮司重加衮冕今因祈雨偶成八韻薛苹玉座新規盛金章舊制非列城初執禮清廟重垂衣不覩千箱詠翻愁五稼微祇将蘋藻潔寧在餼牢肥徙市行應謬焚巫事亦違至誠期必感昭報意猶希海日明朱檻谿煙濕畫旂迴瞻郡城路未欲背山歸禹廟李紳削平水土窮滄海畚鍤東南盡會稽山擁翠屏朝玉帛穴通金闕架雲霓祕文鏤石藏青壁寶檢封雲化紫泥清廟萬年長血食始知明徳與天齊遊禹穴宋之問禹穴今晨到耶谿此路通著書聞太史鍊藥有仙翁鶴往的猶掛龍飛劍已空石帆浮海上天境落湖中水底寒雲白山邊墜葉紅歸舟何慮晩日暮使樵風題禹廟錢倧千古英靈孰令論西來神宇壓乾坤塵埃共鏁梅梁在星斗俱分劍獨存蟾殿夜寒摇翠幌麝鑪春暖酹瓊樽會稽山下秋風裏長放松聲入廟門同前張伯玉寶穴千峯下嚴祠一水傍夜聲滄海近秋勢越山長薄葬超前古貽謀啟後王萬靈何以報終古詠懐襄同前蔣白大禹歸天後南惟此廟存屋腥龍挂影巖黑電燒痕夜祭雲間火春鼙浪裏門到今疏鑿水敢不向東奔泊禹祠潘閬禹廟髙髙萬木齊蟾蜍影裏月光低山中不慣聞寒漏一夜猨驚與鳥啼癸未嵗秋七月禱禹廟萬古稽山下森森大禹祠幽人來暗禱靈魄望潛知帝慮河頻決民憂業旋移自慙無異策載拜淚雙垂訪禹穴至陽明洞張伯玉宛委山前艤畫船攀蘿漸入太霄邊因尋大禹藏書穴深入陽明古洞天萬壑秋光含細籟數峯寒玉立蒼煙寶函金篆久稀濶欲就皇人講數篇禹穴錢公輔一朶雲根壓衆嵐古傳深坎自天鏨藏書未必先王事好怪惟聞太史探洞府間來何寂寞龍髯垂處認䰐鬖近巖更剖知章字謾識奇蹤意亦甘題禹廟齊唐削斷龍門劍力閑遺祠終古鑑湖邊崑墟到海曾窮地石穴藏書不記年春色門牆花滴雨曉光臺殿水浮煙塗山萬國梯航集告禪靈壇豈偶然古詩亂後經禹廟庾肩吾金簡泥新發龍門鑿始通配天不失舊為魚微此功秦皇觀大海魏帝逐飄風去國嗟行邁頻年任轉蓬月上關山北鄉臨天漢東申胥猶有志荀息大懐忠待見攙搶滅歸來松柏同謁禹廟宋之問夏王乗四載兹地發金符峻命終不易報功疇敢渝先驅總昌會後至伏靈誅玉帛空天下衣冠耀海隅旋聞厭黄屋更道出蒼梧林表祠轉茂山阿井詎枯舟遷龍噴壑田變鳥耘蕪舊物森如在天威肅未除𤣥夷屆瑶席玉女侍清都奕奕閨闥邃軒軒仗衛趨氣青連曙海雲白洗春湖猨嘯有時荅禽言長自呼靈歆異蒸糈至樂匪笙竽茅殿今文襲梅梁古制無運遥日崇麗業盛荅昭蘇伊昔力云盡而今功尚敷揆材非美箭精享愧生芻郡職昧為理邦空寧自誣下車霰已積攝事露行濡人隠冀多祐曷唯霑薄軀同前崔詞惟舜禪功始惟堯錫命初九州方奠畫萬壑遂横疏受籙嘗開洞過門不下車諸侯會玉帛滄海薦圖書𤣥黙将遺世崇髙亦厭居耘田自有鳥濬澤豈為魚家及三王嗣殷因百代如靈容肅清宇衮服閉荒墟棗徑愁雲暮松扉撤祭餘叨榮陵寢邑懐古益躊躇同前益簡九土昔淪墊八方抱殷憂哲王受洪範羣物承天休源委有所在勤勞會東州稽山何峻極清廟居上頭律度非外事辛壬寧少留歌謡自不去覆載将何求靈長表逺績經啓著宏猷孰敢備佐命天吳與陽侯𤣥功餘玉帛茂實結松楸蓋影庇風雨湖光摇冕旒質明簫鼔作通昔禮容修騂牢設舊物洿水配庶羞深沈本建極傲很亦思柔隂怪尚奔走靈徒如獻酬怳疑仙駕動静見宿雲收竹樹依積潤菰蒲託清流謬兹領百越忽復厯三秋丹懇諒可薦庶幾無年尤拜禹廟元稹恢能咨岳日悲暮羽山秋父陷功仍繼君名禮不讐洪水襄陵後元圭菲食由已甘魚父子翻荷粒咽喉古廟蒼煙冷寒庭翠柏稠馬泥真骨動龍畫活睛留祀典稽千聖孫謀絶一丘道雖汙世載恩豈酌沈浮洞穴探常近圖書即可求徳崇人不惰風在俗斯柔茭色湖光上泉聲雨脚收歌詩呈志義簫鼔凟清猷史亦明勲最時方怒校酋還希四載術将以拯䖍劉謁禹廟徐浩畎澮敷四海川源滌九州既膺𤣥圭錫乃建洪範疇鼎革固天啟運興匪人謀肇開宅土業永庇昬墊憂山足靈廟在門前清鏡流象筵陳玉帛容衛嚴戈矛探穴圖書朽卑宫堂殿修梅梁今不壊松祏古仍留負責故鄉近朅來申俎羞為魚知造化歎鳳仰徽猷不復聞夏樂惟餘奏楚幽婆娑非舞羽鏜鞳異鳴球盛徳吾無間髙功誰與儔災淫破凶慝祚聖擁神休出谷鸎初語空山猨獨愁春暉生草樹栁色暗汀洲恩貸題輿重榮殊衣錦遊宦情同械繫生理任桴浮地極臨滄海天遥過斗牛精誠如可諒他日寄冥搜早謁禹廟張伯玉曉出五雲扃皎日麗初闕宿霧斂闕嚴祠欵靈閟拂衽天風散不聴曹娥廟律詩曹娥廟碑僧貫休髙碑説爾孝終難彈指端思白浪間堪歎行人不迴首前山山是苧蘿山同前潘閬曹娥廟前秋草平曹娥廟裏秋月明扁舟一夜曾無寐近聴潮聲似哭聲同前姚鉉簫鼓聲中浪渺瀰古楓隂砌蘚封碑行人到此自恭肅不似巫山雲雨祠同前錢惟岳曹娥廟貌樹豐碑千古行人誦色絲苦恨當年題八字不旌賢孝祇旌辭其二尋屍抱柱兩俱難二子留名滿世間輕命一般同水溺尾生泉下復何顔同前史温曹娥廟貌枕江湄南北行人合孝思有智不争三十里千年黄絹一㕔碑古詩留題曹娥廟蕭闢屈平以楚死死濁不死清伍員以吳死死暗不死明死者人所難一死鴻毛輕壯哉二子為留得不死名曹娥以父死年齡童未成抱屍出洪瀾非可二子并二子諫不從齊秦韓魏征娥若不之死父𦵏鱣與鯨二子死以介娥死以孝誠于今會稽人事之如事生娥若生堯時舜不妻女英娥若逢孔子娥名書孝經娥父若罹辜豈止為緹縈蔡邕不知娥但愛碑上銘我來拜祠下古木寒雲横往往大江水猶作哀哀鳴安得娥有知為我神隂靈鼓此大江波注入四瀆平洗濯天下心皆行娥所行會稽掇英總集巻八
