body:
  text: 會稽掇英總集巻十六宋孔延之撰越世家史辭司馬遷太史公曰禹之功大矣漸九川定九州至於諸夏艾安及苗裔句踐苦身焦思終滅彊吴北觀兵中國以尊周室號稱霸王勾踐可不謂賢哉盖有禹之遺烈焉范蠡三遷皆有榮名名垂後世臣主若此欲毋顯得乎秦德頌李斯皇帝休烈平一宇内徳恵修長三十有七年親巡天下周覽逺方遂登會稽宣省習俗黔首齋莊羣臣誦功本原事迹追首髙明秦聖臨國始定刑名顯陳舊章初平法式審别職任以立恒常六王專倍貪戾慠猛率衆自彊暴虐恣行負力而驕數動甲兵隂通間使以事合從行為辟方内飾詐謀外来侵邉遂起禍殃義威誅之殄熄暴悖亂賤滅亡聖徳廣宻六合之中被澤無彊皇帝并宇兼聴萬事逺近畢清運理衆物考騐事實各載其名貴賤並通善否陳前靡有隠情飾省宣義有子而嫁倍死不貞防隔内外禁止滛泆男女絜誠夫為寄豭殺之無罪男秉義程妻為逃嫁子不得母咸化亷清大治濯俗天下承風䝉被休經皆遵度軌和安敦勉莫不順令黔首修絜人樂仝則嘉保太平後敬奉法常治無極輿舟不傾從臣誦烈請刻此石光垂休銘曹娥碑邯鄲淳孝女曺娥者上虞曹盱之女也其先與周同祖末胄荒沈爰兹適居盱能撫節按歌婆娑樂神漢安二年五月時迎伍君逆濤而上為水所淹不得其屍娥時年十四號慕思盱哀吟澤畔旬有七日遂自投江死經五日抱父屍出以漢安迄於永嘉青龍辛夘莫之有表度尚設祭誄之辭曰伊惟孝女曄曄之姿偏其反而令色孔儀窈窕淑女巧笑倩兮冝其家人在洽之陽大禮未施嗟䘮慈父彼蒼伊何無父孰怙訴神告哀赴江永號視死如歸是以眇然輕絶投入沙泥翩翩孝女載沈載浮或泊洲嶼或在中流或趨湍瀨或逐波濤千夫失聲悼痛萬餘觀者填道雲集路衢泣淚掩涕驚動國都是以哀姜哭市杞崩城隅或有刻面引鏡剺耳用刀坐臺待水抱柱而燒嗚呼孝女徳茂此儔何者大國防禮自修豈沈庶賤露屋草茅不扶自直不斵自雕越梁過宋比之有殊哀此貞勵千載不渝嗚呼哀哉銘曰名勒金石質之乾坤嵗數厯祀立廟起墳光于后土顯昭天人生賤死貴利之義門何悵花落飄零乃分葩豔窈窕永世配神若堯二女為湘夫人時効髣髴以昭後昆後漢蔡邕題其碑隂云黄絹幼婦外孫韲臼梁建安王造剡山石城寺石像碑劉勰夫道源虚寂冥機通其感神理幽深𤣥匠思其契是以四海將寧先集威鳳之寳九河方導已致應龍之書况種智圎照等覺徧知揚萬化於大千擒億形於法界當其雲起攝誘之權影現遊戲之力可勝言哉自優曇發華而金姿誕應娑羅變葉而塔像代興月喻論其跡隠鏡譬辯其常照所以刻香望熛而自移畫木趣井而懸峙金剛泛海而遴集石儀浮滬以遙渡並造由人功而瑞表神力形器之妙猶或至此法身之極庸詎可思觀夫石城初立靈證發於草創彌勒建像聖騐顯乎鐫刻原始要終莫非禎瑞剡山峻絶競爽嵩華澗崕燭銀岫巘藴玉故六通之聖地八輩之奥宇始有曇光比丘雅修逺離與晉世于蘭同時並學蘭以慧解馳聲光以禪味消形影厯遊巖壑晩届剡山遇見石室班荆宴坐始有雕虎造前次有丹蟒依足各受三皈兹即引去後見山祇盛飾造帶訏談光説以苦諦神奉㠯崖窟遂結伽藍是名隠岳後蘭公剙寺號曰元花兹密通石城而拱木扃阻伯鸞所未窺子平所不值似石橋之天斷猶桃源之地絶荒茫以來莫測年代金剛欲基斯路自啓野人伐木始通山谿翦棘藝麻忽聞空響此是佛地不可種植心悟神封震驚而止又光公禪室耳屬東巗常聞絃管韻動霄漢流五結之妙聲凝九奏之清響由是兹山號為天樂至齊永明四年有僧䕶比丘刻意苦節戒品嚴浄進力堅猛來憩隠嶽游觀石城見其南駢兩峯北疊峻崿東竦圓岑西引斜嶺四嶂相銜鬱如鷲岳曲閒㣲轉煥若龍池加以削成青壁當於前巘天誘其衷神啓其慮心畫目凖願造彌勒敬擬千尺故坐形十丈於是擎爐振鐸四衆爰始胥宇命曰石城遂輔車兩寺鼎足而處克勤心力允集勸助疏鑿積年僅成面璞此外則碩樹朦朧巨藤交梗後原燎及崗林焚見石有自然相光正環像上兩際圎滿髙燄峰銳勢超匠楷功踰琢磨法俗竦心邑野驚觀僉曰冥造非今朝也自䕶公神遷事異人謝次有僧淑比丘纂修厥緒雖劬勞招奨夙夜匪懈而運屬齊末資力莫由千里廢其積跬百仞虧其覆簣暨我大梁受厯道鑄域中秉玉衡而齊七政協金輪而教十善地平天成禮被樂洽瞻行衢而交讓巡比屋其可封慈化穆以風動慧敎渙以景燭般若熾於香城表刹嚴於淨土希有之瑞旦夕鱗集難值之寶嵗時輻輳鎮南將軍江州刺史建安王道性自凝神理獨照動容立禮發言成徳英風峻於間平茂績盛乎魯衛自皇運惟新宣力邦國初鎮樊沔遷牧派江酌實樹聲鞅掌於民政率典頒職密勿於官府炎涼舛和爰動勞熱寢味貶常興居睽豫仁深祚逺徳滿慶鍾乗兹久禱之福將致勿藥之喜所以休禎𤣥會竗應旁通有始豐縣令吴郡陸咸以天監六年十月二十二日罷邑旋國夕宿剡溪值風雨晦冥驚湍奔壮中夜震惕假寢危坐忽夢沙門三人乘流告曰君識性堅正自然安隠建安王感患未痊由於微障剡縣僧䕶造彌勒石像若能成就必獲康復冥理非虚冝相開導咸還都經年稍㤀前夢後出門遇僧云聴講寄宿因言去嵗剡溪風雨之夜嘱建安王事猶憶此否咸當時憮然答以不憶道人笑曰但更思之仍即辭去不肯留止心悟非凡倒屣諮訪而慢色頗形詭辭難領拂衣髙逝直去靡回百步追及忽然不見咸霍爾意解且憶前夢乃剡溪所見第三人也再顯靈機重發神證縁感昭灼遂用騰啓君王智境邈羣法忍超絶邁優填之至心踰波斯之建善飡瑞言於羣聖膺福履於大覺倍増懇到會益喜捨乃開蔵冩貝傾邸散金装嚴法身誓取妙極以定林止寺祐律師徳熾釋門名盖浄衆虚心𢎞道忘已濟物加以貞鑒特達研慮精深乃延請東行憑委經始爰至啓敕專任像事律師應法若流宣化如陽揚舲浙水馳錫禹山於是捫虚梯漢構立棧道狀奇肱之飛車類仙腹之懸閣髙張圖範冠彩虹蜺椎鑿響於霞上剖石灑乎雲表命世之壯觀曠代之鴻作也初䕶公所鐫失在浮淺乃鏟入五丈改造頂髻事雖因舊功實創新及巖窟既通律師重履方精成像軀妙量尺度時寺僧慧逞夢黒衣大神翼從風雨立於龕前商畧分數是夜將旦大風果起拔木十圍壓壊匠屋師役數十安寢無傷比及詰朝而律師已至靈應之竒類皆如此既而謀猷四八之相斟酌八十之好雖羅漢之三觀兜率梵摩之再覘法身無以加也尋巖壁縝密表裏一體同影岫之縹章均帝石之騘色内無寸隙外靡纎瑕雕刻右掌忽然横絶改斷下分始合折中方知自斷之異神匠所裁也及身相克成瑩拭已定當于萬字信宿隆起色似飛丹圓如植璧感通之竗孰可思議天工人巧幽顯符合故光啓寶儀發揮勝相磨礲之術既極繪事之藝方騁棄俗圖於史皇追法畫於波塞青雘與丹砂競彩白鋈共紫銑争耀從容滿月之色赫弈聚日之輝至於頂禮仰䖍罄折肅望如須彌之臨大海梵宫之跱上天說法視笑似不違於咫尺動地放光若將發於俄頃可使曼陁逆風而獻芬旃檀隨雲而散馥梵王四鵠徘徊而不去帝釋千馬躑躅而㤀歸矣初隠嶽未開野絶人逕及光公馴虎時方雨雪導跡汚塗始通西路又東巖盤鬱千里聨嶂有石牛屇止至自始豐因其蹄涔遂啓東道尋石牛通嶮不資蜀丁之力文虎摽徑無待為人之威豈四天驅道為像拓境者歟以大梁天監十有二年歳次鶉尾二月十二日開鑿爰始到十有五年龍集涒灘三月十五日粧畫云畢像身坐髙五丈若立形足至頂十丈圎光四丈座輪一丈五尺從地隨龕光燄通髙十丈自涅盤已後一百餘年摩竭提國始製石像阿育輪王善容羅漢檢其所造各止丈六鴻姿巨相興我皇時自非君王願力之至如来道應之深豈能成不世之寶建無等之業哉竊惟慈氏鼎來拯斯忍刹惟我聖運福慧相符固知翅城合契於今晨龍華匪隔於来世四藏寶奇可蹻足而蹴三會甘露可洗心而待睿王妙慶現聖果於極樂十方翾動䝉法縁而等度矣思柱石於天梯想靈碑於地塔樹兹紺碣銘為勝幢金剛既其比堅鐵圍可與共久式奉偈讃仍作頌曰法身靡二覺號惟億百非絶名萬行焉測羣萌殊感聖應分極釋尊隠化慈氏現力夐㢤住縁邈矣來際求名受别無垢立誓凝神寂天降胎忍世七穫厥田八萬伊嵗夷荆沈礫飛花散寶夜燎明珠曉漩翠草一音闡法三會入道府豈虚植縁固人造曰梁啓聖皇實世雄紺殿等化赤澤均風慈徧羣有智周太空攝取嚴浄匡飾域中英英哲王徳昭珪璧樂善以居禮仁是宅慧動真應福交瑞跡儀彼旃檀像兹寶石五仞其廣百尺其袤金顔日煇紺螺雲覆頻果欲言鵞綱將授調御誰逺即心可觀耆闍五峯兹岳四嶺緑篠織煙朱桂鏤影泉来石嘯風去巖浄梵釋爰集龍神載騁至因已樹上果方凝妙志何取總駕大乗願若有質虚空弗勝刹塵斯仰邈刼永承桐柏山金庭館碑銘沈約夫生靈為貴有識斯仝道夭云及終天莫返故仙學之秘上聖攸尊啓玉笈之幽文貽金壇之妙訣駐景濛谷還光上枝吐吸煙霞變練丹液出沒無方升降自己下栖洞室上賓羣帝覩靈岳之驟啓見滄波之屢竭望𤣥州而駿驅指蓬山而永騖芝盖三重駕螭龍之蜿蜒雲車萬乗載旂斾之逶迤此盖棲靈五岳未暨夫三清者也若夫上𤣥奥逺言象斯絶金簡玉字之書𤣥霜絳雪之寶俗士所不能窺學徒不敢輕慕且禁誓嚴重志業艱劬自非天稟上才未易可擬自惟凢劣識鑒鮮方徒抱出俗之願而無致逺之力早尚幽栖屏棄情累留愛巖壑託分魚鳥塗愈逺而靡倦年雖老而不衰髙宗明皇帝以上聖之徳結宗𤣥之念忘其菲薄曲賜提引末自夏汭固乞還山權憩汝南縣境固非息心之地聖主纉厯復䝉縶維永泰元年方遂初願遂逺出天台定居兹嶺所憩之山實惟桐柏實靈聖之下都五縣之餘地仰出星河上參倒景髙崖萬沓邃澗千迴因髙建壇憑岩考室飭降神之宇置朝禮之地桐柏所在厥號金庭事昺靈圗因以名館聖上曲降幽情留信彌密置道士十人用祈嘉祉越以不才首膺斯任永棄人羣竄景窮麓結懇志於𤣥都望霄客於雲路仰宣國靈介兹景福延吉祥於清廟納萬夀於神躬又願道無不懐澤無不至幽荒屈膝戎貊稽顙息鼓輟烽守在海外因此自勉兼遂㣲誠日夕勤劬自强不已翹心屬念晩卧晨興飡正陽於停午念孔神於中夜將三芝而佇延飛九丹而宴息乗鳬輕舉留舄忘歸以兹丹款表之𤣥極無曰在上日鑒非逺銘石靈館以旌厥心其辭曰道無不在若存若亡於惟上學理妙羣方用之日損言則非常儵焉靈化羽變蜺裳九重嶤屼三山璀璨日為車馬芝成宫觀虹旍拂月龍輈漸漢萬春方為千齡始旦伊余菲薄竊慕隠淪尋師請道結友問津東探震澤西遊漢濱依稀靈眷髣髴幽人帝明紹厯惟皇纂位屬心鼎湖脫屣神器降命凡底仰祈靈祕瞻彼髙山興言覆簣啓基桐柏厥號金庭喬峰逈峭璧漢分星臨雲置墠駕岳開櫺磵塗蹇産林圻葱青誰謂應逺神道㣲密慶集宫闈祥流罕畢其久如地其恒如日夀同南山與天無卒更生變練外示無功少君飛轉密與神通因資假力輕舉騰空庻憑嘉誘永濟微躬禹穴碑鄭魴惟帝世聖時必有符命在昔黄帝始受河圗而定王籙宓戲得神蓍而垂皇策堯配璇璣玉衡以齊七政舜繼成六徳文王獲赤雀丹書而演道定謨予亦以為禹探䰠穴得開世之符而成厥水功夫神人合謀而行變化天地定位隂陽潜交五行迭王斗建司節岳尊山而瀆長川乃至日星雷風禎祥祕奥三綱五紀萬樂百禮人人物物各由厥生無非𤣥功冥持至數脗合以及之者王者奉天而行故聖神焉帝皇焉彼令如仲尼有徳而無應故位止於旅人福弗及於生靈乃歎曰鳳鳥不至河不出圗吾已矣夫然後知元命者軒告命者羲受命者曰唐與虞成命者禹備命者文仲尼不受命乃假人事而言故有宗予之說後代無作焉立言者壹仁義以束世教瞽瞶蚩蚩使絶其非望法業之外存而不論予讀夏書無是說司馬子長自叙始云登會稽探禹穴不然萬禩何傳焉惑矣蒼山之瀦呀如淵如陵徙谷遷此中不騫雨洗煙空􅀈然莫窮噫實禹跡之所始終唐興二百八祀寶厯庚午秋九月予從事于是鄉感上聖遺軌而學者無述作禹穴碑亷察使舊相河南公見而銘之銘元稹禹穴冝載夏與秦胡為而不載禹貢無說秦始皇游會稽李斯刻石亦不言古而不載遷與鄭胡為而載始司馬遷自叙探禹穴而後千百年無說至鄭乃制此碑予以為天徳統萬止言其盖言其盖萬物以生非談天氏所謂盖天者也地徳統萬止言其載言其載萬物以生也堯徳統萬止言其大千川萬山皆禹之會讀為會稽之會符一穴禹穴藏五符統而言之故曰一不足為最故夏與秦俱不之載而人以之昧雖山之堅雖洞之濊有時而堙有時而兊嵗其萬千風雨濤汰亡其嵌呀叢是蘙薈鄭與遷斯碑斯載時斯時之賴書戒珠寺趙璘直浙東觀察治勾踐故城其東北三里有山曰蕺蕺蔬類也傳云昔越君所嗜常採於此遂用名之在晉為王逸少别址尚留故池與祠堂又云陳大建初有天竺徒聴門踰顛辯博神異及死葬山上其形數見後夢語其門人曰必為臥像屋之壓我則不見為之果如言而所構華壯敞絜甲於郛内所謂昌安寺者其後二百七十餘年學人懐表猶病正位未廣繕治益嚴又十年值會昌廢毁之數獻文皇帝君天下大中初復許郡府量立寺宇而越州得其五昌安在詔中六年六月又别以戒珠為名觀察使尚書李公襃實司其事當是時其徒多罷去或不任事而懷表復顓其勞今則崇構真就矣學者或去或没獨懐表齒且耄精恪如初可歡乎余長慶中始冠將為進士生寓此肄業時懐表已名字衆人中及開成繕治始休工余以前讎校祕書逰越與懷表復相遇蘄余為記逮今二十二換四時矣中間遭罹丘墟又重樹立於人事悲歡不可遽數循分累寸奇蹇塵寰晩守江嶺强號顯達而表公不離繩榻㡬覩廢興雪頂絲睂始終一趣可謂行充於内而福持於外者矣余既詳其本末思有以傳扵綿長客有前藤州刺史駱巽與聞之喜曰某蕺山之下寄居人也且與表公逰甚乆歸願買石以刻遂筆以授之咸通三年正月二十五日中大夫守衢州刺史趙璘直書大龍泉寺碑并序虞世南昔軒轅之臺表於大荒之野靈光之殿存乎曲阜之鄉然皆起滅不停苦空無我遺風餘跡尚或可觀况佛刹浄居金剛福地百靈之所翊衞萬善之所扶持冝其踰億刼以永存厯三災而彌固者也龍泉寺者晉咸康二年縣民王湯及虞𢎞實等之所建立二人以宿植之良因修未來之勝果爰捨浄財興新福事雖宏壮未極而嚴浄有餘其地勢則憑峻嶺以為墉縈長江其如帶乃於形勝之所式建方墳背巘面流亭然孤立譬羣峰之望泑澤若圓嶠之汎滄溟棲真之致莫與為儔道場之建于兹二百年矣值梁室板蕩大盜潜移四海沸騰九夷交亂其壯騎之所憑陵戎馬之所躪轢燎原薙草邑無遺噍玉堂金穴餘構莫存甲第髙門尺椽皆盡浙河之左尤鍾其弊于時禹川殷阜舉袂成帷雲棟繡連雕甍綺閣皆夷漫滌蕩萬不一存潤屋為墟曝骸如莽家靡餘爨路無行跡唯此伽藍嶷焉不動清梵夜響和鈴旦揚行人宴嘿風塵無警或有履鋒介士彎弧劍客莫不釋戈免胄望崖頂禮豈非慈善幽賛功徳冥符能伏獯戎善和怨敵斯固三寶之力不可思議但自創立以來多厯年所時經理亂道或汚隆冬室夏堂亟多頽毁禪思或擾分衞罕周乃有清信士女若干人咸撤布帛隨時喜捨步影揵搥資待無缺有仁祠焉有浄衆焉籍四部之䕶持起十方之迴向低頭合掌並趨菩提彈指散花皆成妙道然佛法難逢人身易失傳火交謝念念不留閱水成川滔滔莫反寧可宴安巢幕甘寢積薪沈溺蓋纒不求解脫實冝出愛網同䕶法城修福不捐至誠必感大悲汲引義非虚說庻憑願力俱證道場是用鏤之金石咸題姓字貽諸不朽乃作銘曰正教既隠像法斯備柰苑祇林香城金埊鳥跂連屬鷄飛相次像設閒安斯為佛事乃建靈塔傃江之永棟宇既修雕龕斯整負岩面壑棲雲倒景澹爾智流嶷焉仁靖方丈淨室四柱寶臺運遷時謝日往月來桂棟或朽蘭橑將摧珠幡掩色寶網凝埃篤矣清信共𢎞利益或捨衣裘咸傾粟帛造新葺故呈材獻石埊擬金繩供同香積世諦虚假色相非真棲託嘉樹迴環苦輪唯我浄域出要良津勝業可久暉光日新秦望山法華寺碑序李邕昔者法王道開堀山相現曽是大事職非小縁順喻孔多證入彌逺故以三界為宅五濁為火四生為子六度為門一乗為大車十方為長者轉置熱惱之衆延集清涼之都念兹在兹廣矣大矣法華者晉義熈十二年釋曇翼法師之所建也師初依廬山逺公後詣關中羅什深入禪慧尤邃佛乗雖禮數摳衣而名稱分坐與沙門曇學俱遊會稽覯秦望西北山其峯五蓮其溪雙帶氣象靈勝林壑虚間比興耆闍營卜蘭若羞涅槃食納如来衣專積法華永言寶意感普賢菩薩為下俚優婆提狶子於竹筐寄釋種於蓬室師以縮屋未可枕屐乃明移出樹間延入舍下及杲日初上相光忽臨乗六牙衞八部勝幡虹引妙樂天迎瑞相騰雲遙裔上漢師想望太息沈吟永懐葉公好龍已遇真物羅漢測佛未了聖心於是苦行自身炯誡通夢宛如昔見彌恨前非象勸持經嘗難其語夾夾聴法不易其人矧乃攝以蜂王吼以師子禮謁者掎其裳袂讃歎者合其風雷時太守孟顗以狀奏聞以為寺則知妙法者真如之正體蓮華者浄道之假名是故崇厥經署於牓入無量義成不住因至若髙僧慧基邑人陳載皆踵武扳跡傳燈襲明或五柱範堂或七寶規殿立普賢座追連弗藍龍王讓池雁子疏塔迦羅衛國連至雲山浄明徳宫更開日月固足以發慧印啓𤣥門入位畢臻出家偕應則有持證等觀永藏同流或慧舉十徵或昭明再造或簡文瑞像或武帝香鑪寶鈴吟風珠幡交露僧瑤墨意畫長豪之妙光宫女綖功織大身之變相次有陳隋國施州邑吏桓百寶盈於九偶羣經備於三藏所以神鍾警夜保賢聖之天居祥烏肅賓迓軒盖之雲集忍辱靈草捃萋萋扵小莖優曇異花搴灼灼於喬榦故得人天迴首江海因聲芭蕉遇雷倐焉滋茂葵藿隨日至矣勤誠登山而野曠心空浴水而垢除意浄施及先律師道岸今弟子釋儼並身林乆伐禪刺都遣性通七事戒揔八關金杖五分優劣既等繒綵四道功徳豈殊甘露有加香油不墜頃者豪州刺史前此邦别乗太原王公名弼法海廣大慧炬融明徳立於衷義開於物郅惲致主之節有耿扳竿葛亮報國之誠不忘草奏夫人武氏佩服真空干櫓正櫓正覺及男緬緒等惟肖二尊克慎三業若行若坐依佛依僧去煩惱之外糠得慈悲之内實起普賢臺一級冩法華經千部廣化人吏大啓津途即普賢臺立法華社毎年二月重會一時且地効其靈山呈其秀有上座正覺寺主道解都維那神慧僧表道賓律師行深慧燈集衆材為林衆器成樂一體和合互用住持相與王公曰夫名者事之華碑者物之表其或表不立則瞻仰失容名不興則讃述無地願言刻石是用齊山朝散犬夫前侍御史今都府户曺袁公名楚客其皎如日其心如丹負兼濟之雄才託演成之雅意顧慙作者徒使懵然其辭曰會稽南山秦望北寺髙僧往還聖跡標竒耆闍北峯法華取義羣公䕶持厯國檀施陸寶大來海珍總萃幡影連珠像光發瑞臺壓龍首殿開鳥翅象駕菩薩烏迎車騎異香馝馞神鍾髣髴松巘蕭疎竹澗葱翠綱紀有條禪律不墜掾曹正直别乗仁智作為碑版讚述名字會稽掇英總集巻十六
