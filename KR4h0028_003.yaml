body:
  text: 會稽掇英總集卷三宋孔延之撰山水上鑑湖律詩序序之作因棹歌也欲見鑑湖事故標於此棹歌見後蔣堂鑑湖三百里灌田九千頃蓋東漢太守馬侯臻所興也迄今僅二千載民獲其利前歲中或人上言廢湖為田朝廷既已報可郡之豪奪輩方將影援而力取之會豫出守於此有瀕湖之民麕至於庭叩頭以請曰苟廢此湖誠斷民命因盡得利病飛章以復之自是無敢橫議者時暮春三月風恬無波居人揚舲於湖上載酒而往歡遊忘歸率思馬侯之惠也因為作棹歌俾斯民習之而歲享侯祠焉酬微之誇鏡湖白居易我嗟身老歲方徂君更官高興轉孤軍門郡閣曾間否禹穴耶溪得到無酒盞省陪波卷白骰盆思共彩呼盧一泓鏡水誰能羡自有胸中萬頃湖靈汜橋李紳靈汜橋邊多感傷水分湖派繞回塘岸花前後聞幽鳥湖月高低怨緑楊能促歲華惟白髮巧乘風馬是春光何年化鶴歸華表却數凋零念越鄉龜山在鏡湖中山形如龜李紳一峯凝黛當明鏡千仭喬松倚翠屏秋月滿時侵兔魄素波搖處動龜形舊深崖谷藏仙島新結樓臺起佛扄不學大蛟為水怪等間雷雨害生靈東武亭李紳渌波春水湖光滿丹檻連楹碧嶂遙蘭鷁對飛漁棹急彩虹翻影海旗搖鬬疑班虎歸三島散作遊龍上九霄鼉鼓若雷爭勝負栁堤花岸萬人招鑑湖西鳬言事方干慵拙幸便荒僻地縱聽猿鳥亦何愁偶斟藥酒欺梅雨却著寒衣過麥秋嵗計有時添橡實生涯一半在漁舟漁人若便無知已應向此溪成白頭陪王大夫泛湖方干去去凌晨逈見星木蘭舟穩畫橈輕白波潭上魚龍氣紅樹林中雞犬聲蜜炬燒殘銀漢杳羽觴飛急玊山傾此時檢點諸名士却是漁翁無姓名醉題東武亭元稹役役間人事紛紛碎簿書工夫兩衙盡留滯七年餘病痛梅天發親情海岸疏因循未歸得不是戀鱸魚秋夜宿嚴維宅皇甫冉昔聞玄度宅門對會稽峯君住東湖上清風繼舊蹤秋深臨水月夜半隔山鐘世故多離别良宵詎可逢鑑湖月夜行舟林槩湖光如鑑月如圭月下湖中兩槳飛鶴氅四埀冰骨爽夜深疑自廣寒歸出五雲溪口將入照湖清風微雨物象可愛蘇舜欽溪面霏霏雨點勻山腰疏樹半藏雲輕舟無事信風去驚起前灘白鷺羣經照湖方干舊居吳遵路磻溪埀釣者終得展其才何事先生隱不逢明主來泉聲秋雨歇月色夜雲開對此空惆悵吟魂早晚廽憶秦望照湖二境吳徑東南山水古馳名合與騷人養性靈秋色欲歸雲轉白潮痕不到草常青巖房避暑堪長往桂楫浮春幾度經何事深思無暇日宿猿崖近狎鷗汀古詩與崔二十一遊鏡湖寄包賀二公孟浩然始覽鏡湖物中流到底清不知鱸魚味但識鷗鳥情帆得樵風送春逢榖雨晴將探夏禹穴稍背越王城府掾有包子文章推賀生滄浪醉後唱因子寄同聲東望此詩皇祐中親題於湖上之譙門王相越山長青水長白越人長家山水國可憐客子無定宅一夢三年今復北浮雲縹眇抱城樓東望不見空回頭人間未有歸耕處早晚重來此地遊鑑湖晚歸張伯玊會稽太守無事時緩帶長作漁樵嬉大航平榻引濵從談笑晚從湖上歸湖邊居人望簇簇湖岸花木情依依環峰暗靄天四埀渌水蕩漾雙紅旗城頭疊角已平西船上樽酒含餘輝冷風徐引江鵠飛白雲回首清猿啼漁謳菱棹煙火微使人却厭千騎隨歸來樓閣上燈後時覺天風清滿衣泛五雲溪遊照湖歸吳奎樵風漾歸舟飄然一葉輕曲岸忽超逸逺山回抱明幽禽淡容與荷芰相低傾野田足收穫村叟時逢迎歡言無物役得我遊覽情日腳暮雲起湖面蓼煙生棹歌序見前蔣堂湖之水兮碧泱泱環越境兮潤吳疆蒲螺所萃兮雁鶩羣翔朝有行艫兮暮有歸艎茭牧狎至兮漁採相望溉我田疇兮生我稻糧我嵗穰熟兮我民樂康馬侯之功兮其誰敢忘蓴絲紫兮箭筍黃取其潔兮薦侯堂盞斝具兮簫鼓張日暗暗兮山蒼蒼侯之來兮雲飛揚隔微波兮濳幽光念山可為席兮湖不可荒惟侯之靈兮與流比長萬斯年兮福吾鄉樂吾生兮倘佯蘭亭古詩晉右將軍王羲之上巳日會蘭亭曲水詩并序王羲之永和九年嵗在癸丑暮春之初會於會稽山隂之蘭亭修褉事也羣賢畢至少長咸集此地有崇山峻嶺茂林修竹又有清流激湍映帶左右引以為流觴曲水列坐其次雖無絲竹管絃之盛一觴一詠亦足以暢敘幽情是日也天朗氣清惠風和暢仰觀宇宙之大俯察品類之盛所以遊目騁懷極視聽之娛信可樂也夫人之相與俯仰一世或取諸懷抱晤言一室之內或因寄所託放浪形骸之外雖趣舍萬殊靜躁不同當其欣於所遇暫得於已快然自足曾不知老之將至及其所之既倦情隨事遷感慨係之矣向之所欣俯仰之間以為陳迹猶不能不以之興懷况修短隨化終期於盡古人云死生亦大矣豈不痛哉每覽昔人興感之由若合一契未嘗不臨文嗟悼不能喻之於懷固知一死生為虛誕齊彭殤為妄作後之視今亦由今之視昔悲夫故列敘時人録其所述雖世殊事異所以興懷其致一也後之覽者亦將有感於斯文四言代謝鱗次忽焉以周欣此暮春和氣載柔詠彼舞雩異世同流乃攜齊契散懷一丘五言仰視碧天際俯瞰渌水濱寥閴無涯觀寓目理自陳大矣造化功萬殊莫不均羣籟雖參差適我無非新四言謝安伊昔先子有懷春遊契兹言執寄傲林丘森森連嶺茫茫原疇迥霄埀霧凝泉散流五言相與欣嘉節率爾同褰裳薄雲羅物景微風翼輕航醇醪陶丹府兀若遊羲唐萬殊混一象安復覺彭殤四言謝萬肆聎崇阿寓目高林青蘿翳岫修竹冠岑谷流清響條鼓鳴音玄崿吐潤霏霧成隂五言司冥卷隂旗句芒舒陽旌靈液被九區光風扇鮮榮碧林輝翠英紅葩擢新莖翔禽撫翰遊騰鱗躍清泠四言孫綽春詠登臺亦有臨流懷彼伐木肅此良儔修林隂沼旋瀨縈丘穿池激湍連泛觴舟五言流風拂枉渚亭雲蔭九臯鶯羽吟修竹遊鱗戲瀾濤攜筆落雲藻微言剖纎毫時珍豈不甘忘味在聞韶四言徐豐之俯揮素波仰掇芳蘭尚想嘉客希風永歎五言清響擬絲竹班荆對綺疏零觴飛曲津歡然朱顔舒四言孫統茫茫大造萬化齊軌罔悟云同競異標旨平勃運謨黃綺隱几凡我仰希期山期水五言地主觀山水仰尋幽人蹤回沼激中逵疏竹間修桐因流轉輕觴泠風飄落松時禽吟長澗萬籟吹連峯四言王彬之丹崖竦立葩藻映林渌水揚波載浮載沈五言鮮葩映林薄遊鱗戲清渠臨川欣投釣得意豈在魚四言王凝之莊浪濠津巢步潁湄冥心真寄千載同歸五言氤氲柔風扇熙怡和氣淳駕言興時遊逍遙映通津四言王肅之在昔暇日味存林嶺今我斯遊神怡心靜五言嘉會欣時遊豁爾暢心神吟詠曲水瀨渌波轉素鱗四言王徽之散懷山水蕭然忘羈秀薄粲穎疏松籠崖遊羽扇霄鱗躍清池歸目寄嘆心冥二竒五言先師有冥藏安用羈世羅未若保沖真齊契箕山阿四言袁嶠之人亦有言意得則歡嘉賔既臻相與遊盤微音迭詠馥焉若蘭茍齊一致遐想揭竿五言四眺華林茂俯仰清川渙激泉流芳醪豁爾纍心散遐想逸民軌遺音良可玩古人詠舞雩今也同斯嘆一十五人一篇成五言却曇溫風起東谷和氣振柔條端坐興逺想薄言遊近郊四言王豐之肆眄巖岫臨泉躍趾感興魚鳥安兹幽跱四言華茂林榮其鬱浪激其隈泛泛輕觴載欣載懷四言庾友馳心域表寥寥逺邁理感則一冥然斯會五言虞説神散宇宙內形浪濠梁津寄暢須臾歡尚想味古人五言魏滂三春陶和氣萬物齊一歡明后欣時豐駕言映清瀾亹亹德音暢蕭蕭遺世難望巖愧脫屣臨川謝揭竿五言謝繹縱暢任所適回波縈遊鱗千載同一朝沐浴陶清塵五言庾藴仰想虛舟説俯嘆世上賔朝榮雖云樂夕斃理自因五言孫嗣望巖懷逸許臨流想竒莊誰云真風絶千載挹遺芳五言曹茂之時來誰不懷寄散山林間尚想方外賔超超有餘間五言曹華平願與達人遊解結遨濠梁狂吟任所適浪流無何鄉五言桓偉主人雖無懷應物寄有尚宣尼遨沂津蕭然心神王數子各言志曾生發竒唱今我欣斯遊愠情亦暫暢五言王玄之松竹挺巖崖幽澗激清流蕭散肆情志酣觴豁滯憂五言王藴之散豁情志暢塵纓忽以捐仰詠挹遺芳怡神味重淵五言王渙之去來悠悠子披褐良足欽超迹修獨往真契齊古今一十六人詩不成各罰酒三觥名見前後序孫綽古人以水喻性有旨哉非所以澄之則清淆之則濁耶故振轡於朝市則充詘之心生間步於林野則寥落之意興仰瞻羲唐邈然逺矣近詠臺閣顧探增懷聊於曖昧之中期乎瑩拂之道暮春之始褉于南澗之濵高嶺千尋長湖萬頃乃藉芳草鑑清流覽卉物觀魚鳥具類同榮資生咸暢於是和以醇醪齊以達觀快然兀矣焉復覺鵬鷃之二物哉耀靈促轡急景西邁樂與時去悲亦系之往復推移新故相換今日之迹明復陳矣原詩人之致興諒詠歌之有由文多不載大略如此所賦詩亦裁而綴之如前四言五言焉題吳長文得蘭亭康相墓顔魯公斷碑王相魯公之書既絶倫嵗久更為時所珍荒壇壞冢朽崖屋剝落風雨埋埃塵斷碑數尺誰所得點畫入紙貌如新延陵公子好事者拓取持寄情相親六書篆籀數變改訓詁後世多失真誰初妄鑿妍與醜坐使學士勞骸筋堂堂魯公勇且仁出遇世難親經綸揮毫卓犖又驚俗豈亦以此誇常民但疑技巧有天得不必強勉方通神詩歌甘棠美召伯愛惜蔽芾猶思人時危忠義常恨少寶此勿復令埋堙同前王安國魯公之忠曠世無吾愛斯人何必書九原寥寥不可詰筆法髣佛精神餘况公於藝自天縱一字宜用干金摹想當揮灑笑談際不復靳惜唯所須山砠水險勇鑱刻照耀楚越連秦吳百年兵火變陵谷萬里玊石埋榛蕪時平好事搜遣迹窮極南北緣﨑嶇耳聞目見略已盡疑有斷裂留樵漁那知數尺翳塵土洗滌近出都城居松煤到紙覺飛動氣象磊落超鍾虞吳卿獲此喜驚坐朝昏把玩過明珠攜來贈客客為賦爽邁逺並前賢驅自云感激得妙理學入勝處繇勤劬余聞書史羸蟠礴意匠不為形骸拘能將聲利瓦礫棄點畫應手成璠璵公遭亂世生死俱見危授命真丈夫俯仰兵刃猶簪裾毫端妍醜肻睢盱試懷局縮較精粗體勢豈暇煙雲舒區區技巧尚乃爾欲鳴道德冝何如嗟哉荒煙幾日月豪俊忽徙臨庭除由來始棄終見取鑒裁誰敢欺錙銖物微顯晦亦有待人生通塞無巧愚寄謝紛紛馳騖徒真偽枉以好惡誣會稽掇英總集卷三
