body:
  text: 會稽掇英總集巻七宋孔延之撰雲門寺律詩若耶谿附若耶谿在會稽東南北流入鑑湖歐冶子鑄劍之所也戰國䇿曰涸若耶以取銅是也徐浩嘗云曾子不居勝母之閭吾豈遊若耶之谿因改為五雲谿遊雲門寺者必經是谿故附於此寄雲門亮師盧象𤣥度常稱支道林南山隠處白雲深一去人間長不見千峰萬壑樹森森同孔九泛若耶入雲門綦毋潛同君此谿曲託勝在煙霞潭影竹裏動巖隂天際斜人言上皇代犬吠武陵家借問淹留日春風滿若耶寄靈一上人初還雲門郎士元寒山白雲裏法侣自招攜竹徑通城下松門隔水西方同沃州去不作武陵迷髣髴心知處髙峯是會稽若耶谿西施採蓮歐冶鑄劍所李紳嵐光花影繞山隂山轉花稀到碧潯傾國美人妖豔逺鑿山良冶鑄鑪深凌波莫借臨粧面瑩鍔當期出匣心應是蛟龍長不去若耶秋水尚沈沈若耶春興僧皎然春生若耶水雨後漫流通芳草行無盡清源去不窮野煙迷極浦斜日起微風數處乗流望依稀似剡中上已日與鮑侍御泛舟耶谿劉長卿蘭橈漫轉傍汀沙應接雲峯到若耶舊浦滿來移渡口垂楊深處有人家永和春色千年在曲水鄉心萬里賒君見漁船時借問前洲幾路入烟花留題雲門山雍熙院錢惟演精舍依巖巘香林結薜蘿崇臺涵夕靄危閣架春波浄饌供蒲塞真詮譯貝多幾時輝晝錦松下駐鳴珂同前范仲淹一路入嵐堆還驚禹鑿開林無惡獸住巖有好泉來雲陣藏雷去山根到海回莫辭登絶頂南望即天台五雲谿醉歸張伯玉每日谿頭醉臉紅歸來庭院夕陽中依稀聴得家人語扶取五雲谿上翁若耶谿陳舜俞十里澄谿谿上山谿光無際照山顔天嫌俗眼尋常見地借羣峰左右關蓬島也應非海外瓊壺争合貯人間維舟正欲踟蹰飲坐見蒼煙羃翠灣同前錢公輔若耶谿出若耶山浪影溶溶入醉顔仙客曾因一箭贈樵風長到五雲關數峯蘸碧輕清外雙舸浮春上下間料得當年乗興子為貪煙水宿前灣遊雲門寺趙諴竟夕雨聲寒黎明日氣暄峰巒添積潤谿澗漲新痕鐘鼔連三寺杉松共一村不須遊賞徧麗句滿清軒古詩宿雲門寺宋之問雲門耶谿裏泛舟路才通夤縁緑篠岸遂到青蓮宫天香衆壑滿夜梵羣山空漾漾潭際月颼颼杉上風兹焉逸嘉遁數子今莫同鳳歸慨處士鹿化聞仙翁樵徑謝村北學井何巖東永夜豈云寐曉景忽朦朧谷鳥囀尚澀源桃驚未紅再來期春暮當造林端窮庶以蹤謝客開山投剡中遊越中山水留雲門孟郊日覺耳目勝我來山水州蓬瀛若髣髴四野多泛浮碧嶂幾千繞清源萬餘流莫窮合沓步孰盡派别遊越水浄難汚越天隂易收氣鮮無隠物目視逺更周舉俗媚葱蒨連冬擷芳柔菱湖有餘翠茗圃無荒疇賞異忽已還探奇始淹留永言終南山去矣銷人憂登雲門山閣懐徐補闕孟浩然我行適諸越夢寢懐所歡久負獨往願今來恣遊盤台嶺踐苔石耶谿泛林湍捨舟入香界登閣憩栴檀晴山秦望近春水鏡湖寛逺遊佇應接卑位徒勞安白雲無久滯滄海時來觀故國渺天末良朋在朝端遲爾同攜手何時方挂冠入雲門五谿上作六言顧非熊舟泊有時垂釣舟行不廢閒吟沿山寺寺花樹枕水家家竹林鴛鴦晝飛谿静鸜鵒夜轉村深忽聞風動蓮葉起見波間月沈宿雲門寺白居易昨夜有風雨雲奔天地合龍吟古石樓虎嘯生巖閤幽意未盡懐更行三五帀送靈澈還雲門韋應物我歡長在夢無心解傷别千里萬里人祇是眼中月入若耶谿崔顥輕舟去何疾已到雲林境起坐魚鳥間動摇山水影巖中響自荅谿裏言彌静事事令人幽停橈向餘景宿道一上方院王維一公棲太白髙頂出雲煙梵流諸洞徧花雨一峰偏迹為無心隠名因立數傳鳥來還語法客去更安禪晝涉松路盡暮投蘭若邊洞房隠深竹静夜聞遥泉向是雲霞裏今成枕席前豈惟暫留宿眠來将窮年雲門符公蘭若最幽與薛八同往孟郊謂余獨迷方逢子亦在野結交指松柏問法尋蘭若小谿劣容舟怪石屢驚馬所居最幽絶所往皆静者密篠隂路傍清泉流舍下上人亦河間塵念都已捨四禪合真如一切皆虚假願承甘雲潤喜得慧風灑依止此山門誰能斆丘也酬綦母校書夢遊耶谿見贈儲光羲校文在仙掖每有滄洲心况以北忩下夢遊清谿隂春看湖口漫夜入迴塘深往往纜垂葛出舟望前林山人松下飯釣客蘆中吟小隠何足貴長年固可尋還車首東道惠然若南金以我採薇意傳之天姥岑奉同徐侍郎五雲谿新亭重陽宴集獨孤及萬峰蒼翠色雙谿清淺流已符東山趣况值江南秋白露天地肅黄花門館幽山公惜美景肯為芳樽留五馬照池塘繁絃催獻酬風前孟嘉帽乗興李膺舟騁望傲千古當歌遺四愁豈令永和人獨擅山隂遊耶谿泛舟孟浩然落景餘清輝輕棹㺯谿渚澄明愛水物臨泛何容與白首垂釣翁新粧浣紗女相㸔未相識脉脉不得語春泛若耶留題雲門寺綦毋潛幽意無斷絶此去隨所偶晩風吹竹舟花路入谿口際夜轉西壑隔山望南斗潭煙飛溶溶林月低向後生亊且瀰漫願為持竿叟若耶春意許景先越水正逶迤豔陽三月時中有嬋娟子含怨望佳期鮮膚潤玉澤微眄動蛾眉解珮遺中浦折芳懐所思彩色豈不重瓌豔難久滋一歌江南曲再使妾心悲雲門寺僧靈澈湖邊歸鶴唳寥泬僧房半倚秦峰缺雲生幽石何逍遥泉去疎林幾嗚咽天寒猛虎叫巖月松下無人空有雪千年像教人不聞燒香獨為鬼神説招道一上人居雲門僧道猷連峯數千里修林帶平津雲過逺山翳風至梗荒榛茒茨隠不見雞鳴知有人閒步踐其徑處處見遺薪始知百代下故有上皇民開此無事跡以待疎俗賔長嘯自林際歸此保天真題雲門無側道人房僧皎然越山千萬雲門絶髙僧貌古還名月清朝拂石行道歸林下眠禪看松雪登雲門吳升亭僧洪偃蕭蕭物候晩肅肅天望清旅人聊杖策登髙蕩客情川源多舊跡墟里或新名宿煙浮始旦朝日照初晴逺行乏徒侣徐步寡逢迎信矣非吾託賞心何易并杖䇿歸若耶雲門杖策步前嶺褰裳出外扉輕蘿轉䝉密幽徑復紆威松髙枝影細山晝鳥聲稀石苔時滑屣蟲網乍黏衣澗傍紫芝曄巖上白雲飛杉梓排煙去尚生寂弗歸窮谷無還往攀桂獨依依遊雲門寺留題靈運上人房吳奎雲門入雲深樹密山轉幽谿亭修竹裏激激玉泉流仁智所遐想古今為勝遊我來休沐至窮覽殊難周金碧樓殿午寒香松桂秋清風動髙興飄越不可收禪師索題詩捉筆事冥搜欲速馳思逺頃刻厯九州象外有真物惝怳難為求徒形陳熟言羞澀為爾留雲門寺蘇舜欽翠嶂環合封白雲中有蕭寺三為鄰雲門梁武所作今分為三寺相連老松偃蹇若傲世飛泉奔薄如避人蒼猨嘯斷夜月古丹花開逼陽崖春盤桓數日不忍去舟出耶谿猶慘神留題雲門山雍熙院謝景温耶谿欲盡山轉青中有三寺山為屏秦峰表裏植蒼翠仰視萬木相峥嶸雪霜洗盡塵土跡龍蛇蟄處煙氛生我攜賔友事登覽穿徑已覺毛骨輕窮幽陟險興不盡巖房留宿神逾清寒隨隂谷一夜來酒力半酣如不勝狂歌出門步竹逕正見谿橋雙月明幽泉亂出石竇響松風逺送哀猿聲凌晨後嶺縱俯仰長林翠阜何縱横獻之舊地不可辨懸崖欲斷石作坑五雲散盡遺跡滅老僧至今傳此名憑髙覽古復太息翻嗟萬事多廢興丈夫出處固未測我於山水心難縈區區世路雖可厭脱身向此誠獨醒豈如乗興事兹樂賞心不繫窮與亨昔人避世非獲已我今安學禽鳥情同前吳處厚三寺峙若鼎四山合如環偷攜野人杖黙叩禪翁關草樹冬不老雲煙秋更閒飄飄物外興又逐歸禽還會稽掇英總集巻七
