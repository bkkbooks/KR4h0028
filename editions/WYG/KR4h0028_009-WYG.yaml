body:
  text: 會稽掇英總集巻九宋孔延之撰雜寺觀律詩昌安寺李紳寺深松桂無塵事地接荒郊帶夕陽啼鳥歇時山寂寂野花殘處月蒼蒼碧紗凝焰開金像清梵消聲閒竹房丘壠漸平連茂草九原何處不心傷龍宫寺并序此寺摧毁積嵗正元十八年余為布衣東遊天台故人江西觀察使崔公以殿中謫官移治剡溪崔公座中有僧曰修真自言居龍宫寺起謂余言異日必當鎮此為修此寺時以為狂易之言不之應僧相視久之而退至元和三年余以前進士為故薛苹常侍招至越中此僧已卧疾使門人相告曩日所言必當鎮此修寺之記幸不見忘僧偶言寺有靈祇相告爾予問疾而已不能對及後符其言而詢其存沒則僧及門人悉殂謝寺更頽毁唯荒墟餘拱而已因召寺僧會真以俸錢為葺之累月而畢以成其往願也銀地溪邊遇衲師笑将花雨指潛知定觀𤣥度生前事不道靈山别後期真相有無因色界化城興滅在蓮基好令滄海龍宫子長䕶金人舊浴池龜山寺魚池此池微之所修戒其僧以䕶生之意及公垂至見其詩而笑之未幾寺之僧果有罟於池中者公垂因形於詩云元稹勸汝諸僧好䕶持不須垂釣引青絲雲山莫厭看經坐便是浮生得道時同前李紳汲水添池活白蓮十千鬐鬛盡生天凡庸不識慈悲意自𦵏江魚入九泉題寶相寺孟浩然石壁開金像香山倚鐵圍下生彌勒見迴向一心歸松竹前庭古樓臺世界稀多嵐增氣色餘照發寒輝講席邀譚柄泉堂施浴衣願乗功徳水從此濯塵機同前僧南粤松徑行纔盡香城絶世塵倚巖開半殿鑿石見全身鐘鼓中天曉煙花上界春出門重稽首願值下生晨宿天柱觀僧靈一石室初投宿仙翁喜暫容花源隔水見洞府過山逢泉涌階前地雲生户外峯中宵自入定非是欲降龍龍瑞宫禹穴也三十六洞天之第十一曰陽明洞天大禹探書治水之所唐神龍中置懐仙館開元中勅方士葉天師設醮而龍見因改今額春分日投簡陽明洞天作元稹中分春一半今日半春徂老惜光隂甚慵牽興緒孤偶因投秘簡聊得泛平湖郡邑移仙界山川展畫圖旌旗遮嶼浦士女滿闉闍似木吳兒勁如花越妓姝牛儂驚力直蠶妾笑睢盱怪我攜章甫嘲人託鷓鴣閭閻隨地勝風俗與華殊跣足沿流婦丫頭避役奴雕題雖少有雞卜尚多巫鄉味尤珍蛤家神愛事烏舟船通海嶠田種繞城隅櫛比千艘合袈裟萬頃鋪茭荼闐小市漁火隔溪蘆日脚斜穿浪雲根逺曳蒲欵風花氣度新雨草芽蘇粉壊梅辭萼紅含杏綴珠薅餘秧漸長燒後葑猶枯緑綟髙懸栁青錢密辮榆馴鷗眠淺瀨驚雉迸平蕪水浄王餘見山空謝豹呼燕狂捎蛺蝶螟挂集蒲盧滅碧鶴新卵深黄鵞嫩雛村扉開白版寺壁耀頳糊禹廟纔離郭陳莊恰半途石帆何峭嶢龍瑞本縈紆穴為探符坼潭因失箭刳隄形彎熨斗峰勢踴香鑪幢蓋迎三洞煙霞貯一壺桃枝蟠復直桑樹亞還扶鼈解稱從事松堪作大夫榮光飄殿閣虚籟合笙竽庭狎仙翁麂池游縣令鳬冥心除健羨扣寂入虚無岡踏飜星紀章飛動帝樞東皇提白日北斗下𤣥都騎吏裙皆紫科車幰盡朱地侯鞭社伯海若跨天吳霧噴雷公怒煙揚竈鬼趨投壺憐玉女噀飯笑麻姑菓實經千嵗衣裳重六銖瓊盃傳素液金匕進雕胡掌裏承來露柈中釣得鱸茵生悲局促柯爛覺須臾稊米休言聖醯雞益伏愚鼓鼙催暝色簪組縳微軀遂别真徒侣還來出路衢題詩歎城郭揮手謝妻孥幸有桃源近全家肯去無和白居易青春行已半白日坐将徂越國强仍大稽城髙且孤利饒鹽煮海名勝鏡澄湖牛斗天垂象台明地展圖天台四明二山名瓌奇闐市井佳麗溢闉闍句踐遺風霸西施舊俗姝船頭龍夭矯橋脚獸睢盱鄉味珍彭越時鮮貴鷓鴣語言諸夏異衣服一方殊𢷬練蛾眉婢鳴桹了角奴江清敵伊洛山翠勝荆巫華表雙栖鶴聯牆幾㸃烏煙波分渡口雲樹接城隅澗逺松如畫洲平葑似鋪緑鍼秧早稻紫笋折新蘆暖蹋泥中藕香尋石上蒲雨來萌盡達雷後蟄全蘇栁眼黄絲纇花房紅蠟珠林風新竹折野燒老桑枯帶嚲長條蕙錢穿短貫榆喧和生野菜卑濕長街蕪女浣紗相伴兒烹鯉一呼山魈啼雉子林狖掛都盧産業論蠶蟻孳生計鴨雛泉巖雪飄灑苔壁錦漫糊堰限舟航路堤通車馬途耶谿岸迴合禹廟逕盤紆洞穴何因鑿星槎誰與刳石凹仙藥臼峯峭佛香鑪去為投金簡來因挈玉壺貴仍招客宿健未要人扶聞望賢丞相儀形美丈夫前驅駐旌斾偏座列笙竽刺史旟飜隼尚書履曳鳬學禪超後有觀妙造虚無髻裏傳僧寶環中得道樞登樓詩八詠置硯賦三都捧擁羅将綺趨蹌紫與朱廟謀藏稷卨兵略貯孫吳令下三軍整風髙四海趨千家得慈母六郡事嚴姑重士過三哺輕財抵一銖婆沙論云他化自在天衣重一銖送􅘑歌宛轉嘲妓笑盧胡佐飲時炰鼈蠲醒數鱠鱸醉鄉雖咫尺樂事亦須臾若不中賢聖何由外智愚伊余一生志俄爾百年軀江上三千里城中十二衢出多無伴侣歸只對妻孥白首青山約抽身去得無天華寺吕夷簡賀家湖上天華寺一一軒忩向水開不用閉門防俗客愛閒能有幾人來留題寶相寺章得象天台四面翠如屏洞穴幽奇地最靈百尺巖中真像在千年澗畔古松青路傍斷石留神迹路傍斷石如刀鋸割截之狀傳云昔造佛者試鋸之今謂之鋸解峯是也壁上遺文缺舊銘建寺碑文乃劉勰所撰今壊缺不存但寫之屋壁字已訛矣我是丹丘仙郡守暫來猶似覺魂醒同前陳堯佐白雲樓殿翠林間終日軒忩四面山却愧勞生多事客清凉分得片時閒題翠峯院范仲淹翠峯髙與白雲閒吾祖曾居水石間千載家風應未墜子孫還解愛青山題溪口廣慈寺越中山水絶纎塵溪口風光步步新求取會稽藏拙去白雲深處亦行春同前葉清臣雲中江樹冷蕭蕭溪上僧歸倚畫橈誰為秋風乗興去松忩先聴富陽潮同前錢彦逺寺跨長溪山四回杉松微徑盡莓苔門前潮上不須看常恐塵埃隨水來同前元絳雲外軒忩切斗牛翛然三伏亦生秋青山屈曲無重數俱束溪光欵欵流書用師庵李昭述架泉龕石搆幽棲竹樹隂森鏁翠微珍重支郎得髙趣一庵一榻自忘機戒珠寺上方蘇舜欽躋攀出上楹疊勢與雲平日暮蒼煙合秋來逺水明幽軒開極望疎磬落餘清便有飛騰意俄嗟俗慮縈大禹寺鑑湖盡處衆峰前古寺蕭疎水石間殿閣北垂連禹廟松筠東去入稽山坐中巖鳥自上下吟久磎雲時往還我厭區區走名宦未能來此一生閒題妙喜庵并序蔣堂閏公者越之大士也今年秋於鑑湖中得有唐妙喜寺遺址結茅而居昔刺史李遜作記云雲霞草樹横在一目即其地也予嘉之乃以寺之昔名名其庵復贊道行形于鄙句云禪公覽古意徘徊偶結雲庵向北來滿目滄洲圍野景一枝金䇿卓秋苔沙邊水鳥銜花至月下漁人施供迴或訪稽山舊徒侣樵風應為送浮杯九日蕺山戒珠寺戲呈僚友張伯玉秦望山前曉鴈斜蕺山雲外看黄花誰能蔕芥關心緒且插茱萸伴物華嵗計簿書寧有盡日生公事了無涯樽前况有兵㕑酒不待兵㕑酒亦賒書大禹寺壁蕭寺禹祠傍人間白日長諷經聞海穴洗鉢動湖光臺殿留風月煙雲起棟梁遊人晩回首松竹自蒼蒼遊戒珠寺趙諴欲遊城郭應難遍每訪湖山亦自勞坐致眼前無限景僧房寄處蕺峰髙留題崇法院丁寶臣瀕湖三寺倚峥嶸梵刹相髙對縣城樓殿盡知隨處盛山林獨愛此中清翦開水末簷牙出鑿破巖腰磴道成悟得祖師心印法禪僧遥指塔燈明題天姥院王琥十里松篁結晝隂倚空山翠亂花鍼瓊臺瑶瑟中天過碧洞蒼龍午夜吟石磴雨乾泉駐玉觚棱雲斷月移金桃花流水年年事誰免浮生白髮侵遊龍瑞觀楊侃泛舟秋水一湖平入觀松風數里清丹井有泉仙跡在玉書藏穴禹功成步虚夜月千峰静投簡春霖萬壑盈述記賀知章手筆題詩元相國聲名結廬野客前谿住採术幽人絶頂行杉檜影侵山殿冷星辰光逼醮壇明降仙臺畔看雲過射的潭邊聴鶴鳴樵客多聞逢異事洞天都不逺重城林間忩尸塵難到衣上煙嵐暮自生不待照湖天子賜欲将長往換浮榮遊梅山寺出郭塵路斷登舟鷲嶺通樓臺花嶼上鐘梵水天中石磴斑春蘚松門韻晩風蓴絲惹輕檝雲錦散瑶空竹逕連茶塢山亭對藥叢却輸湖畔叟朝夕訪支公過溪口廣慈院刁約賞徧林泉去未能却來溪口訪巖僧為觀逺景尤奇處更陟危亭最上層雲吐前峰疑霈雨泉飛别澗旋凝氷陋容憔悴煩躬筆待結錢唐九老朋同前吳處厚數日髙陪使騎行青山好處屢逢僧坐禪庵邃雲為屋會景亭髙石作層會景院中亭名大斾晩穿松壑霧瘦笻寒卓瀑泉氷此遊不減白蓮社慧逺宗雷共一朋同前僧顯忠五馬重來谿口寺惟将屬吏與門僧盤雲野徑行千里送目危臺上百層巖檜影寒猶帶雪谿流聲澀未銷氷尋常地逺無因到空愧躬良二老朋遊梅山寺僧仲休世續香燈演聖言再新華構稱凭軒隂隂松色連僧閣飋飋波聲入寺門飛鷺銜魚離淺瀨殘雲帶雨渡遥村沃洲相較應相近樹杪啼煙祇欠猿南明山寶相寺十五題古律詩并序僧顯忠南明山者即齊僧䕶所隠石城也䕶始到夜聞鐘磬仙樂之音時時現佛形象煒煜而可駭䕶繇是發私誠願鑿百尺彌勒像凡厯三生乃就其事則實乎本傳因而始剙精藍㳂續香火至唐季廣明初經回禄前後締構數四及武肅偏霸樹閣三層至今在焉予今年秋受命尸于此以十方人為叢林居率從公也惜其東南之勝勢此亦一焉而未見好事者與鬯發然欲其名之逺非歌詠不能伸之暇日因厯訪其可尚得境物命為一十五題雜而賦之况前代未有作之者雖不足夸大亦庶幾以自適爾時嘉祐五年嵗次庚子仲冬月十有八日碧齋序三生像勝域将垂迹先聞鐘梵聲術陁猶未降宣老已三生山接天門嶮巖開月殿明善財何處去樓閣自峥嶸三層閣像身髙百尺閣道聳三層欲得親瞻向還須最上登煙霞封寶墄星斗掛觚稜已自甘香火人間去不能隠岳巖融結自何時曾為幾陵谷不見昔賢蹤空遺此巖腹一徑斸煙蓁千里老雲木尋常人到稀虎豹暗棲宿石城山谿盡見石城寺在石城裏崖缺露遥村門開對寒水况非雉堞成無以金湯比梵衆此安棲俗駕來有幾白雲莊堪愛仙莊近翠岑杖藜時得去遊尋牛羊數㸃煙雲逺雞犬一聲桑柘深髙下閒田如布局東西流水若鳴琴更聴野老談農亊忘却人間萬種心夾谿塘南谿北谿深横塘截流過清影照人寒澄耀分鑑破沙明鷗鷺馴草密牛羊卧不見直鈎翁狂歌遣誰和柔亭孤亭枕長谿谿光照庭檻無人弄潺湲終日對平淡猨鳥去難呼藤蘿垂可擥薄暮衆山昬霜風起葭菼石狻猊亭除兩狻猊一仰復一俯告天與叩地似欲訴憂苦世傳智顗死二獸來瞻覩逡巡化為石堙沒在深土事怪固難詰但見形可取風雨駮蒼苔萬古萬萬古齊相井南明山足勢欲盡正是新崖東脇隈不知泉自那峰出皆謂井因齊相開甘滑堪預酈經載淵渟疑俟桑苧來神蛟往往此潛蟄旱嵗莫測生風雷齊相書堂唐齊相顗曾隠于此異代終難問遺名不可窮山中丞相去林下學堂空映雪功休比冲天志莫同故基蘭蕙滿猶自起華風白蓮庵誰将白蓮子固向峰頂栽非學逺公社兼無陶令來去世迹何曠誅茅心已灰不知嵗月改但見此花開石縫梅根埋山骨幾百載但怪生物偏有私春前受氣地猶冷雪裏暗開人未知自将孤石比堅性不與衆木争芳姿惆悵無言為真賞欄杆獨倚覺多時鋸解峯其峯中裂狀若鋸解蒼山巍不倚中裂勢難圖始鑄隂陽鋸誰開造化爐藤摇疑落屑樹拆若分符漏出飛泉影長垂一帶孤仙髻峯首出衆峯間盤龍勢孤聳雲映鬢光浮月生梳影動可握謂新沐未巾疑乍攏幸免且斯理誰復慙種種白鷴塢朝看白鷴從塢出暮看白鷴從塢歸森森緑樹兩峯下片片白雲迎日飛因知野性戀山谷咫尺之間還見稀古詩遊沈道士金庭館沈約秦皇御宇宙漢帝恢武功懽娛人事盡情性猶未充鋭意三山上託慕九霄中既表祈年觀復立望仙宫寧為心好道直由意無窮曰余知止足是願不須豐山嶂逺重疊竹樹近䝉籠開襟濯寒水解帶臨清風所累非外物為念在𤣥空朋來握石體賔至駕輕鴻都令人徑絶唯使雲路通一舉凌倒景無事適華嵩寄言賞心客嵗暮爾來同宿南巖寺感興齊顗南巖寺本滄海任子釣臺今尚在見説垂鈎於此中犗牛作餌莊書載滄海竭任子歿波濤打處為巖窟不知任子何所之唯見釣臺空㟮屼遊大禹寺迴馬上口占張伯玉永日躋雲峰向晩下秋巘却望碧城中樓臺翠煙滿前旌擁歸騎緩轡徐馭穏曠望寫予心平波海天逺顧予疇昔志本以鋤犂挽敢望麋鹿資遘此雲龍旦金門容竊步玉殿叨靈睠某為先帝御史時登殿啓事復此千騎來日逐紛華戰平生知退意長畏嵗月晩行當引初服還把芰荷翦初冬同晤賢二師登映發亭望會稽楊蟠我有二林侣相邀步寒日超然人外遊下見衆山出木葉落已静乾坤久蕭瑟浮雲當空翻慘慘百鳥沒欲辨越中岸青煙易為失山川何寂寥宫闕猶髣髴誰是古來者念之難再述功名遂塵埃豈復有其骨今我二三子永為傲時物篇章逢太平窈窕坐天末生理本無固願言從此畢登臨望前人世事安敢忽會稽掇英總集巻九
