body:
  text: 㑹稽掇英總集巻一宋孔延之撰州宅州之城因種山之勢盤繞廻抱若卧龍形故取以為名而州之宅又居山之陽凡所謂樓閣臺榭之勝者皆因髙為之以極登覧圖經云上有大夫種墓今失其處輿地志曰潮水穴山失其尸蓋子胥乘潮水取以去之今山西缺處是也律詩州宅元稹州城縈繞拂雲堆鑑水稽山滿目來四靣無時不屏障一家終日在樓臺星河影向簷前落鼓角聲從地底廻我是玉皇香案吏謫居猶得小蓬萊答微之誇州宅白居易賀上人廻得報書大誇州宅似仙居厭㸔馮翊風沙久喜見蘭亭煙景初日出旌旗生氣色月明樓閣在空虛知君暗數江南郡除却餘杭盡不如再酬復言和誇州宅元稹㑹稽天下本無儔任取蘇杭作輩流斷髪儀刑千古學奔濤翻動萬人憂石縁類鬼名羅刹寺為因墳號虎丘莫著詩章逺牽引由来北郡似南州新樓李紳戎容罷引旌旗巻朱户褰開雉堞髙山聳翠㣲連郡閣地臨滄海接靈鼇坐疑許宅驅鷄犬笑類樊妻化羽毛惆悵桂枝零落促莫思方朔種山桃杜鵑樓樓前植杜鵑因以為名杜鵑如火千房坼丹檻低看晩景中繁豔向人啼宿露落英飄砌怨春風早梅昔待佳人折好月誰將老子同唯有此花隨越鳥一聲啼處滿山紅滿桂樓架州城西南臨眺於外盡見湖山别開水扉通杜鵑樓不啓重扄清夜可以開宴為憐湖水通宵望不學樊楊却月樓唯待素規澄滿鏡不看纎魄挂如鈎巻簾方影侵紅燭繞竹斜輝映碧流蕭飋曉風聞水落此時何異洞庭秋海榴亭海榴花早開繁蘂光照晴霞破碧煙髙近紫霄凝菡蓞逈依江月伴嬋娟懐芳不作翻風豔列蕚猶含泫露妍摇落舊叢雲水隔不堪行坐數流年望海亭烏盈兔缺天涯逈鶴背松梢拂檻低湖鏡坐隅看匣滿海濤生處辨雲齊夕嵐明滅江帆少煙樹蒼茫客思迷蕭索身心俱是夢九秋應共草萋萋橘園江城露斂經霜早園橘千株欲變金朱實摘時天路近素雲飄處海雲深誰同枳棘愁遷徙每抱馨香仰照臨憐爾結根能自保不隨寒暑換貞心南亭竹東南共美凌霜操五月凝隂入座寒煙惹翠梢含玉露粉開春籜聳琅玕莫令戲馬児童見試引為龍道士看知爾結根香實在鳯皇終擬下雲端使院竹莫見凌風飄粉籜須知礙石作盤根細看枝上蟬吟處猶是筍時蟲蝕痕月送緑隂斜上砌露含寒色濕遮門列仙終日逍遥地鳥雀潜来不敢喧寄㑹稽范希文滕宗諒江山千里接仁封都在東南秀氣中借問玉皇香案吏蓬莱何似水精宮州宅并序張伯玉余嘗愛越中山水然未之遊慶厯初從事蘇臺時范吏部自丹陽徙㑹稽余贈以越州詩云何當獨把釣竿手笑擁一艘東去遊其時但欲放曠於漁樵間耳至和中出倅新定越守王工部新葺蓬莱閣成畫圖来乞詩余荅之云㑹須長揖浮丘伯醉聽銀河秋浪聲又欲為蓬莱客耳去年春乆病省中因乞此郡聖恩得請懷二千石來遂為主人矣昔元㣲之在越有州宅詩樂天和之余雖非其流然所居所得一也因暇日登覧輒賦一章書于屋壁仍以寄王范二詩追次焉聊且導主人之所適兼得以寫吾疇昔之好云萬疊湖山煙水濵朱門畫㦸間松筠登臨不踏紅塵路燕寝長居紫府春晝静欲驂風外駕夜寒疑是月中身我慙白首方懷紱猶得蓬莱作主人元詩云我是玉皇香案吏謫居猶得小蓬莱贈范吏部海天東下越玉州碧城繚繞環山丘春晴紫翠堆綺屋日暮煙雨藏朱樓禹祠花底金穴峻賀老門前銀漢秋何當獨把釣竿手笑擁一艘東去遊荅王越州蓬莱閣書報蓬莱髙閣成越山増翠越波明雲收海上天地静人在月中金翠横游女弄芳珠作珮仙人度曲玉為笙㑹須長揖浮丘伯醉聽銀河秋浪聲蓬莱閣醉歸蓬莱閣上醉歸時猶索芳樽歩歩隨啼鳥似来留翠珮旁人笑為整花枝腰間半嚲黄金印頭上斜欹白接䍦拍手向他賔從道使君未老莫扶持西樓晩望疊岫斂餘霞輕舠簇逺沙斜陽媚城郭細栁雜汀花兩兩聮歸騎蕭蕭起暮鵶誰知故園興閒在使君家逍遥堂寓興踈竹間花隂了無塵土侵旌麾千騎長風月一堂深海氣生吟榻煙香披醉襟山翁方自得莫問去留心小樓獨酌老去春来事事慵春隂獨酌小樓中一千里色江南岸二十四般花信風秖有谿山迎醉目更無塵土倦樊籠鷦鷯自得誠堪笑詩有餘狂酒有功清思堂晝坐堂上蕭然晝户開澹松踈竹䕃蒼苔白雲無事不肯去幽鳥有時還自来何處覆車迷徑路幾人緩頰走塵埃支離得意誰知我自對庭花引一杯西樓早望纎纎初日射西樓樓上旌簾巻繡鈎數襞斷雲秦望曉一聲寒鴈鑑湖秋煙波憔悴西施國風月飄零范蠡舟莫向登臨動懷古有情多為等閒愁蓬莱閣閒望寫懷越絶開華國姚虞啟後昆案州圖上虞餘姚葢舜之後昔聞勾允覇今作帝王藩地得東南重山侔岳瀆尊周官東南曰揚州其山鎭曰㑹稽平湖来萬壑翠岫列千門市井魚鹽合居人組繡繁牙旗開物表州宅倚雲根州宅在卧龍山上六郡趨麟節㑹稽東部搃六州㣲之詩云㑹稽旁鎭六諸侯三峯出雉垣中有卧龍蕺龜三山焉秦游前事廢禹畫舊書存鴈鶩来還去鯨波吐復吞菱歌秋漵逺江信暮潮渾石古寒松偃樓危晝靄昬冷光濃可截秀色浄無痕露嫋環堤栁風飛列寺旛深林藏杞梓芳徑雜蘭蓀巧笑花爭豔嬉遊玉鬬温畫船鵰鷁迅絳袖綺霞翻有意皆行樂無憂可蒔萱鄉惟知爼豆士亦賁丘樊巨舶聮艘至交衢百貨蕃敲冰呈巧手越俗呼敲氷紙近為巧手織素競交鴛繒綺最盛也麗圃紅柑亞通畦紫芋蹲茶先春入焙卧龍茶冠呉越筍帶雪黏盆經冬食筍異蕚隨時坼清香觸處歕吳趨慙種蠡楚些陋湘沅徃事圖難盡前修孰可援風流王與謝唱和白兼元顧我棲儒竇胡為屬使鞬迂疎非吏法蹇淺是辭源謬覽先生䇿誰調伯氏塤翦裁迷幅尺追琢昧璵璠學術何曽取名場輒屢奔余謬擢進士第又登技萃科技甘同鼫䑕化敢望溟鯤將幕閒留滯余從事太原凡八年烏臺誤選掄埋輪慙避俗折檻畏當軒坎􅇄人奚顧羇孤舌但捫愛書疑有癖怕事欲無言薪米支離叟蹄盂炙轂髠一為華省吏三駕使君轓余於今三領符竹蹭蹬慵成性龍鍾病愈惽因懷邸中紱来訪道山園賀監舊宅稅鞅紅塵外班條碧海垠披襟澄沆瀣緩帶滌潺湲樂歳歡康洽髙黌禮讓敦到郡適值府學方盛南宫羅俊彦東箭藹瑶琨退食求凋弊吹毛析滯寃庖刀怯餘刃櫑劒喜平反重禄容虚受期民肯憚煩問賢思水薤教俗飬雞豚䆉稏西成稻逍遥北海樽史符多鶴立僚友盡鴻騫詎聴棠隂頌聊袪缿訟諠行歌齊擊壤坐嘯比啼猨洞邃冝招隠時清恥叫閽囁嚅揮醉筆傴僂曝晴暾躡險齎長屐尋幽叱短轅窮通方自適語黙且休論厭把詩筒發欣逢酒帟掀桔橰肥果茹竹馬戯兒孫以此為官業何由報主㤙冰霜徒勵操淵谷可驚魂蕙帳羞逋客庭貆鄙素餐行當解簪紱歸老白雲村春日登望海亭望海亭前春色深風光澹澹海沈沈潮如世路来還去山帶城蕪古到今坐見㣲雲生别岸吟驚幽鳥起層隂勸君莫苦憑髙望驚動子牟千里心留題新建五雲亭亭占卧龍章岷卧龍東嶺冠雲霞亭靣谿流對若耶秋霽獨先初夜月春隂見盡滿城花踈篁遶檻棲寒雀喬木依簷泊暮鵶紅燭未殘賔已醉倚風歌管到人家春日獨登蓬莱閣郡閣髙檐半納雲危欄徙倚惜芳辰澄潮疊嶂新經雨啼鳥開花各為春按有牋毫難賦景席無歌管懶邀賔自憐莫厭登臨數即是葵丘代戍人和孔司封題蓬莱閣沈立拂雲髙閣擬蓬莱面向稽山鑑水開文舉清尊無限樂㣲之佳句不勝才屢嘗雪夜凭朱檻幾對花天醉緑杯明主未容休退去㑹須重乞一麾来同前趙諴龍卧山形滴翠㣲翬飛閣勢搆空危六鼇不是湖中蟄一島疑從海上移屏障牋毫吟詠處神仙羅綺燕遊時自慙為吏非香案又躡雲梯從使麾同前沈紳三山對峙海中央舊志蓬莱山正偶㑹稽髙閣新題紫翠房玉鉉相君頒瑞地金貂仙子挂冠鄉雲隨歩武鼇頭穏風滿襟裾鶴背凉吸盡流霞不知醉直須乗月據胡牀同前吳可幾皇唐舊相元才子曽作蕃宣式燕遨郛郭上當星紀分軒甍全壓閬風髙賔僚㑹集簪裾盛衙隊周環鼓吹豪不出公庭得仙館豈同徐福絶雲濤同前裴士傑山卧龍形閣枕山簷楹髙起太虗間風来宛訝鳴簫瑟客至宜聞振珮環暫賞已能消濁慮乆居應不老朱顔蒼煙渌水無窮趣絶勝塵紛走世寰同前孫昌齡突兀軒楹氣象豪使君攜客共遊遨坐来面揖湖山勝行處身騰日月髙隠約壺中露蓬島分明海上涌金鼇宜酬絶景頻吟醉況是東南暫擁旄同前顧臨萬壑千巖滿數楹當中秦望翠開屏朝遊簫吹聞仙樂夜散燈光堕列星聊寄蘧廬消白日何須扁舸到滄溟飄然賦此得真意直欲乗空御鶴翎同前江衍巍據龍蟠最勝山神仙琳館落人間差差萬井庭䦨布矗矗羣峯屏障環入座湖光浮蕩漾俯簷雲影過斕斒登臨自有飄然思便覺身同白日閒古詩望海亭元稹海亭林木何籠葱寒光透坼秋玲瓏湖山四面爭氣色曠望不與人間同一拳墺伏東武小龜山别名兩峯鬬搆秦望雄兩峯謂望秦秦望二山嶔空古墓失文種墓在州城山上圖經云潮水到山望棺柩入海今所存古穴耳骨兀怪石疑防風舟船駢比有宗侣水雲滃泱無始終雪花布徧稻隴白日脚挿入秋波紅興餘望劇酒四座歌聲舞豔煙霞中酒酣從事歌送我歌云此樂難再逢良時年少猶欣羨使君況是白頭翁我聞此曲深歎息唧唧不異秋草蟲憶年十五學構厦有意蓋覆天下窮安知四十虚富貴朱紫束縛心至空粧梳妓女上樓榭止欲歡樂㣲芒躬雖無趣尚慕賢聖幸有心目知西東欲將滑甘柔藏府已被鬱噎衝喉嚨君今勸我酒太醉醉語不復能沖融勸君莫學虚富貴不是賢人難變通再題州宅張伯玉昔覽㣲之州宅篇待將屏障寫山川更看白傅明月句欲上髙樓跨紫煙元詩曰四面常時對屏障白詩云月明樓閣在空虚盤紆星斗旁六郡零落風騷三百年喬木自存人自逺可憐香案舊神仙清思堂曉雪初霽望飛来山密雪曉初霽朝陽靄融融隠几髙堂上坐對飛来峯梵塔倚天半樓臺出煙中岧然金銀闕瑰碧交玲瓏漸轉皎日髙杳杳聞踈鐘天和發秀彩顥氣如騰虹况予世慮踈乆矣渟心胷更臨物外趣愈覺萬縁空閔山詩并序蔣堂越之府山亦名卧龍為一境形勝予視事之明日見其竹樹零悴僅有半在問吏吏曰為昔人翦伐使然問民民對如吏因悵然乆之自謂非予守土即兹山殆將童矣於是申約束止樵採作閔山詩云東南亘羣山形氣或斷續兹山窮嶄絶孤峙越之腹鬱蒼瞰城闉勝秀為民福所宜禁樵蘇主者在嚴肅不知平昔時誰氏来班録私庖計薪爨無時伐良木官膳利貨財彌年翦脩竹怱怱事斧斤丁丁響川谷萬葉壞密幄千竿倒寒玉輪囷無完枝檀欒鮮遺族戕賊殊未厭峯巒翠將秃鶴侣怨且驚雲容慘以恧非唯挫生意抑乃傷雅俗王者有仁㤙行葦亦沾沐嗟嗟若人者忍不思化育今予剖信符於兹憇丹轂謂山豈無靈胡為人所黷呼吏對泉石申禁護林麓庶幾飬翹英勿使罹殘酷来者賢使君斯言願為復奉陪蓬莱閣賞雪賦詩謹成二十四韻呈知府龍圖侍郎姚勔一氣運轉無時停隂陽消長權相仍不有栗烈謹閉固安得生育萬化興東南之土苦妍暖大冬徃徃水不冰有時草木自發洩百蟲不蟄飛蚊蠅侍郎下車庶事飭威行㤙煦瞻風稜宿姦竄伏善民裕衆強不敢暴與陵剛柔設施旣得理律呂感召還相應先春未臘已見雪平地一色迷溝塍寒華浩蕩失舞鶴逸勢飄突回飛鷹不唯盡掃氛祲息便使歳善倉箱登蓬莱髙閣倚巖壁下見羣巒千萬層其間賦象不可數一一焜耀光彩凝㑹稽山水天下勝於此更可窮誇矜無風四面巻簾幕坐上衆客羅簪朋分題行酒各壯浪浩然萬慮何泓澄抽毫沓簡公已賦欲敵妙句誰其能小生學力最卑弱懦氣鬱鬱唯填膺徃時徽之訪安道剡谿扁舟夜獨乗隠淪閒事至㣲小史筆猶為千載稱豈如公今為侍從器業天子之股肱擁麾一方聊撫俗瑞至應節如糾繩處之廟堂燮天下和氣自足康黎蒸良辰樂事固可紀欲冩但愧才弗勝他年収拾入房䇿豈獨佳話口所騰和元絳晼晩年垂盡隂沈氣始凝雲霄方一色霰雪忽相仍何處兹辰好吾州自古稱稽山呈刻畫鑑水弄鮮澄佛土横銀界天文露玉繩綆珠壓簾翠礱璧累臺層崑露朝垂木郇鹽夕滿塍濃梅明庾嶺亂蝶閙青陵舞緩来還轉驚多下忽騰藏崖未見睍著霤即垂冰密處情何極狂時力不勝奪鮮迷野鶴汙白絶樊繩孫幌方開巻焦廬正曲肱悲鳴跧老驥怒擊下豪鷹顧我雖遲暮當歡亦彊能醉懷思日富病眼喜晨興賀帳催休吏賔筵幸得朋周詩誦文穆鄴酌對劉應賞為良辰樂髙宜善賦登鸘裘欣未至司馬相如衣鷫鸘裘青簡使先蒸富歳還相慶陽春各自矜􅋳顔均玉氣泚墨出珪稜句待呼胡續舟期訪戴乗長謡辱君贈珍感服吾膺和許安世南國收藏晩黅天凜烈興日行黄道市神御坎宫乗元化初施種窮隂乍喪朋氣隨鈞外轉雲自澤中騰集霰紛餘凜號風􅂇峻稜紫霄零雜珮𤣥野碎増冰縞色坳窊徧寒光上下凝候嚴知節應空曠覺神澄透隙還同舞因方不待繩鴈飛朝愈急雞誤夕相應吟絮飄呉苑禋茅秀楚塍堦庭迷鶴鶩林麓蔽薪蒸瑶水三千里崑崙九萬層檻前闚化國波際失西陵白傅寄元浙東詩煙波起處雨㸃白知是西陵古驛臺舟興懷安道鱸思鄙季鷹勝遊方罕值高㑹喜相仍漲海雄藩屏東侯實股肱蘂珠辭密侍阿閣賁華稱將幕開樽俎賔筵集俊能醴杯親勸酢龍坂盡隮登郢唱人誰繼臯謨世共矜擊轅知亂雅附驥偶同蠅綰席塵空滿嬰衣體詎勝仰瞻雲漢麗嘉惠豈虚膺因覽狀元節推和詩再和一首元絳緹籥驚年杪鈴齋戒夙興連空集霙霰撇席命賔朋􅌲閣盤虚出箯輿選勝登山川方晻藹縞素競飛騰密著珠簾重低沈粉水澄迷藏秦洞穴刻鏤禹溝塍蓬島三畨抃瑶峯四徹繩羣玉山四徹中繩風傳天外籟湖寫鑑中冰銀色三千界琳臺十二層折梅思陸凱詠絮對王凝道韞凝之之耦妬舞輕飄燕臨書細字蠅光凌射的鶴氣壓沃洲鷹櫂月谿翁共歌蘭楚客能瓊輈走油壁練馬頓鈎膺澤滲陽膏動和薰氣燭蒸冬權時已正尺瑞歳將應叶鄙也同民樂油然弗自勝平時陪法從長憶奉昭陵拂旦開金殿鳴鞘下玉乘六花朝服滿萬歳壽觴稱就望堯雲日賡歌舜股肱冰醪霑飫賜竹唱聼哀矜爾後孤踨逺頻年老病仍兩朝違觀魏何日見觚稜因覽蓬莱觀雪唱和謹成二首孫覺重湖􅃨嶺去連延氛靄消沈雪後天縹緲三山浮海上參差羣玉露峯巔使君宴集仍侵曉遷客登臨欲判年灑落塵懐對清絶向来身世兩翛然其二蓬莱髙閣與天同雪過欄干萬里空湖海乍驚銀漢落乾坤都在玉壺中扁舟漾漾思乗月病骨飄飄欲御風遮莫畫圖傳北闕承明人更出江東蓬莱行錢公輔蓬莱謫居香案吏此語昔自㣲之始後人慷慨慕前芬髙閣雄名由此起一從圮廢知幾年棟摧礎斷埋空山遺蹤餘址杳何處惟有竹樹荒蕪間過者徘徊遊者惜舉頭不見谿山色寂寞無人欲問誰神仙有景真虚擲一興一弊固有時主人旌斾来何遲下車鋩刃得優逸痛此舊事幾凌夷呼工萃材若河決正值西成農隙月屹然大厦立層巔百尺崇基鬼神拔虹蜺截空崖險平一級一級煙雲生步武凌虚眉睫濕四面四面屏障迎時攜賔佐恣吟賞笙歌輩類文章黨廻眸眩晃相顧笑莫辨人間與天上觀風齷齪環翠低左右羅列如嬰兒鑑湖浩渺稽嶺秀上下延揖生光輝秋日淒清春日媚冬冝飲雪夏冝醉四時風景各一全須言不是尋常地乃知真境未易彰神物寳護天緘藏人謀暗與鬼工合一日剖露如騰驤越王臺榭荒凉後唐相英靈磨滅乆千巖萬壑幽隠處而今盡入人襟袖憑欄黯黯半斜陽燒煙漁火凝寒光此時撇起千里恨使人悽哽生斷腸隔簾依依漸明月酒氣浩蕩歌聲滑此時放出百杯歡使人雍容重擊節惟公獨作蓬莱主夜擁琴書雜樽俎胷中氣熖欲干斗座上辭鋒欣捉麈嗟余時作蓬莱客賦詠登臨儒者職千日徒教混醉醒七言未觧鏘金石蓬莱本在滄溟中那知平地别有宫方壺圎嶠咫尺是願乗鵬翼長西東滿筵誰匪蓬莱賔闔境盡是蓬莱民人人共結蓬莱約行行醉看蓬莱春㑹稽掇英總集巻一
