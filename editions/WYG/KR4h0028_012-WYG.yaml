body:
  text: 會稽掇英總集巻十二宋孔延之撰戲樂天復言望市樓蘇之勝地元稹樂事難逢嵗易徂白頭光景莫全孤弄潮船更曽觀否望市樓還有會無眼力少將尋案牘心情且强擲梟盧孫園虎寺隨冝看不必遙遙羨鏡湖寄浙東韓又評事杜牧一笑五雲谿上舟跳丸日月十經秋鬢衰酒減欲誰泥跡辱魂慙好自尤夢寐㡬迷胡蛺蝶文章應廣畔牢愁無窮塵土無聊事不得清言解不休寄靜虚二上人皇甫冉髙人本姓竺開士舊名林一入雪山裏千秋不可尋新年芳草徧終日白雲深欲徇㣲官去懸知訝此心賈侍御自會稽使迴余有挂冠之期因成十韻劉長卿江上逢星使南來自會稽驚年一葉落按俗五花嘶上國悲蕪梗中原動鼔鼙報恩看鐵劍銜命出金閨風物催歸緒雲峯發詠題天長百越外湖上小江西鳥道通閩嶺山光落剡溪暮帆千里思秋夜一猿啼柏署榮新寵桃源憶故蹊若為能早去行復草萋萋晩行次苦竹館却憶于越舊遊劉長卿疋馬風塵色千峰且暮時遙看落日盡獨向逺山遲故驛花臨道荒村竹映籬誰憐却迴首步步戀南枝泛太湖書事寄㣲之白居易煙渚雲帆處處通飄然舟似入虚空玉杯淺酌巡初帀金管徐吹曲未終黄夾纈林寒有葉碧琉璃水淨無風避旗飛鷺翩翻白驚鼔跳魚撥刺紅澗雪壓多松偃蹇巖泉滴乆石玲瓏書為故事留湖上所見勝景多記在湖中石上吟作新詩寄浙東軍府威容從道盛江山氣色定知同報君一事君應羨五宿澄波皓月中郡中閒獨寄㣲之及崔湖州白居易少年賓旅非吾輩晩歳簪纓束我身酒散更無同宿客詩成長作獨吟人蘋洲會面知何日鏡水離心又一春兩處也應相憶在官髙年長少情親得湖州崔十八使君書喜與杭越鄰郡因成長句代賀兼寄㣲之白居易三郡何因此結縁貞元科第忝同年故情歡喜開書後舊事思量在眼前越國封疆吞碧海杭城樓閣入青煙吴興卑小君應屈為是蓬萊最後仙貞元初同登科崔君名最在後當時崔自詠云人間不會雲間事應笑蓬萊最後仙張十八貟外以新詩二十五首見寄郡樓月下吟翫通夕因題巻後封寄微之白居易秦城南省清秋夜江郡東樓明月時去我三千六百里得君二十五篇詩陽春曲調髙難和淡水交情老始知坐到天明吟未足重封轉寄與微之答㣲之詠懷見寄白居易閣中同直前春事船裏相逢昨日情分袂二年勞夢寐並牀三宿話平生紫㣲北畔辭宫闕滄海西頭對郡城聚散窮通何足道醉來一曲放歌行秋寄㣲之十二韻白居易娃館松江北稽城浙水東屈君為長吏伴我作衰翁旌斾知非逺煙雲望不通忙多對酒榼興少閱詩筒比在杭州兩浙唱和詩贈答於筒中遞来往淡白秋來日疎涼雨後風餘霞數片綺新月一張弓影滿衰桐樹香凋晩蕙叢饑啼舂穀鳥寒怨絡絲蟲覽鏡頭雖白聴歌耳未聾老愁從自遣醉笑與誰同清旦方堆案黄昏始退公可憐朝暮景銷在兩衙中仲夏齋居偶題八韻寄㣲之及崔湖州白居易腥血與葷蔬停來一月餘肌膚雖瘦損方寸甚清虚體健通宵坐頭慵隔日梳眼前無俗物身外即僧居水榭風來逺松廊雨過初褰簾放巢鷰投食施池魚久别閒遊伴頻勞問疾書不知湖與越吏隠興何如九日寄微之白居易眼暗頭風事事妨遶籬新菊為誰黄閒遊日乆心慵倦痛飲年深肺損傷吴郡兩迴逢九月越州四度見重陽怕飛杯酒多分數厭聴笙歌舊曲章蟋蟀聲寒初過雨茱茰色淺未經霜去秋共數登髙會又被今年減一塲重題小舫贈周從事兼戲㣲之白居易細蓬青篾織魚鱗小眼紅忩儭麴塵濶狹纔容從事座髙低恰稱使君身舞筵須揀腰輕女仙棹難勝骨重人不似鏡湖亷使出髙檣大艑閙驚春早春西湖閒遊悵然興懐憶與㣲之同賞因思在越官重事殷鏡湖之遊或恐未暇偶成十八韻寄㣲之白居易上馬復呼賓湖邉景氣新管絃三數事騎從十餘人立換登山屐行攜漉酒巾逢花看當妓遇草坐為茵西日籠黄栁東風蕩白蘋小橋裝鴈齒輕浪甃魚鱗畫舫牽徐轉銀船酌慢巡野情遺世累醉態任天真彼此年將老平生分最親髙天從所願逺地得為鄰雲樹分三驛煙波限一津翻嗟寸步隔却厭尺書頻浙右稱雄鎮山隂委重臣貴垂長紫綬榮駕大朱輪出動刀槍隊歸生道路塵鴈驚弓易散鷗怕鼔難馴百吏瞻相面千夫捧擁身自然閒興少應負鏡湖春寄别㣲之白居易憑仗江波寄一辭不須惆悵報微之猶勝往歳峽中别灧澦堆邉招手時醻杭州白使君兼寄浙東元大夫張籍相印暫辭臨逺鎮掖垣出守復同時一行已作三年别兩處空傳七字詩越地江山應共見秦天風月不相知人間聚散真難料莫歎平生信所之醻浙東元尚書見寄綾素張籍越地繒紗紋樣新逺封來寄學曹人便令裁製為時服頓覺光榮在病身應念此官同棄置獨能相賀更殷勤三千里外無由見海上東風又一春歸桐廬舊居寄嚴長史章八元昨辭夫子棹歸舟家在桐廬憶舊丘三徑暖時花競發兩谿分處水爭流近聞江老傳鄉語遙見家山減旅愁或在醉中逢雪夜懷賢應向剡川遊越中贈程先生僧法振紗帽度殘春虚舟寄一身溪邉逢越女花裏問秦人古塞連山静隂霞落海新有時城郭去暗與酒家親贈越僧温廷筠蘭亭舊都講今日意如何有樹開深院無塵到淺莎僧居隨處好人事出門多不及新春鳥年年鏡水波贈越僧岳雲温廷筠世機銷已盡巾屨亦飄然一室故山月滿缾秋澗泉禪庵過㣲雪鄉寺隔雲煙應共白蓮客相期松桂前贈雲門邕上人皇甫曽春山唯一室獨坐草萋萋身寂心成道花開鳥自啼細泉松逕裏返景竹林西晩與門人别依依出虎谿贈會稽張少府方干髙節何曽似任官藥苗香潔備常餐一分酒户添猶得五字詩名隠即難笑我無謀生鶴髪知君有意在漁竿明年莫便還家去鏡裏雲山且共看思越中舊遊寄友方干甸外山川無越國依稀只似劍門西鏡中疉浪搖星斗城上繁花咽鼔鼙斷臂青猿啼玉笥成行白鳥下耶溪此中曽是同遊處迢遞尋君夢不迷春晩寄鍾尚書羅隠宰府初開奉末塵四年談笑隔通津官資肯便矜中路酒盞還應憶故人江畔舊遊秦望月檻前公事鏡湖春如今莫問西禪塢一炷寒香老病身寄題方干處士鏡湖别墅鄭谷山雪照湖水漾舟湖畔歸松篁調逺瀨臺榭發清輝野岫分開徑漁家並掩扉暮年詩力老新句更幽㣲詶浙東李侍郎越州春晩即事長句劉禹錫越中藹藹繁華地秦望峰前禹穴西湖草初生邉鴈去山花半謝杜鵑啼青油晝卷臨髙閣紅斾晴翻繞古堤明日漢庭徵舊徳老人爭出若耶溪後漢劉寵為會稽大治及徵還山隂縣有五六老叟自若耶山谷間出人齎百錢以送寵寵勞之荅曰自明府下車民不見吏年老遇真聖明故奉送寵為人選一大錢受之贈致仕滕庶子先輩時及第之中最久劉禹錫朝服歸來晝錦榮登科記上更無兄夀觴毎使曾孫獻勝境長攜衆妓行矍鑠據鞍能騁健慇懃把酒尚多情凌寒却向山隂去衣繡郎君雪裏迎早行寄朱放山人戴叔倫山曉旅人去天髙秋氣悲明河川上沒芳草露中衰此别又萬里少年能㡬時心知剡溪路聊且寄前期詶皇甫冉西陵見寄廖融西陵潮已滿島嶼没中流越客依風水相看南渡頭寒光生極浦暮雪映滄洲何事揚帆去空驚海上鷗久滯越中貽謝南池稽少府孟浩然陳平無産業尼父倦東西負郭昔云鑿問津今亦迷未能忘魏闕空此滯秦稽兩見夏雲起再聞春鳥啼懷山梅福市訪舊若耶溪聖主賢為寳卿何隠遁栖留題越州石氏山齋晏殊書仙十閣壯儒宫靈越山川寳勢雄岫柏亞香侵几席巖花迴影入簾櫳千秋碧鎖東南竹一水清含旦暮風文酒雅冝頻讌集謝家蘭玉有新叢贈會稽道士晏殊藐姑容化三隂館句漏砂封六乙泥五練夜窮青玉枕七明晨採碧雲梯冠霞髙把浮丘袂握體深蔵鬼谷奚知有山西駐齡藥何妨相贈一刀圭寄會稽仲休山人潘閬近攜琴鶴遊東越曽接談諧氣味深佛意已知師達了儒書却為俗披尋稽山有雪寒凝骨鑑水無風冷徹心别後相思向誰說祇應霜鬢暗相侵寄毛都官張伯玉寄問副車毛國鎮别來風味久如何蓬萊閣上誰同飲宛委山前幾畨歌畨去聲應向蘭亭摛彩筆曽教西子畫清蛾若還問我今何似比著前春醉更多送花趙提刑張伯玉蓬萊閣下牡丹開盡日凭欄望外臺不敢登門謁樽酒且教山僕送花來寄會稽刁景純學士張伯玉雨後稽山紫翠毫使君千騎壓雲鼇樓臺日暖花木麗河漢夜涼絲竹髙瀛館久淹騏驥足越人今識鳯凰毛江南老守思離闊夢想時過白鷺濤和國鎮晩秋齋中見寄張伯玉越國風光與衆殊貳車才調世應無晴樓對酌雲平海夜榻分題月滿湖吟嘯江山君好手主張詩酒我非夫行當乞挂朱輪去别作香山九老圖寄五峯諫長老唐詢禪客居山患不深五峰幽絶杳難尋門前流水朝還暮堂下閒雲古復今月色有時依晏坐秋聲隨處伴謳吟期師便作終焉計忍負平生物外心題會稽谿口躬師上人房唐詢谿口相傳地最靈其間風物與人清鐘聲夜到江頭盡雲氣朝從檻外生幾幅輕綃供畫筆一林脩竹寄閒情閉門終日無塵事卧看南忩自晦明題會稽谿口躬師上人房施昌言谿口佳山水髙人住此中生臺下沙鳥疎磬逐江風倚檻千巖寂焚香萬法空如何憑小筆一為寫衰翁覽越僧詩集有寄錢易莫學江淹擬恵休碧雲才調已難醻懐君只有闗山夢開巻如逢水石秋不得歸來作都講自慙名宦正悠悠寄成都蔣密學向傳式欽聞宥密綴榮班西顧分憂輟鉅賢乍領蜀都新印綬應懷越國舊風煙流觴雅趣人多羨正俗佳名世永傳此一聨叙西園之美聖主倚毗閒未得重來遊賞是何年聞拜命之後欲渡江一遊尋以促櫂西行不果至越故有是句寄雲門運禪師顔復句谿曲曲剡山重誰訪桑門物外蹤超世有言皆實際示人無意在機鋒平生懷抱佳髙遯壯嵗衣冠鏁俗容每想清禪心暫寂秋聲蕭瑟夜菴松還舊園作贈顔范二中書即始寧之園謝靈運辭滿豈多秩謝病不待年偶與張邴合久欲還東山聖靈昔迴眷微尚不及宣何意衝飈激烈火縱炎煙焚玉發崑峰餘燎遂見遷投沙理既迫如卭願亦愆長與歡愛别永絶平生縁浮舟千仞壑揔轡萬尋巔流沬不足險石林豈為難閩中安可處日夜念歸旋事躓兩如直心惬三避賢託身青雲上栖巖挹飛泉盛明盪氛昏貞休康迍邅殊方咸成貸微物豫采甄感深操不固質弱易扳纒曾是反昔園語往實款然曩基即先築故池不更穿果木有舊行壤石無逺延雖非休憩地聊取永日閒衛生自有經息隂謝所牽夫子照情素探懐授往篇和顔延年弱植慕端操窘步懼先迷寡立非擇方刻意藉窮棲伊昔遘多幸秉筆侍兩閨雖傳丹雘施未謂𤣥素睽徒遭良時詖王道奄昏霾人神幽明絶朋好雲雨乖弔屈汀洲浦謁帝蒼山蹊倚巖聴緒風攀林結留荑跂予閒衡嶠曷月瞻秦稽皇聖昭天徳豐澤振沈泥惜無雀雉化何用充海淮去國還故里幽門樹蓬藜采茨葺昔宇翦棘開舊畦物謝時既晏年往志不偕親仁敷情昵興玩究辭悽芬馥歇蘭若清越奪琳珪盡言非報章聊用布所懷初發疆中作與從弟恵連謝靈運杪秋尋逺山山逺行不近與子别山阿含酸赴脩畛中流袂就判欲去情不忍顧望脰未悁汀曲舟已隠隠汀絶望舟騖棹逐驚流欲抑一生歡并奔千里游日落當棲薄繫纜臨江樓豈惟夕情斂憶爾共淹留淹留昔時歡復増今日歎兹情已分慮况乃恊悲端秋泉鳴北澗哀猨響南巒戚戚新别心悽悽久念攅攅念攻别心旦發青谿隂暝投剡中宿明登天姥岑髙髙入雲霓還期那可尋儻遇浮丘公長絶子徽音西陵遇風獻康樂謝恵連我行指孟春春仲尚未發趣途逺有期念離情無歇成装候良辰漾舟陶嘉月瞻塗意少悰還顧情多闕哲兄感仳别相送越坰林飲餞野亭館分袂澄湖隂悽悽留子言眷眷浮客心迴塘隠艫栧逺望絶形音靡靡即長路戚戚抱遙悲悲遙但自弭路長當問誰行行道轉逺去去情彌遲昨發浦陽汭今宿浙江湄屯雲蔽層嶺驚風涌飛流零雨潤墳澤落雪灑林丘浮氛晦崖巘積素惑原疇曲汜薄停旅通川絶行舟臨津不得濟佇楫阻風波蕭條洲渚際氣色少諧和西矚興游歎東睇起淒歌積憤成疢痗無萱將如何酬從弟恵連謝靈運寢瘵謝人徒滅迹入雲峰巖壑寓耳目歡愛隔音容永絶賞心望長懐莫與同未路值令弟開顔披心胸心胷既云披意得咸在斯陵澗尋我室散帙問所知夕慮曉月流朝忌曛日馳悟對無厭歇聚散成分離分離别西川迴景歸東山别時悲已甚别後情更延傾想遲嘉音果枉濟江篇辛勤風波事款曲洲渚言洲渚既淹時風波子行遲務協華京想詎存空谷期猶復恵来章秪足攪余思儻若果歸言共陶暮春時暮春雖未交仲春善遊遨山桃發紅萼野蕨漸紫苞嚶鳴已恱豫幽居猶鬱陶夢寐佇歸舟釋我吝與勞酬集賢劉郎中對月見寄兼懐元浙東白居易月在洛陽天天髙浄如水下有白頭人擥衣中夜起思逺鏡亭上光深書殿裏渺然三處心相去各千里越中逢天台太一子孟浩然仙穴逢羽人停艫向前拜問余涉風水何事一作處逺行邁登陸尋天台順流下呉會兹山夙所尚安得聞靈怪上逼一作通青天髙俯臨滄海大鷄鳴見日出每與神仙會來去赤城中逍遙白雲外莓苔異人間瀑布作空界福庭長不死華頂舊稱最永懷從此遊何當濟所屇發越州赴潤州使院留别鮑侍御六言劉長卿對水看山别離孤舟日暮行遲江南江北春草獨向金陵去時曹娥寄丁元珍史館王相谿水渾渾來自北千山抱水清相射山深水急無艇子欲從故人安可得故人昔日此水上樽酒扁舟慰行役津亭把酒坐一笑我喜滿顔君動色論新講舊惜未足落日低回已催客離心自醉不復飲秋果寒花空滿席今年却坐相逢處惆悵難逢别時迹可憐谿水自南流安得谿舟問消息贈杜醇越中處士史館王相杜生四五十孝友稱鄉里隠約不外求耕桑有妻子杖藜牧鷄豚筠筒釣魴鯉嵗時沽酒歸亦不乏甘㫖天涯一桮飯宿昔相逢喜談辭足詩書篇詠又清泚都城聞越客安居常在耳日月未渠央如何棄予死古風久彫零好學少為己悲哉四明山此士今已矣寄題上虞蘇簿凝虚館石延年越基擅巖壑虚館宅其尤丹甍煜孤飛靈景邈四周山髙晴若隂洞寒夏如秋錦幄檻花發玉環渠水流閒卧真吏隠乍登迺仙遊居之冝民思無為兹宇羞再寄雲門運禪師顔復雲門山巔椶葉青雲門山脚隂谿鳴山翁毁服悖世榮大心圎靜無能名松間一飰養槁形石壁㡬見秋苔生愛山不免搜其情綴拾短闋成長行施子傳來竒可驚爽濶空谷天外聲髙風擺蕩疑莖英會稽掇英總集巻十二
