body:
  text: 會稽掇英總集巻六宋孔延之撰雲門寺律詩晉義熙三年王子昭嘗居是山有五色雲晝見庭户表奏安帝乃建寺曰雲門至會昌寺廢大中復興今朝改額曰雍熙顯聖淳化三寺宿雲門寺羅鄴寺入千巖石路長孤吟一宿逺公房卧聴半夜杉檉雨轉覺中峯枕簟涼華界卒無悲苦念塵襟還自是非忙他年縱若重來此息得心猨鬢已霜其二入松穿竹路難分藉地連巖總是雲欲問老僧多少事亂泉相聒不相聞同前錢起山寺宜静夜禪房開竹扉支公方晤語孤月復清輝一磬響丹壑千燈明翠微平生厭浮世兹夕更忘歸同前薛能初宵門未掩獨立對霜空極目故鄉月滿池寒草風樵聲當嶺上僧語在雲中正恨歸期晩蕭蕭聞塞鴻同前項斯松葉重重覆徑微黄昏谿上見人稀月明半寺客初到風動閒門僧未歸山果經霜多自落水螢穿竹不停飛行人始得中宵卧又被鐘聲催著衣同前劉得仁上方僧又起清磬出雲初吟苦曉燈暗露零寒草疎舊山多夢到流水送愁餘寄寺欲經嵗慙無親故書同前顧非熊夜香聞偈後岑寂掩柴扉照竹燈和雪看松月到衣草堂疎磬斷山寺故人稀翻憶湘南雨春風獨鳥歸同前顧況野人愛向山中宿况在葛洪丹井西門前有箇長松樹半夜子規來上啼同前宋之問維舟入浄域作禮事尊經投迹慮消散為心自杳冥龕交大禹穴樓倚少微星沓嶂圍蘭若迴谿抱竹庭覺花塗砌白甘露洗山青鴈塔鶱金地虹橋轉翠屏人天宵合影神鬼晝潛形理勝常宗寂縁空日感靈入禪從鴿繞説法有龍聴劫累終期滅塵躬豈暫寧摇摇不安寐待月詠巖扄憶雲門樹閒煙不破谿静鷺忘飛更愛幽奇處斜陽豔翠微贈雲門靈一律詩姚郃梵書鈔律千餘紙静坐焚香獨受持童子病來煙火絶清泉漱齒過齋時再遊雲門方千嶺頭雲向忩中起砌下泉從石上來僧老終無出山意巖猨澗鳥莫相猜題靈一上人新泉劉長卿東林一泉出復與逺公期淺澗春流處空山夜月時夢閒聞細響慮淡對清漪動静皆如此唯應道者知送鮑侍御宿雲門嚴維小令遺蹤在仙郎向夕過潭空觀月定門静見雲多竹色香煙染松聲雨㸃和還聞上方磬後夜梵如何陪獨孤中丞遊雲門絶壑開花界耶谿極上源光煇三石座登陟五雲門深木鳴騶馭晴山耀武賁亂泉親坐卧疎磬發朝昏蒼翠新嵐色莓苔積雨痕上方看度鳥後夜聴吟猨異迹焚香對新詩酌茗論歸來還撫俗諸老莫攀轅題雲門一上人新泉山下新泉出泠泠比法源落花纔有響濺石未成痕獨映孤松色殊分衆鳥喧唯當清月夜觀此啓禪門遊雲門趙嘏五雲谿影裏萬慮淡涼天紅葉斜堦日清風滿寺蟬幾多長道路一餉暫留連惜别疎鍾去看山坐水邊同前姚郃千重山崦裏樓閣影參差未暇尋僧院先看置寺碑竹深行漸暗石穏坐多時古塔龍蛇善虚廊鳥雀癡雲開上界近泉落下方遲為愛青桐葉因題滿樹詩同前元稹遥泉滴滴度更遲秋夜霜天入竹扉明月自隨山影去清風長送白雲歸同前崔子向長松落落勝天台佛殿經忩半嶺開郭裏鐘聲山裏去上方流水下方來同前杜牧雲門寺前逢猛雨雲黑山髙雨脚長曾向郊宫為近侍分明摐摐羽林鎗再遊雲門宿空上人故院馬戴雲門秋却入微徑寂無人後夜中峯月空林對坐身寂寥寒磬斷盥漱瀑泉新隠跡復誰見松枝拂石塵再遊雲門訪僧不遇薛能數歇渡深水漸非塵俗閒泉聲入秋寺月色徧寒山石路幾迴雪禪房又閉關不知雙樹客何處與雲閒招皇甫冉遊雲門僧靈一湖南通古路來往意無涯欲識雲門寺千峰到若耶春山子敬宅古木謝敷家自可長偕隠那言相去賒陪元相公遊雲門趙嘏松下山前一徑通燭迎千騎滿川紅春雲乍斂幽巖雨曉氣初開大斾風小檻燕花容客醉上方看竹與僧同歸來吹盡嚴城角路轉横塘亂水東同僚友遊雲門張謂共許尋雞足誰能惜馬蹄長空盡雲雨斜日半虹蜺簾外千峯轉忩前萬木低看花尋徑逺聴鳥入林迷地與喧卑隔人将物我齊不知樵客意何亊武陵谿宿雲門東客院蕭翼路入山西更向西雨和春雪旋成泥風吹疊巘雲頭散月照平湖鴈影低拄杖負書尋逺寺倩童牽鹿渡深谿今朝獨宿巖東院唯聴猨吟與鳥啼留題雲門絶頂髙峰路不分煙嵐長鎖緑苔紋獼猴推落臨崖石打破下方遮月雲宿雲門香閣院李襃香閣無塵雪後天石盆如月貯寒泉髙僧洗足南軒罷還枕蒲團就日眠宿雲門上方秦系禪室遥看峰頂頭白雲東去水常流松間儻許幽人住不更将錢買沃州泛若耶宿雲門于武陵谿船泛數里漸覺少炎暉映水花連影逢人鳥背飛深猶見白石涼好換生衣未得多詩句終須隔宿歸題雲門楊衡千峯白露後石壁掛殘燈曉色海邊日經聲松下僧意閑門不閉年去水空澄稽首如何問森羅盡一乗憶雲門舊遊送無著上人朱放誰能愁此别到越會相逢長憶雲門寺門前千萬峰石牀埋積雪山路倒枯松莫學白道士無人知去蹤入雲門五谿上作許渾此谿何處路遥問白髭翁佛廟千巖裏人家一島中魚傾荷葉露蟬噪栁條風急瀨鳴車軸微波漾釣筒石苔縈棹緑山果拂舟紅更就前谿宿村橋與剡通雲門寄陳丘二侍郎僧靈澈年老心閒無外事麻衣草座亦容身相逢盡道休官去林下何曾見一人會稽掇英總集巻六
