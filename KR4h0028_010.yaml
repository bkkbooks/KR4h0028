body:
  text: 會稽掇英總集卷十宋孔延之撰送别律詩聽盛小叢歌贈崔侍御并序李尚書夜登越城樓聞歌曰鴈門山上鴈初飛其聲激切召至曰去籍之妓盛小叢也曰汝歌何善乎曰小叢是梨園供奉南不嫌女甥也所唱之音乃不嫌之授也今老且廢矣時察院崔侍御自府幕而拜李公連夕餞崔君於鏡湖之光候亭屢命小叢歌餞在座各為賦一絶句贈送之亞相為之首唱崔下句云獨向柏臺為老吏皆曰侍御鳳閣中書即其程也何以老於柏臺衆請改之崔曰某但止於此任寧望九遷乎是年秋崔君鞫獄於譙中而終詩李訥繡衣奔命去情多南國佳人斂翠蛾曾向教坊聽國樂為君重唱盛叢歌奉和崔元範羊公留宴峴山亭洛浦髙歌五夜情獨向柏臺為老吏可憐林木響餘聲同前楊知至燕趙能歌有幾人落花回雪似含嚬聲隨御史西歸去誰伴文翁怨九春同前封彥沖蓮府才為渌水賔忽乘驄馬入咸秦為君唱作西河調日暮偏傷去住人同前盧鄴何郎戴豸别賢侯更吐歌珠宴庾樓莫道江南不同醉即陪舟楫上京遊同前髙湘謝安春渚餞袁宏千里仁風一扇清歌黛慘時方酩酊不知公子重飛觥同前盧溵烏臺上客紫髯公共捧天書靜鏡中桃葉不須歌白苧耶溪暮雨起樵風送越客張籍見説孤帆去東南别會稽春雲剡溪口殘月鏡湖西水鶴沙邊立山鼯竹裏啼謝家曾住處煙洞入應迷送朱慶餘及第歸越東南歸路逺幾日到鄉中有寺山皆遍無家水不通湖聲連葉雨野氣稻花風州縣知名久爭邀與客同送李評事遊越未習風塵事初為吳越遊露沾湖草晚日照海山秋梅市門何在蘭亭水尚留西陵待潮處知汝不勝愁送友人遊越杜荀鶴去越從吳過吳疆與越連有園多種橘無水不生蓮夜市橋邊火春風寺外船此中偏重客君去必經年送浙東李僕射赴鎮劉禹錫建節東行是舊遊歡聲喜氣滿吳州郡人重得黃丞相童子爭迎郭細侯詔下初辭溫室樹夢中先到景陽樓自憐不識平津閣遙望旌旗汝水頭送元曉上人歸稽亭重疊稽亭路山僧歸獨行逺峯斜日影本寺舊鐘聲徒侣問新事煙雲含别情應誇乞食處踏遍鳳皇城送元簡上人適越孤雲出岫本無依勝景名山即是歸久向吳門遊好寺還思越水洗塵機浙江濤驚獅子吼稽嶺峰疑靈鷲飛更入天台石橋路垂珠璀璨拂三衣越中送王使君赴江華崔洞皂蓋春風自越溪獨尋芳草桂陽西逺水浮雲隨馬去空山弱篠向雲低遙知異政荆門北舊許新詩康樂齊萬里相思在何處九疑殘雪白猿啼送王協律遊杭越十韻元稹去去莫凄凄餘杭接會稽松門天竺寺花洞若耶溪浣渚逢新豔蘭亭試舊題山經秦帝望壘辨越王棲江樹春常早城樓月易低鏡呈湖面出雲疊海潮齊章甫官人戴蓴絲姹女提長竽迎客閙小市隔煙迷紙亂紅藍壓甌凝碧玉泥荆南無底物來日為儂攜送王十一遊浙中越州都在浙河灣塵土消沉境象間百里油盆鏡湖水千峯翠朵會稽山軍城樓閣隨髙下禹廟煙霞自往還想得間吟乘畫舸幾回明月墜雲間送人之江東劉商含香仍佩玉宜入鏡中行盡室隨乘興扁舟不計程渡江霖雨霽對月夜潮生莫慮當炎暑稽山水木清送裴饒歸會稽羅隱金庭路指剡川隈珍重良朋自此來兩鬢不堪悲嵗月一巵猶得話塵埃家通曩分心空在世逼橫流眼未開笑殺山隂雪中客等間乘興又須回遙知元九送王行周遊越李紳江潮隨月盈還縮沙渚依潮斷更連伍相廟中多白浪越王臺畔少晴煙低頭緑草羞枚乘刺眼紅花哭杜鵑莫倚西施舊苔石由來破國是神仙送友人尋越中山水李白聞道稽山去偏宜謝客才千巖泉灑落萬壑樹縈回東海橫秦望西陵拱越臺湖清霜鏡曉濤白雪山來八月枚乘筆三吳張翰杯此中多逸興早晚向天台送朱山人歸山隂别業劉長卿越中初罷戰江上送歸橈南度無來客西陵自落潮空城垂故栁舊業廢春苗閭里相逢少鶯花共寂寥送張司馬罷使適越時危身赴敵事往任浮沉末路三江去當時百戰心春風吳苑緑古木剡山深千里滄波上孤舟不可尋送李校書適越謁杜中丞江風處處盡旦暮水空波搖落行人去雲山向越多陳蕃懸榻待謝客枉帆過相見耶溪路逶迤入薜蘿送荀八過山隂兼寄剡中諸官訪舊山隂縣扁舟到海涯故林嗟滿嵗春草憶佳期晚景千峰亂晴江一鳥遲桂香留客處楓暗泊舟時舊石曹娥篆空山夏禹祠剡溪多隱吏君去道相思送嚴維尉諸暨愛爾文章逺還家印綬榮退公兼色養臨下帶鄉情喬木映官舍春山宜縣城應憐釣臺石間却為浮名送崔士先適越山隂好雲物此去又春風越鳥聞花裏曹娥想鏡中小江潮易滿萬井水皆通徒羡扁舟客微官事不同送宣武從事越中按獄陸龜蒙曉看呈使範知欲敕星軺水國難驅傳山城便倚橈秉籌先獨立持法稱髙標旌斾臨危堞金絲發麗譙别愁當翠巘寃望隔風潮木落孤帆迥江寒疊鼓飄客鴻吳島盡殘雪剡汀銷坐想休秦獄春應到栁條却渡西陵别越中父老李紳海潮晚上江風急津吏篙師語默齊傾首奉觴看故老擁流爭拜見孩提慙非杜母臨襄峴自鄙朱公别會稽漸舉雲帆煙水濶杳然鳬雁各東西南徐送丘侍御之越皇甫冉時鳥催春色離人惜嵗華逺山隨擁傳芳草引還家北固潮當濶西陵路漸賒縱令寒食過猶有鏡中花送薛判官之越時難自多務職小亦求賢道路無辭逺雲山併在前樟亭待潮處已見起人煙越中送新安張少府歸秦中孟浩然試登秦望望秦川遙憶青門春可憐仲月送君從此去他時須及邵平田送韋繇校書赴浙東幕朱餘慶丞相辟書新清關獨去人官離藝閣早名占甲科頻水驛迎船火山城候騎塵湖邊寄家去到日倍榮親送周元範赴越賈島原下相逢便别離蟬鳴關路使回時過淮漸有懸帆興到越應將墜葉期城上秋山生菊早驛西寒渡落潮遲已曾幾遍隨旌斾去謁荒郊大禹祠送朱可久歸越中石頭城下泊北固暝鐘初汀鷺潮衝起舟忩月過虛吳山侵越衆隋栁入唐疏自欲躬調膳辟來何府書送人適越髙城滿夕陽何事欲霑裳遷客蓬蒿暮遊人道路長晴湖勝鏡碧寒栁似金黃若有相思夢殷勤載八行送朱兵曹回越星彩練中見澄江豈有泥潮生垂釣罷楚盡去橋西磧鳥辭沙至山鼯隔水啼會稽半侵海濤白禹祠溪送陸侍御入湖山陳羽鶴唳天邊秋水空荻花蘆葉起西風今夜渡江何處宿會稽山在月明中送餘姚知縣張太博王隨才名登仕路芝綍奉龍光出宰神仙邑吟辭鵷鷺行煙波迎去棹圖籍富行裝淮月蒹葭影江風橘柚香新詩留禹穴舊里過錢塘市井魚鹽聚亭臺水石涼雲山接秦望花木勝河陽暫布惠和政即看鵬翼翔送謝縝知餘姚歐陽修滁南幽谷抱山斜我鑿清泉子種花故事留傳遺老説世人今作畫圖誇金閨引籍子方壯白髮盈簪我可嗟試問絃歌為縣政何如樽俎樂無涯其二喜聞嘉譽藹淮壖又送吳帆解畫船壠畝遺民談舊政江山餘思入新篇憂傷白髮吾今爾仕宦青雲子勉旃舉棹南風吹酒醒離傷莫惜更留連會稽掇英總集卷十
