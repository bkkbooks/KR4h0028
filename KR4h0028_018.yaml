body:
  text: 㑹稽掇英摠集巻十八宋孔延之撰建南鎮碣記孟簡太山諫卿受氣端勁為文雅拔由進士尉陽羨安定公愛其道直延為從事是時鄙夫次受辟書故得與諫卿遊處最密常記其撰南鎮碣彩章輝煥物象飛動當貞元之丁丑也迨元和甲午簡自給事中䝉恩授浙東道都團練觀察處置使荐逰此地歳十八返矣尋奉御祝有事于鎮求當時之碣則未樹立因訪太山之故吏乃得舊本爰徴樂石磨琢鐫刻流芳自此諫卿永貞年為讒賊所中謫居汀州今皇帝踐阼宰臣論其寃濫故福建亷使閻公得以上請復歴大理評事遽徴拜監察御史未經嵗臺丞上荐不次遷侍御史以言語明切將酬相府且不入出為巴州刺史持逸羣之才畧瘳疲人之疾苦理行居最再移資州如巴之政今復為洋州課績大著噫共戴華髮相逢㡬時所不間者頃以至人實相淨樂之法更説迭講次真空處入性海道動于世間而不世間故可記也十年十月十日建遊妙喜寺記李遜越州好山水峯嶺重疊邐迤皆見鑑湖平淺微風有波山轉逺轉髙水轉深轉清故謝安與許詢支道林王羲之常為越中山水逰侣以安之清機詢道林之髙逸羲之之知止雖生知者思過已半焉知其又不因外奬積成精絜邪妙喜寺去郭二十里而近通舟而到積水四滿樓臺在中觀其林叟漁者小艇短楫求贏而來得志而返濯足撃汰聲滿山谷又有丹素佳禽哢吭清流劈波投空一一逺去時與從事四五人天氣精爽同登共覽因思羊叔子在襄陽好風景出鈴閤罷漁獵登峴山今古在懐獨立無對存有令德殁有令名君子哉遜賴聖時欽明寰海無波進無若人之才退獲若人之逸登山望水思泯幽寂雲霞草樹橫在一目非敢追蹤羊公亦復長揖王謝矣時有從事李翺僧靈徹請紀故琢于片石云時元和八月十五日記判曹食堂壁記崔元翰古之上賢必有禄秩之給有烹飪之養所以優之也漢時尚書諸曹郎太官供膳春秋時齊大夫公膳日雙雞然則天子諸侯于其公卿大夫葢皆日有饔餼有唐太宗文皇帝克定天下方勤于治命庶官日出而視事日中而退朝既而晏歸則宜朝食于是朝者食之廊廡下遂命其餘官司洎諸郡邑咸因材賦而興利事取其竒羨之積以具庖厨謂為本錢雜有遺法列曹掾史之于郡上丞諸曹郎推本其位又諸侯大夫之比其有食也于古義最為近之凡聮事者因于㑹食遂以議政比其同異齊其疾徐㑹斯有堂矣則堂之作不專在飲食亦有政教之大端焉越州號為中府連帥治所監六郡督諸軍視其輨轂之衝廣輪之度則彌地竟海重山阻江銅鹽材竹之貨殖舟車苞篚之委輸固已被四方而盈二都矣其人處險而怙富易擾而難理事之紛錯差于他州而亞于荆揚幽益諸府舊矣故其設官之制劇曹皆二人而紀綱之職亦分為兩以統其事以其府署之内建斾設旄之盛飛纓薦紳之衆堂皇閈閎之壯而食堂之制陋而不稱朞年故太子少師皇甫公來臨是邦始更而廣之居麗譙之西偏背崇墉以南嚮而其棟梁梠桶則皆松柏楩楠縱施五筵衡容八几洞以二門夾以四窗有爽塏之美無濕燠之患頤神寧體君子攸處後二嵗而御史大夫崔公為之備食器増食物虞人之獻禽者必分焉故其鼎俎有芻豢之羊豕田獲之麋鹿鼈蜃鮐魮之異橘柚筍蒲之新庶物豐矣由飲食以觀禮由禮以觀禍福由議事以觀政由政以觀黜陟則書其善惡而記其事宜在此堂乃列其名氏繋以年月叙之于後各以其職相從云鎮東軍監軍使院記呉蜕昔晉文公之為盟主也崇大諸侯之館以禮賓客而前史猶或美之而况元帥太師中書令彭城王之為藩翰也尊天子之命廣近臣之署以宣王澤以壯軍威者哉初乾寧單閼嵗叛臣芥視生靈鼠竊位號屏王臣于湫溢而毁撤其宮署以肆暴焉元帥彭城王以大義為心龔行天討遂平其難帝命兼而鎮之尋詔特進左監門衞上将軍汝南周公以監䕶之實欲以天子之渥澤而渙汗于三軍也連帥有竒勲殊績忠國利人之大節皆得以上聞以是銘盤盂鏤鍾釜免虚其授受也豈不重歟汝南公馹騎至止軍情大洽彭城王慕其温雅特加禮焉且曰易有大壯之義詩有斯干之美今奈何以卑庫之棟宇而處天子近臣不營爽塏者乎乃命軍吏揆日經始之去子來之民募宿飽之卒浹旬而材備累月而功畢重門洞開列楹髙峙奔者走者不敢仰視周垣緻密顯敞豐博聞者驚駭見者眙􅌓東廂西序窈窕深邃前廡後軒櫛比星連方塘曲沼㳺魚浴鳥異竹竒花藍梢粉葩復有大厦之前木蘭特異盤隂袤丈庇于廣庭越城之中稱為一絶當前政不軌之際忽焉凋零迨彭城王之鎮臨也緑葉紫苞載新陽艶雖田家荆樹未足多焉是知忠孝之感通其揆一也彭城王甞因醼遊形于歌詠題于屋壁聲在管絃其及物之功皆此類也越之曩制府兵十有四旅屬郡邊戍皆出其間前賢莅臨猶或逗撓今一府之内控弦十萬朱旗絳天長戈雪野揮汗則雨驟吐氣則雲舒而汝南公以温恭沖澹之德和煦之以貞正亷平之道矯厲之使三軍之士咸得其歡心及考秩向滿連帥惜其去拜表乞留中外美之嗚呼自兵興以來嵗踰二紀唯彭城王以忠孝之節罄翊戴之心連定金陵再清鏡水絶蘖牙之本覆妖偽之巢而復以國家經費為憂勤修職貢航深梯險道路相望史不絶書府無虚月當朝廷多事之際天帑充給實有賴焉天子以是奬殊庸起賞典授雙節帥兩藩製錦衣以頒之鏤金券以錫之復加定亂安國功臣所以昭異數也汝南公甞從容謂左右曰當今海内竭忠誠著實效于國者其呉越之邦乎抑有由也昔武德初巢國公為佐命功臣逮今二百八十載其裔孫復為定亂安國功臣豈偶然哉在我朝之創業也有巢國公佐焉其中興也有彭城王輔焉所謂世濟其美代不乏賢仲尼曰積善之家必有餘慶此之謂乎汝南公深識而逺慮博古而該今皆此類也夫如是豈止護强軍宣帝命而已是将入輔宸極致君堯舜外有彭城王之糺率羣后尊奬王室海内欲求不治其可得乎蜕以不才謬塵賓介奉命紀述誠慚陋蕪庶㡬勒貞珉永鴻烈用傳于不朽以繼奚斯之頌云時天復元年嵗在辛酉八月庚辰朔二十四日癸夘記金庭觀晉右軍書樓墨池記裴通越中山水之竒麗者剡為之最剡中之山水竒麗者金庭洞天為之最其洞在縣之東南循山趾而右去凡七十里得小香爐峯其峯即洞天之北門也谷抱山鬭雲重烟巒互囘萬變清和一氣花光照夜而常晝水色含空而無底此地何事甞聞異香有時值人從古不死真天下之絶境也有晉代六龍失馭五馬渡江中朝衣冠盡寄南國是以瑯琊王羲之領右軍將軍而家于此山其書樓墨池舊制猶在至南齊永元三年道士禇伯玊仍思幽絶勤求上𤣥遂啟髙宗明皇帝又于此山置金庭觀正當右軍之家故書樓在觀之西北維一間而四徘徊髙可二丈已下墨池在尊殿之東北維方而斜廣輪可五十尺已下池樓相去東西羑值纔可五十餘步雖形狀卑小不足以壯其瞻翫而恭儉有守斯可以示于將來况乎處所遐深風景秀異契逍遥之至理閲鸞鶴之參差其金庭洞天即道門所謂赤城丹霞第六洞天者也按上清經其洞天在天台桐柏山中辟方四十里其北門在此小香爐峯頂人莫得見之有山樵夫往往見之者或志之以竒花異草還報鄉里與鄉里同往則失其所志也過此峯東南三十餘里又石竇呀為洞門即洞天之便門也人或入之者必贏糧秉燭結侣而往約行一百里二百里多為流水淤泥所阻而返則莫湊其極也通以元和二年三月二三道友裹足而遊登書樓臨墨池但見其山水之異也其險如崩其聳如騰其引如肱其多如朋不過三層而謂天可昇經再宿而還以書樓缺壊墨池荒毁話之于邑宰王公王公瞿然徴王氏子孫之在者理荒補缺使其不朽即事題兹實録而已詩曰寂寂金庭洞清香發桂枝魚吞左慈釣鵝踏右軍池此地長無事沖天自有期向來逢道士多欲駕文螭沃州山禪院記白居易沃州山在剡縣南三十里禪院在沃州山之陽天姥岑之隂南對天台而華頂赤城列焉北對四明而金庭石鼓介焉西北有支遁嶺而養馬坡放鶴峯次焉東南有石橋谿谿出天台石橋因名焉其餘卑巖小泉如子孫之從父祖者不可勝數東南山水越為首剡為面沃州天姥為睂目夫有非常之境然後有非常之人棲焉晉宋以來因山洞開厥初有羅漢僧西天竺人白道猷居焉次有髙僧竺法潛支道林居焉次又有乾興淵支道開威藴崈實光識裴藏濟度逞印凡十八僧居焉髙士名人有戴逵王洽劉恢許𤣥度殷融郗超孫綽桓彦表正敬仁何次道王文度謝長霞袁彦伯王䝉衞玠謝萬石蔡叔子王羲之凡十八人或遊焉或止焉故道猷詩云連峯𢾗千里脩林帶平津茅茨隠不見鷄鳴知有人謝靈運詩云暝投剡中宿明登天姥岑髙髙入雲霓還期安可尋葢人與山相得于一時也自齊至唐兹山浸荒靈境寂寥罕有人遊故詞人朱放詩云月在沃洲山上人歸剡縣江邊劉長卿詩云何人住沃洲此皆愛而不到者也大和二年春有頭陁僧白寂然來遊兹山見道猷支竺遺跡泉石盡在依依然如歸故鄉戀不能去時淛東亷使元相國聞之始為卜築次亷使陸中丞知之助其繕完三年而禪院成五年而佛事立正殿若干間齋堂若干間僧舎若干間夏臘之僧嵗不下八九十安居遊觀之外日與寂然討論心要振起禪風白黒之徒附而化者甚衆嗟乎支竺殁而佛聲寢靈山廢而法不作後數百年而寂然繼之豈非時有待而化之有縁耶六年夏寂然遣門徒僧常贄自剡抵洛持書與圖詣從叔樂天乞為禪院記云昔道猷筆開兹山後寂然嗣興兹山今樂天又垂文兹山異乎哉沃洲山與白氏其世縁乎修漢太守馬君廟記韋瓘東漢太守馬君臻能奉漢制撫寧越封仁惠公利淑民陶俗殊績章白書于舊史其尤異則披嶮夷髙束波圜境巨浸橫合三百餘里決灌稻田動盈億計自漢至今千有餘年縱陽驕雨淫燒稼逸種唯鏡湖含澤驅波流􅕵注于大海災凶嵗榖穰熟俾生物蘇起貧羸育富其長計大利及人如此孔子稱民之父母馬君有焉開元中刺史張楚深念功本爰立祠宇久而陊敗今皇帝貞元九年觀察使平昌孟公誅斷姦刼寛遂民類教化修長氓吏畏慕甞以馬君忠利之績神氣未滅壽宫不嚴何以昭德十年十一月乃崇大棟梁誅翦穢梗禮物儀像咸極絜好後每遇水旱災變輒加心禱精意所向指期如答則知君子惠物本同于化樹功本同于治對德相望是宜刻石二十年二月三日記唐太守題名記摠管龎王武德元年十二月自右衞將軍授武德二年七月拜梁州都督李嘉武德三年闞稜武德四年六月九日自右領軍將軍授田德平貞觀七年七月十三日自鄜州都督授馮大恩貞觀九年八月授齊善行貞觀十七年九月自蘭州都督授王奉慈永徽二年正月自潭州都督授拜秦州都督于德方永徽五年正月十七日自原州都督授段寶命顯慶三年六月二十一日自洛州長史授唐同仁龍朔元年五月十二日自虢州刺史授劉伯英乾封元年五月自冀州長史授摠章致仕李孝逸咸亨二年三月自常州刺史除授益州長史李孝亷儀鳯三年二月自蘇州刺史授貶平州刺史崔承福永淳二年二月十六日自淛西刺史授李思貞文明元年二月九日自婺州刺史授郭齊宗光宅元年十月自左衞大將軍授楊𤣥節垂拱元年六月自撿校浙西刺史授李竒容垂拱二年三月自裕府副率授拜幽州刺史豆盧欽望如意元年三月自婺州刺史授拜司農卿錢節神功元年自揚州司馬授蔡德讓大足元年自廣州都督授竇懐貞長安四年自上方監授拜揚州長史龐貞素神龍元年五月自右衞將軍授張合慜神龍